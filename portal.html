      } else if(a.type==='paternity'){
        patDays++;
      } else if(a.type==='permission'){
        permDays++;
      }
    }
    d=addDays(d,1);
  }
  
  const hoursRemaining=ANNUAL_HOURS-totalHours;
  const vacRemaining=ANNUAL_VACATION-vacDays;
  const hoursPct=Math.min(Math.round(totalHours/ANNUAL_HOURS*100),100);
  const vacPct=Math.min(Math.round(vacDays/ANNUAL_VACATION*100),100);
  
  const result={totalHours,workDays,vacDays,sickDays,patDays,permDays,hoursRemaining,vacRemaining,hoursPct,vacPct};
  _annualCache[eid]=result;
  return result;
}

function getAssign(d,eid){
  const k=aKey(d,eid);if(state.assignments[k])return state.assignments[k];
  const abs=getAbsence(d,eid);if(abs)return{type:abs.type,isAbsence:true};
  const ds=fmtDate(d);
  const ha=HARD_ABS.find(a=>a.employee_id===eid&&a.start_date<=ds&&a.end_date>=ds);
  if(ha)return{type:ha.type,isAbsence:true};
  if(AVAIL[eid]){const[s,e]=AVAIL[eid];if(s&&ds<s)return{type:'inactive'};if(e&&ds>e)return{type:'inactive'}}
  if(isClosed(d))return{type:'closed'};
  if(PRE_ASSIGN[k])return PRE_ASSIGN[k];
  // Fixed schedules (non-rotating employees)
  if(FIXED_SCHEDULES[eid]){const fs=FIXED_SCHEDULES[eid][ds];return{type:fs||'free',fromRotation:true}}
  const cw=cycleWeek(d),dow=(d.getDay()+6)%7;
  if(ROTATION[eid]){const s=ROTATION[eid][cw][dow];return{type:s||'free',fromRotation:true}}
  return{type:'free'}
}
function getAbsence(d,eid){const ds=fmtDate(d);return state.absences.find(a=>a.employee_id===eid&&a.start_date<=ds&&(!a.end_date||a.end_date>=ds)&&a.status==='approved')}

async function setAssign(d,eid,shiftType,reason=''){
  const prev=getAssign(d,eid);
  state.assignments[aKey(d,eid)]={type:shiftType,modified:true,reason};
  checkAndCreateDebt(d,eid);
  addLog(eid,fmtDate(d),prev.type,shiftType,reason||'Cambio manual');
  renderAll();showToast('Turno actualizado: '+employees.find(e=>e.id===eid).name,'success');
  await dbSaveAssignment(d,eid,shiftType,reason);
}

// ===================== DEBT MANAGEMENT =====================
async function checkAndCreateDebt(d,eid){
  const m=getMonday(d),ws=fmtDate(m);let wd=0;
  for(let i=0;i<7;i++)if(isWorkDay(addDays(m,i),eid))wd++;
  if(wd>=6){
    const existing=state.dayDebts.find(db=>db.employee_id===eid&&db.week_str===ws&&!db.resolved);
    if(!existing){
      const debt={id:crypto.randomUUID(),employee_id:eid,owed_since:fmtDate(d),week_str:ws,reason:`${employees.find(e=>e.id===eid).name} trabajó ${wd} días (sem ${fmtShort(m)})`,resolved:false,resolved_date:null};
      state.dayDebts.push(debt);
      await dbSaveDebt(debt);
    }
  }
}
// Auto-detect debts from current week's rotation (runs on render)
function detectWeekDebts(){
  const dates=weekDates(state.currentWeekStart),ws=fmtDate(dates[0]);
  for(const emp of employees){
    let wd=0;for(let i=0;i<7;i++)if(isWorkDay(dates[i],emp.id))wd++;
    if(wd>=6){
      const debtId='auto_'+ws+'_'+emp.id;
      // Skip if dismissed or already exists
      if(state.dismissedDebts.has(debtId))continue;
      const anyExisting=state.dayDebts.find(db=>db.employee_id===emp.id&&db.week_str===ws);
      if(!anyExisting){
        const debt={id:debtId,employee_id:emp.id,owed_since:ws,week_str:ws,reason:`${emp.name} trabaja ${wd} días (sem ${fmtShort(dates[0])})`,resolved:false,resolved_date:null,auto:true};
        state.dayDebts.push(debt);
      }
    }
  }
}
async function resolveDebt(id){
  const d=state.dayDebts.find(x=>x.id===id);if(!d)return;
  d.resolved=true;d.resolved_date=fmtDate(new Date());
  state.dismissedDebts.add(id);
  // Remove from array entirely so it doesn't show up
  state.dayDebts=state.dayDebts.filter(x=>x.id!==id);
  if(!d.auto)await db.from('day_debts').update({resolved:true,resolved_date:d.resolved_date}).eq('id',id);
  renderAll();showToast('Deuda compensada ✓','success');
}
function findBestDayToReturn(eid){
  const results=[];const t=new Date();const tardeSh=['afternoon','closing','afternoon_14_22','jesus_fri','jesus_sun'];const midSh=['mid','jesus_sat'];
  for(let i=1;i<=42;i++){
    const d=addDays(t,i);if(isClosed(d))continue;
    const a=getAssign(d,eid);if(!a.type||!SHIFTS[a.type])continue;
    const{counts}=getDayCoverage(d);
    const sg=tardeSh.includes(a.type)?'tarde':midSh.includes(a.type)?'mid':'morning';
    const mn=COVERAGE_MIN[sg]||0;
    const excess=counts[sg]-mn;
    if(excess>0){
      // Verify freeing this day doesn't violate anything for this employee
      // Just needs excess coverage > 0
      results.push({date:d,shift:a.type,shiftName:SHIFTS[a.type].name,dayIdx:(d.getDay()+6)%7,excess,group:sg});
    }
    if(results.length>=5)break;
  }
  return results;
}

// ===================== COVERAGE =====================
function getDayCoverage(d){const c={morning:0,mid:0,afternoon:0},n={morning:[],mid:[],afternoon:[]};const tardeSh=['afternoon','closing','afternoon_14_22','jesus_fri','jesus_sun'];const midSh=['mid','jesus_sat'];for(const e of employees){const a=getAssign(d,e.id);if(a.type&&SHIFTS[a.type]){const t=a.type;if(t==='morning'){c.morning++;n.morning.push(e.name)}else if(midSh.includes(t)){c.mid++;n.mid.push(e.name)}else if(tardeSh.includes(t)){c.afternoon++;n.afternoon.push(e.name)}}}c.tarde=c.afternoon;n.tarde=n.afternoon;return{counts:c,names:n}}
function getCoverageStatus(d){const{counts}=getDayCoverage(d);const issues=[];if(counts.morning<COVERAGE_MIN.morning)issues.push({shift:'morning',have:counts.morning,need:COVERAGE_MIN.morning});if(counts.tarde<COVERAGE_MIN.tarde)issues.push({shift:'tarde',have:counts.tarde,need:COVERAGE_MIN.tarde});return{counts,issues,ok:issues.length===0}}

// ===================== VALIDATION =====================
function validate(d,eid,ns){
  const al=[],emp=employees.find(e=>e.id===eid);if(!emp||!ns||ns==='free'||!SHIFTS[ns])return al;
  if(emp.restrictions.includes(ns))al.push({type:'block',msg:`${emp.name} tiene restricción de ${SHIFTS[ns].name}`});
  if(getAbsence(d,eid))al.push({type:'block',msg:`${emp.name} tiene ausencia activa`});
  if(isClosed(d))al.push({type:'block',msg:'Día cerrado'});
  const prev=getAssign(addDays(d,-1),eid);if(prev.type&&SHIFTS[prev.type]){const r=(24-SHIFTS[prev.type].end)+SHIFTS[ns].start;if(r<12)al.push({type:'error',msg:`Descanso insuficiente: ${r}h entre ${SHIFTS[prev.type].name} y ${SHIFTS[ns].name} (mín 12h)`})}
  const next=getAssign(addDays(d,1),eid);if(next.type&&SHIFTS[next.type]){const r=(24-SHIFTS[ns].end)+SHIFTS[next.type].start;if(r<12)al.push({type:'error',msg:`Descanso insuficiente con día siguiente: ${r}h hasta ${SHIFTS[next.type].name} (mín 12h)`})}
  const con=getConsecutiveIfAssigned(d,eid);if(con>6)al.push({type:'block',msg:`${emp.name} llevaría ${con} días consecutivos (máx 6)`});else if(con===6)al.push({type:'error',msg:`⚠ ${emp.name} llevaría 6 días consecutivos`});
  const m=getMonday(d);let wwd=0;for(let i=0;i<7;i++){const wd=addDays(m,i);if(fmtDate(wd)===fmtDate(d)){wwd++;continue}if(isWorkDay(wd,eid))wwd++}const wf=7-wwd;
  if(wf<2)al.push({type:'error',msg:`${emp.name} solo tendría ${wf} día${wf!==1?'s':''} libre${wf!==1?'s':''} esta semana. Se generará deuda.`});
  return al
}

// ===================== SUBSTITUTION ENGINE =====================
function findCandidates(d,sn){
  const c=[];for(const emp of employees){
    const a=getAssign(d,emp.id);if(a.type!=='free')continue;if(emp.restrictions.includes(sn))continue;
    const v=validate(d,emp.id,sn);if(v.some(x=>x.type==='block'))continue;const he=v.some(x=>x.type==='error');
    const m=getMonday(d);let wh=0,wwd=0;for(let i=0;i<7;i++){const wa=getAssign(addDays(m,i),emp.id);if(wa.type&&SHIFTS[wa.type]){wh+=8;wwd++}}
    const con=getConsecutiveIfAssigned(d,emp.id),ex5=(wwd+1)>5,hd=getActiveDebts(emp.id).length>0;
    let sc=wh;if(ex5)sc+=200;if(hd)sc+=150;if(he)sc+=100;if(con>=5)sc+=80;
    c.push({employee:emp,weekHours:wh,weekWorkDays:wwd,consecutive:con,wouldExceed5days:ex5,hasDebt:hd,hasRestWarning:he,score:sc})
  }c.sort((a,b)=>a.score-b.score);return c
}
function findSwapCandidates(d,sn){
  const c=[],cov=getDayCoverage(d);for(const emp of employees){
    const a=getAssign(d,emp.id);if(!a.type||!SHIFTS[a.type]||a.type===sn||a.isAbsence)continue;if(emp.restrictions.includes(sn))continue;
    const cs=a.type;const tardeSh=['afternoon','closing','afternoon_14_22','jesus_fri','jesus_sun'];const midSh=['mid','jesus_sat'];const cg=tardeSh.includes(cs)?'tarde':midSh.includes(cs)?'mid':'morning';const cm=COVERAGE_MIN[cg]||0;if(cov.counts[cg]<=cm)continue;
    const v=validate(d,emp.id,sn);if(v.some(x=>x.type==='block'))continue;
    c.push({employee:emp,currentShift:cs,hasRestWarning:v.some(x=>x.type==='error')})
  }return c
}

async function doLogin(){
  const user=document.getElementById('loginUser').value.trim(),pass=document.getElementById('loginPass').value;
  if(!user||!pass){document.getElementById('loginError').textContent='Introduce usuario y contraseña';return}
  
  // Try current do_login (may or may not return employee_id)

  if(error||!data||!data.length){
    document.getElementById('loginError').textContent='Usuario o contraseña incorrectos';

  }
  currentUser=data[0];
  
  // If employee_id comes from DB, use it
  if(currentUser.employee_id){

  const empMatch=employees.find(e=>e.id===user.toLowerCase());

}

// ===================== HELPERS =====================
function findNextVacation(eid,fromDate){
  // Search HARD_ABS for next vacation after fromDate
  const ds=fmtDate(fromDate);
  let best=null;
  for(const abs of HARD_ABS){
    if(abs.employee_id!==eid||abs.type!=='vacation')continue;
    if(abs.end_date<ds)continue;
    const start=new Date(abs.start_date+'T12:00:00');
    const end=new Date(abs.end_date+'T12:00:00');
    if(start>=fromDate){
      if(!best||start<best.start)best={start,end};
    } else if(end>=fromDate){
      // Currently on vacation
      best={start,end};break;
    }
  }
  // Also check DB absences
  for(const abs of state.absences){
    if(abs.employee_id!==eid||abs.type!=='vacation')continue;
    if(!abs.end_date||abs.end_date<ds)continue;
    const start=new Date(abs.start_date+'T12:00:00');
    const end=new Date(abs.end_date+'T12:00:00');
    if(start>=fromDate&&(!best||start<best.start))best={start,end};
  }
  return best;
}

    <div style="font-size:12px;color:var(--text3);margin-bottom:8px">${DAYS[(today.getDay()+6)%7]} ${fmtShort(today)}</div>
    ${hol?`<div style="font-size:11px;color:var(--danger);margin-bottom:6px">🔴 ${hol}</div>`:''}
    <div style="font-size:36px;margin-bottom:4px">${heroIcon}</div>

    ${heroTime?`<div style="font-size:28px;font-weight:700;color:var(--text);margin:4px 0">${heroTime}</div>`:''}
    ${SHIFTS[todayType]?`<div style="font-size:13px;color:var(--text2);margin-top:4px">${heroTask}</div>`:''}
  </div>`;

  // COMPANIONS TODAY

    const midSh=['mid','jesus_sat'];

  <h2>${monthNames[calMonth]} ${calYear}</h2>

// ===================== NÓMINA (Nocturnas + Festivas) =====================
const NIGHT_HOURS={morning:0,mid:0,afternoon:1,closing:2,afternoon_14_22:0,jesus_fri:2,jesus_sat:0,jesus_sun:2};

function calcNightHours(shiftType){return NIGHT_HOURS[shiftType]||0}
function calcFestiveHours(shiftType){return shiftType&&SHIFTS[shiftType]?getShiftHours(shiftType):0}

function getMonthNightFestive(empId,year,month){
  const daysInMonth=new Date(year,month+1,0).getDate();
  const nights=[],festives=[];
  
  for(let day=1;day<=daysInMonth;day++){
    const d=new Date(year,month,day,12);
    const ds=fmtDate(d);
    const a=getAssign(d,empId);
    const t=a.type;
    if(!t||!SHIFTS[t])continue;
    
    // Night hours
    const nh=calcNightHours(t);
    if(nh>0)nights.push({date:ds,shift:SHIFTS[t].time,hours:nh,auto:true});
    
    // Festive hours
    const hol=isHoliday(d);
    if(hol){
      const fh=calcFestiveHours(t);
      if(fh>0)festives.push({date:ds,shift:SHIFTS[t].time,hours:fh,holiday:hol,auto:true});
    }
  }
  return{nights,festives};
}

function mergeWithManual(autoEntries,manualEntries,type,month){
  // Manual entries override auto for same date, or add new ones
  const monthPrefix=month; // '2026-03'
  const manual=manualEntries.filter(e=>e.type===type&&e.month===monthPrefix);
  const merged=new Map();
  
  for(const e of autoEntries)merged.set(e.date,{...e,source:'auto'});
  for(const e of manual){
    if(e.deleted){merged.delete(e.date);continue}
    merged.set(e.date,{date:e.date,shift:e.shift_time,hours:e.hours,auto:false,source:'manual',holiday:e.holiday||'',id:e.id});
  }
  return Array.from(merged.values()).sort((a,b)=>a.date.localeCompare(b.date));
}

    </div>
    <div class="card" style="flex:1;text-align:center;padding:14px;border-left:3px solid var(--danger)">
      <div style="font-size:10px;color:var(--text3);font-weight:600">HORAS FESTIVAS</div>
      <div style="font-size:28px;font-weight:700;color:var(--danger)">${totalFestive}</div>
      <div style="font-size:10px;color:var(--text3)">${festives.length} día${festives.length!==1?'s':''}</div>
    </div>
  </div>`;
  
  // Night hours table
  h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="card-title" style="margin:0">🌙 Horas Nocturnas</div>
    <button class="btn" style="padding:3px 8px;font-size:10px" onclick="addManualEntry('night','${monthKey}')">+ Añadir</button>
  </div>`;
  if(!nights.length){
    h+=`<div style="font-size:12px;color:var(--text3);padding:8px 0">Sin horas nocturnas este mes</div>`;
  } else {
    h+=`<table style="width:100%;border-collapse:collapse;font-size:12px">
      <tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:4px 6px;color:var(--text3);font-size:11px">Fecha</th><th style="text-align:center;padding:4px;color:var(--text3);font-size:11px">Horario</th><th style="text-align:center;padding:4px;color:var(--text3);font-size:11px">Horas</th><th style="width:30px"></th></tr>`;
    for(const e of nights){
      const d=new Date(e.date+'T12:00:00');
      const dayName=DAYS[(d.getDay()+6)%7].slice(0,3);
      const dd=e.date.slice(8)+'/'+e.date.slice(5,7);
      const manual=e.source==='manual';
      h+=`<tr style="border-bottom:1px solid var(--border)${manual?';background:rgba(99,102,241,.06)':''}">
        <td style="padding:5px 6px">${dayName} ${dd}${manual?' <span style="font-size:9px;color:var(--accent2)">✎</span>':''}</td>
        <td style="text-align:center;padding:5px;color:var(--closing)">${e.shift}</td>
        <td style="text-align:center;padding:5px;font-weight:700">${e.hours}h</td>
        <td style="text-align:center">${manual?`<span style="cursor:pointer;font-size:12px" onclick="deleteManualEntry('${e.id}')">✕</span>`:''}</td>
      </tr>`;
    }
    h+=`<tr style="font-weight:700"><td style="padding:6px" colspan="2">Total</td><td style="text-align:center;padding:6px;color:var(--closing)">${totalNight}h</td><td></td></tr></table>`;
  }
  h+=`</div>`;
  
  // Festive hours table
  h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="card-title" style="margin:0">🔴 Horas Festivas</div>
    <button class="btn" style="padding:3px 8px;font-size:10px" onclick="addManualEntry('festive','${monthKey}')">+ Añadir</button>
  </div>`;
  if(!festives.length){
    h+=`<div style="font-size:12px;color:var(--text3);padding:8px 0">Sin horas festivas este mes</div>`;
  } else {
    h+=`<table style="width:100%;border-collapse:collapse;font-size:12px">
      <tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:4px 6px;color:var(--text3);font-size:11px">Fecha</th><th style="text-align:left;padding:4px;color:var(--text3);font-size:11px">Festivo</th><th style="text-align:center;padding:4px;color:var(--text3);font-size:11px">Horario</th><th style="text-align:center;padding:4px;color:var(--text3);font-size:11px">Horas</th><th style="width:30px"></th></tr>`;
    for(const e of festives){
      const d=new Date(e.date+'T12:00:00');
      const dayName=DAYS[(d.getDay()+6)%7].slice(0,3);
      const dd=e.date.slice(8)+'/'+e.date.slice(5,7);
      const manual=e.source==='manual';
      h+=`<tr style="border-bottom:1px solid var(--border)${manual?';background:rgba(99,102,241,.06)':''}">
        <td style="padding:5px 6px">${dayName} ${dd}${manual?' <span style="font-size:9px;color:var(--accent2)">✎</span>':''}</td>
        <td style="padding:5px;font-size:11px;color:var(--danger)">${e.holiday||''}</td>
        <td style="text-align:center;padding:5px">${e.shift}</td>
        <td style="text-align:center;padding:5px;font-weight:700">${e.hours}h</td>
        <td style="text-align:center">${manual?`<span style="cursor:pointer;font-size:12px" onclick="deleteManualEntry('${e.id}')">✕</span>`:''}</td>
      </tr>`;
    }
    h+=`<tr style="font-weight:700"><td style="padding:6px" colspan="3">Total</td><td style="text-align:center;padding:6px;color:var(--danger)">${totalFestive}h</td><td></td></tr></table>`;
  }
  h+=`</div>`;
  
  // Export button
  h+=`<div style="text-align:center;margin-top:8px" class="no-print">
    <button class="btn" style="padding:8px 20px;font-size:12px" onclick="exportNomina('${monthKey}')">📥 Exportar Excel</button>
  </div>`;
  
  document.getElementById('panel-nomina').innerHTML=h;
}

async function validateMonth(monthKey){
  const entry={id:crypto.randomUUID(),employee_id:currentEmpId,date:monthKey+'-01',type:'validation',shift_time:'',hours:0,auto_calculated:false,validated:true,validated_at:new Date().toISOString(),month:monthKey};
  state.nominaEntries.push(entry);
  try{await db.from('night_festive_entries').insert(entry)}catch(e){}
  renderNomina();
  showToast('✅ Mes validado — Silvia recibirá la confirmación','success');
}

function addManualEntry(type,monthKey){
  const monthNum=parseInt(monthKey.split('-')[1])-1;
  const year=parseInt(monthKey.split('-')[0]);
  const shifts=Object.entries(SHIFTS).filter(([k])=>!k.startsWith('jesus_'));
  
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center';
  modal.onclick=e=>{if(e.target===modal)modal.remove()};
  
  const shiftOpts=shifts.map(([k,s])=>`<option value="${k}">${s.name} (${s.time})</option>`).join('');
  const label=type==='night'?'🌙 Añadir hora nocturna':'🔴 Añadir hora festiva';
  
  modal.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:360px;width:90%" onclick="event.stopPropagation()">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px">${label}</div>
    <div class="swap-form">
      <div class="field"><label>Fecha</label><input type="date" id="manDate"></div>
      <div class="field"><label>Turno</label><select id="manShift">${shiftOpts}</select></div>
      <div class="field"><label>Horas</label><input type="number" id="manHours" min="1" max="12" value="${type==='night'?'1':'8'}"></div>
      ${type==='festive'?'<div class="field"><label>Festivo</label><input type="text" id="manHoliday" placeholder="Ej: San Ignacio"></div>':''}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn" style="flex:1" onclick="this.closest('div[style*=fixed]').remove()">Cancelar</button>
        <button class="btn btn-primary" style="flex:1" onclick="saveManualEntry('${type}','${monthKey}')">Guardar</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

async function saveManualEntry(type,monthKey){
  const date=document.getElementById('manDate').value;
  const shiftKey=document.getElementById('manShift').value;
  const hours=parseFloat(document.getElementById('manHours').value);
  const holiday=document.getElementById('manHoliday')?.value||'';
  
  if(!date||!hours){showToast('Completa todos los campos','error');return}
  
  const entry={id:crypto.randomUUID(),employee_id:currentEmpId,date,type,shift_time:SHIFTS[shiftKey]?.time||'',hours,auto_calculated:false,validated:false,validated_at:null,month:monthKey,holiday};
  state.nominaEntries.push(entry);
  try{await db.from('night_festive_entries').insert(entry)}catch(e){}
  
  document.querySelector('div[style*="fixed"][style*="inset"]')?.remove();
  renderNomina();
  showToast('✅ Entrada añadida','success');
}

async function deleteManualEntry(id){
  if(!confirm('¿Eliminar esta entrada manual?'))return;
  state.nominaEntries=state.nominaEntries.filter(e=>e.id!==id);
  try{await db.from('night_festive_entries').delete().eq('id',id)}catch(e){}
  renderNomina();
  showToast('Entrada eliminada','success');
}

function exportNomina(monthKey){
  const emp=employees.find(e=>e.id===currentEmpId);
  const monthNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const mo=parseInt(monthKey.split('-')[1])-1;
  const yr=parseInt(monthKey.split('-')[0]);
  const auto=getMonthNightFestive(currentEmpId,yr,mo);
  const nights=mergeWithManual(auto.nights,state.nominaEntries,'night',monthKey);
  const festives=mergeWithManual(auto.festives,state.nominaEntries,'festive',monthKey);
  
  const wb=XLSX.utils.aoa_to_sheet([]);
  const rows=[];
  
  // Header
  rows.push([monthNames[mo].toUpperCase()]);
  rows.push(['HORAS NOCTURNAS SAC','','','','','','HORAS FESTIVAS SAC']);
  rows.push(['TRABAJADOR/A','','','','','','TRABAJADOR/A']);
  rows.push([]);
  rows.push([emp.name,'FECHA','HORARIO','TOTAL HORAS DÍA','TOTAL MES','',emp.name,'FECHA','HORARIO','TOTAL HORAS DÍA','TOTAL MES']);
  
  const maxRows=Math.max(nights.length,festives.length,1);
  let nightTotal=0,festiveTotal=0;
  for(let i=0;i<maxRows;i++){
    const row=[];
    if(nights[i]){
      const dd=nights[i].date.slice(8)+'/'+nights[i].date.slice(5,7)+'/'+nights[i].date.slice(0,4);
      row.push('',dd,nights[i].shift,nights[i].hours,'');
      nightTotal+=nights[i].hours;
    } else row.push('','','','','');
    row.push('');
    if(festives[i]){
      const dd=festives[i].date.slice(8)+'/'+festives[i].date.slice(5,7)+'/'+festives[i].date.slice(0,4);
      row.push('',dd,festives[i].shift,festives[i].hours,'');
      festiveTotal+=festives[i].hours;
    } else row.push('','','','','');
    rows.push(row);
  }
  rows.push([]);
  rows.push(['','','','',nightTotal,'','','','','',festiveTotal]);
  
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:18},{wch:12},{wch:14},{wch:16},{wch:12},{wch:3},{wch:18},{wch:12},{wch:14},{wch:16},{wch:12}];
  const wbk=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wbk,ws,monthNames[mo]);
  XLSX.writeFile(wbk,`Nocturnas_Festivas_${emp.name}_${monthKey}.xlsx`);
  showToast('📥 Excel exportado','success');
}

// ===================== TEAM SCHEDULE =====================
function renderTeam(){
  const dates=weekDates(state.currentWeekStart);
  const todayStr=fmtDate(new Date());
  const tardeSh=['afternoon','closing','afternoon_14_22','jesus_fri','jesus_sun'];
  const midSh=['mid','jesus_sat'];

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button class="btn" style="padding:6px 12px" onclick="state.currentWeekStart=addDays(state.currentWeekStart,-7);renderTeam()">◀</button>
    <span style="font-size:13px;font-weight:600">${fmtShort(dates[0])} — ${fmtShort(dates[6])}</span>
    <button class="btn" style="padding:6px 12px" onclick="state.currentWeekStart=addDays(state.currentWeekStart,7);renderTeam()">▶</button>
  </div>`;
  
  h+=`<div style="overflow-x:auto"><table class="sched-table"><tr><th style="min-width:70px"></th>`;
  for(let i=0;i<7;i++){
    const d=dates[i];const hol=isHoliday(d);
    h+=`<th${hol?' class="holiday"':''}>${DAYS[i].slice(0,3)}<br>${fmtShort(d)}${hol?'<br><span style="font-size:7px;color:var(--danger)">🔴</span>':''}</th>`;
  }
  h+=`</tr>`;
  
  for(const emp of employees){
    let hasShift=false;
    for(let i=0;i<7;i++){const a=getAssign(dates[i],emp.id);if(a.type&&a.type!=='inactive'&&a.type!=='free')hasShift=true}
    if(!hasShift)continue;
    const isMe=emp.id===currentEmpId;
    h+=`<tr${isMe?' style="background:rgba(99,102,241,.06)"':''}>`;
    h+=`<td class="emp-n" style="${isMe?'color:var(--accent2);font-weight:700':'color:var(--text)'}">${emp.name}${isMe?' ⭐':''}</td>`;
    for(let i=0;i<7;i++){
      const d=dates[i],a=getAssign(d,emp.id),t=a.type;
      let cls='s-f',txt='—';
      if(t==='closed'){txt='🔒'}
      else if(SHIFTS[t]){
        txt=SHIFTS[t].abbr;
        if(t==='morning')cls='s-m';
        else if(midSh.includes(t))cls='s-me';
        else if(t==='closing')cls='s-c';
        else if(tardeSh.includes(t))cls='s-t';
      }
      else if(ABSENCES[t]){cls='s-a';txt=t==='vacation'?'VAC':t==='sick'?'BAJA':'AUS'}
      else{txt='·'}
      const meClass=isMe&&SHIFTS[t]?' me':'';
      h+=`<td class="${cls}${meClass}" title="${emp.name}: ${SHIFTS[t]?.name||ABSENCES[t]?.name||'Libre'}">${txt}</td>`;
    }
    h+=`</tr>`;
  }
  h+=`</table></div>`;
  
  document.getElementById('panel-team').innerHTML=h;
}

// ===================== SWAP REQUESTS =====================
function renderSwap(){
  const emp=employees.find(e=>e.id===currentEmpId);
  const eo=employees.filter(e=>e.id!==currentEmpId).map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
  
  let h=`<div class="card"><div class="card-title">🔄 Solicitar cambio</div>
    <div class="swap-form">
      <div class="field"><label>Tipo de cambio</label>
        <select id="swType" onchange="toggleSwapFields();validateSwap()">
          <option value="day">Cambio de día — alguien me cubre</option>
          <option value="shift">Cambio de turno — cambiar mi franja</option>
        </select>
      </div>
      <div class="field"><label>Fecha</label><input type="date" id="swDate" value="${fmtDate(new Date())}" onchange="validateSwap()"></div>
      <div id="dayFields">
        <div class="field"><label>Quién me cubre</label><select id="swCover" onchange="validateSwap()"><option value="">Seleccionar...</option>${eo}</select></div>
      </div>
      <div id="shiftFields" style="display:none">
        <div class="field"><label>Turno deseado</label>
          <select id="swShift" onchange="validateSwap()">${Object.entries(SHIFTS).filter(([k])=>!k.startsWith('jesus_')).map(([k,s])=>`<option value="${k}">${s.name} (${s.time})</option>`).join('')}</select>
        </div>
      </div>
      <div id="swapPreview"></div>
      <div class="field"><label>Motivo</label><textarea id="swReason" rows="2" placeholder="Ej: cita médica, compromiso personal..."></textarea></div>
      <button class="btn btn-primary" style="width:100%" onclick="submitSwap()">Enviar solicitud</button>
    </div>
  </div>`;
  
  // My swap history
  const mySwaps=state.swapRequests.filter(s=>s.requester_id===currentEmpId||s.cover_id===currentEmpId).slice(0,20);
  h+=`<div class="card"><div class="card-title">📋 Mis cambios</div>`;
  if(!mySwaps.length)h+=`<div style="font-size:12px;color:var(--text3)">Sin cambios registrados</div>`;
  else for(const s of mySwaps){
    const re=employees.find(e=>e.id===s.requester_id);
    const ce=employees.find(e=>e.id===s.cover_id);
    const isReq=s.requester_id===currentEmpId;
    const status=s.status;
    h+=`<div class="swap-item ${status}">
      <div style="font-size:12px;font-weight:600">${isReq?'Solicité librarme':'Cubrí a '+(re?.name||'?')} — ${s.date}</div>
      <div style="font-size:11px;color:var(--text2)">${isReq&&ce?'Cubre: '+ce.name:''} ${s.reason?'· '+s.reason:''}</div>
      <div style="font-size:10px;margin-top:4px;color:${status==='approved'?'var(--success)':status==='rejected'?'var(--danger)':'var(--warning)'}">${status==='approved'?'✅ Aprobado':status==='rejected'?'❌ Rechazado':'⏳ Pendiente'}</div>
    </div>`;
  }
  h+=`</div>`;

  document.getElementById('panel-swap').innerHTML=h;
}

function toggleSwapFields(){
  const t=document.getElementById('swType').value;
  document.getElementById('dayFields').style.display=t==='day'?'block':'none';
  document.getElementById('shiftFields').style.display=t==='shift'?'block':'none';
}

function validateSwap(){
  const p=document.getElementById('swapPreview');
  if(!p)return;
  const ds=document.getElementById('swDate').value;
  const type=document.getElementById('swType').value;
  if(!ds){p.innerHTML='';return}
  
  const d=new Date(ds+'T12:00:00');
  const myAssign=getAssign(d,currentEmpId);
  const myShift=myAssign.type;
  const hol=isHoliday(d);
  let h='';
  
  // Show my shift that day
  if(SHIFTS[myShift]){
    h+=`<div style="padding:6px 10px;background:var(--bg3);border-radius:6px;margin-bottom:8px;font-size:12px">
      Tu turno: <strong style="color:${SHIFTS[myShift].color}">${SHIFTS[myShift].name} (${SHIFTS[myShift].time})</strong>
      ${hol?`<span style="color:var(--danger);margin-left:6px">🔴 ${hol}</span>`:''}
    </div>`;
  } else if(myShift==='free'||!myShift){
    h+=`<div style="padding:6px 10px;background:rgba(245,158,11,.1);border-radius:6px;margin-bottom:8px;font-size:12px;color:var(--warning)">⚠ No tienes turno ese día</div>`;
  } else if(ABSENCES[myShift]){
    h+=`<div style="padding:6px 10px;background:rgba(239,68,68,.1);border-radius:6px;margin-bottom:8px;font-size:12px;color:var(--danger)">⚠ Tienes ${ABSENCES[myShift].name} ese día</div>`;
  }
  
  if(type==='day'){
    const covId=document.getElementById('swCover').value;
    if(covId){
      const covEmp=employees.find(e=>e.id===covId);
      const covAssign=getAssign(d,covId);
      const covType=covAssign.type;
      
      if(!covType||covType==='free'||covType==='inactive'){
        h+=`<div style="padding:6px 10px;background:rgba(34,197,94,.1);border-radius:6px;font-size:12px;color:var(--success)">✅ ${covEmp.name} está <strong>libre</strong> ese día — puede cubrirte</div>`;
      } else if(SHIFTS[covType]){
        h+=`<div style="padding:6px 10px;background:rgba(245,158,11,.1);border-radius:6px;font-size:12px;color:var(--warning)">⚠ ${covEmp.name} ya trabaja: <strong>${SHIFTS[covType].name} (${SHIFTS[covType].time})</strong></div>`;
      } else if(ABSENCES[covType]){
        h+=`<div style="padding:6px 10px;background:rgba(239,68,68,.1);border-radius:6px;font-size:12px;color:var(--danger)">❌ ${covEmp.name} tiene <strong>${ABSENCES[covType].name}</strong> — no puede cubrirte</div>`;
      }
    }
  } else {
    // Shift change: show what I'd be changing to
    const newShift=document.getElementById('swShift')?.value;
    if(newShift&&SHIFTS[newShift]&&SHIFTS[myShift]){
      h+=`<div style="padding:6px 10px;background:rgba(99,102,241,.1);border-radius:6px;font-size:12px;color:var(--accent2)">
        Cambio: ${SHIFTS[myShift].name} → <strong>${SHIFTS[newShift].name} (${SHIFTS[newShift].time})</strong>
      </div>`;
    }
  }
  p.innerHTML=h;
}

async function submitSwap(){
  const type=document.getElementById('swType').value;
  const ds=document.getElementById('swDate').value;
  const reason=document.getElementById('swReason').value;
  if(!ds){showToast('Selecciona fecha','error');return}
  
  const d=new Date(ds+'T12:00:00');
  const myShift=getAssign(d,currentEmpId);
  
  if(type==='day'){
    const covId=document.getElementById('swCover').value;
    if(!covId){showToast('Selecciona quién te cubre','error');return}
    const sw={id:crypto.randomUUID(),requester_id:currentEmpId,cover_id:covId,date:ds,requester_shift:myShift.type,swap_type:'day',status:'pending',reason,created_at:new Date().toISOString(),resolved_at:null,return_date:null,return_resolved:false};
    state.swapRequests.unshift(sw);
    await db.from('swap_requests').insert(sw);
    showToast('✅ Solicitud enviada — pendiente de aprobación','success');
  } else {
    const newShift=document.getElementById('swShift').value;
    const sw={id:crypto.randomUUID(),requester_id:currentEmpId,cover_id:currentEmpId,date:ds,requester_shift:myShift.type,swap_type:'shift',new_shift:newShift,status:'pending',reason,created_at:new Date().toISOString(),resolved_at:null,return_date:null,return_resolved:true};
    state.swapRequests.unshift(sw);
    await db.from('swap_requests').insert(sw);
    showToast('✅ Solicitud de cambio de turno enviada','success');
  }
  renderSwap();
}

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3500)}
</script>
