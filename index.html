function openAbsenceModal(eid='',ds='',at=''){if(currentUser?.role==='viewer'){showToast('Sin permisos de edición','error');return}
  const today=fmtDate(new Date()),eo=employees.map(e=>`<option value="${e.id}"${e.id===eid?' selected':''}>${e.name}</option>`).join(''),to=Object.entries(ABSENCES).filter(([k])=>k!=='swap').map(([k,v])=>`<option value="${k}"${k===at?' selected':''}>${v.name}</option>`).join('');
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><h3>📋 Registrar Ausencia</h3><div class="modal-field"><label>Empleado</label><select id="absEmp">${eo}</select></div><div class="modal-field"><label>Tipo</label><select id="absType">${to}</select></div><div class="modal-field"><label>Fecha inicio</label><input type="date" id="absStart" value="${ds||today}"></div><div class="modal-field"><label>Fecha fin (vacío = indeterminada)</label><input type="date" id="absEnd" value="${ds||''}"></div><div class="modal-field"><label>Notas</label><textarea id="absNotes" placeholder="Observaciones..."></textarea></div><div id="substitutionPanel"></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="previewSubstitutions()">Ver turnos a cubrir</button><button class="btn btn-success" onclick="saveAbsence()">Guardar ausencia</button></div></div></div>`}

function previewSubstitutions(){const eid=document.getElementById('absEmp').value,sd=document.getElementById('absStart').value,ed=document.getElementById('absEnd').value;if(!eid||!sd){showToast('Seleccione empleado y fecha','error');return}
  const emp=employees.find(e=>e.id===eid),end=ed?new Date(ed+'T12:00:00'):addDays(new Date(sd+'T12:00:00'),13);let d=new Date(sd+'T12:00:00'),html=`<div class="sub-panel"><h4>🔄 Turnos a cubrir para ${emp.name}</h4>`,has=false;
  while(d<=end){if(!isClosed(d)){const a=getAssign(d,eid);if(a.type&&SHIFTS[a.type]){has=true;const di=(d.getDay()+6)%7,sh=SHIFTS[a.type],ds2=fmtDate(d);
    html+=`<div class="sub-day"><div class="sub-day-title">${DAYS[di]} ${fmtShort(d)}</div><div class="sub-shift-needed"><span class="dot" style="background:${sh.color};width:8px;height:8px;border-radius:50%;display:inline-block"></span>${sh.name} (${sh.time})</div>`;
    const fc=findCandidates(d,a.type),sc=findSwapCandidates(d,a.type);
    if(fc.length){html+=`<div style="font-size:11px;color:var(--success);font-weight:600;margin:4px 0">Empleados libres:</div>`;for(const c of fc.slice(0,5)){let w=[];if(c.wouldExceed5days)w.push('⚠ perdería 2º libre');if(c.hasDebt)w.push('⚠ deuda');if(c.hasRestWarning)w.push('⚠ descanso');if(c.consecutive>=5)w.push(`⚠ ${c.consecutive+1}d seguidos`);const ws=w.length?`<div style="color:var(--warning);font-size:10px;margin-top:2px">${w.join(' · ')}</div>`:'';
      html+=`<div class="sub-candidate" style="${c.wouldExceed5days?'border-left:2px solid var(--warning)':''}"><div><span class="name">${c.employee.name}</span><span style="color:var(--text2);font-size:11px;margin-left:4px">(${c.weekWorkDays}d/sem · ${c.weekHours}h)</span>${ws}</div><button class="assign-btn" onclick="assignSub('${ds2}','${c.employee.id}','${a.type}')">Asignar</button></div>`}}
    if(sc.length){html+=`<div style="font-size:11px;color:var(--accent2);font-weight:600;margin:6px 0 4px">Cambio de turno posible:</div>`;for(const c of sc.slice(0,3))html+=`<div class="sub-candidate"><div><span class="name">${c.employee.name}</span><span style="color:var(--text2);font-size:11px;margin-left:4px">(actual: ${SHIFTS[c.currentShift].name})</span></div><button class="assign-btn" style="background:var(--accent2)" onclick="assignSwapSub('${ds2}','${c.employee.id}','${a.type}','${c.currentShift}')">Cambiar</button></div>`}
    if(!fc.length&&!sc.length)html+=`<div class="sub-no-candidate">⚠ Sin candidatos</div>`;html+='</div>'}}d=addDays(d,1)}
  if(!has)html+='<div style="color:var(--text3);font-size:12px;padding:8px">Sin turnos en este período.</div>';html+='</div>';document.getElementById('substitutionPanel').innerHTML=html}

async function assignSub(ds,eid,st){const d=new Date(ds+'T12:00:00'),al=validate(d,eid,st).filter(a=>a.type==='error');if(al.length&&!confirm('⚠\n\n'+al.map(e=>e.msg).join('\n')+'\n\n¿Asignar?'))return;
  state.assignments[aKey(d,eid)]={type:st,modified:true,reason:'Sustitución'};checkAndCreateDebt(d,eid);await dbSaveAssignment(d,eid,st,'Sustitución');
  await addLog(eid,fmtDate(d),'free',st,'Sustitución por ausencia');showToast(`✅ ${employees.find(e=>e.id===eid).name} asignado`,'success');previewSubstitutions();renderSchedule();renderAlerts();renderSidebarCoverage()}

async function assignSwapSub(ds,eid,ns,os){const d=new Date(ds+'T12:00:00'),al=validate(d,eid,ns).filter(a=>a.type==='error');if(al.length&&!confirm('⚠\n\n'+al.map(e=>e.msg).join('\n')+'\n\n¿Cambiar?'))return;
  state.assignments[aKey(d,eid)]={type:ns,modified:true,reason:`Cambio ${SHIFTS[os].name}→${SHIFTS[ns].name}`};await dbSaveAssignment(d,eid,ns,`Cambio turno cobertura`);
  await addLog(eid,fmtDate(d),os,ns,'Cambio turno por cobertura');showToast(`✅ ${employees.find(e=>e.id===eid).name}: ${SHIFTS[os].name}→${SHIFTS[ns].name}`,'success');previewSubstitutions();renderSchedule();renderAlerts();renderSidebarCoverage()}

async function saveAbsence(){const eid=document.getElementById('absEmp').value,type=document.getElementById('absType').value,sd=document.getElementById('absStart').value,ed=document.getElementById('absEnd').value,notes=document.getElementById('absNotes').value;
  if(!eid||!type||!sd){showToast('Complete campos','error');return}
  const absence={id:crypto.randomUUID(),employee_id:eid,type,start_date:sd,end_date:ed||null,status:'approved',notes,created_by:currentUser?.display_name||'',created_at:new Date().toISOString()};
  state.absences.push(absence);

function toggleSwapType(){

  document.getElementById('swShiftFields').style.display=t==='shift'?'block':'none';

function loadShiftSwapCandidates(){
  const rid=document.getElementById('swReq').value;
  const ds=document.getElementById('swDate').value;
  const desiredShift=document.getElementById('swNewShift').value;
  const panel=document.getElementById('swShiftCandidates');
  if(!rid||!ds||!desiredShift){panel.innerHTML='';return}
  
  const d=new Date(ds+'T12:00:00');
  const ra=getAssign(d,rid);
  const re=employees.find(e=>e.id===rid);
  const reqShift=ra.type;
  
  if(!reqShift||!SHIFTS[reqShift]){panel.innerHTML=`<div style="font-size:12px;color:var(--warning);padding:8px">⚠ ${re.name} no tiene turno ese día</div>`;return}
  if(reqShift===desiredShift){panel.innerHTML=`<div style="font-size:12px;color:var(--text3);padding:8px">${re.name} ya tiene ese turno</div>`;return}
  
  // Find employees who work the desired shift and could take the requester's shift
  const tardeSh=['afternoon','closing','afternoon_14_22','jesus_fri','jesus_sun'];
  const candidates=[];
  for(const emp of employees){
    if(emp.id===rid)continue;
    const ea=getAssign(d,emp.id);
    if(!ea.type||!SHIFTS[ea.type])continue;
    // This employee works a shift — could they swap?
    if(ea.type===desiredShift||
       (tardeSh.includes(ea.type)&&tardeSh.includes(desiredShift))||
       ea.type===desiredShift){
      // Check if the candidate can do the requester's old shift
      const alForCandidate=validate(d,emp.id,reqShift);
      const alForReq=validate(d,rid,ea.type);
      const blC=alForCandidate.filter(a=>a.type==='block');
      const blR=alForReq.filter(a=>a.type==='block');
      const erC=alForCandidate.filter(a=>a.type==='error');
      const erR=alForReq.filter(a=>a.type==='error');
      candidates.push({emp,currentShift:ea.type,blocksC:blC,blocksR:blR,errorsC:erC,errorsR:erR,valid:blC.length===0&&blR.length===0});
    }
  }
  
  // Also find employees who are free and could take the requester's old shift (requester gets desired)
  const freeCandidates=[];
  for(const emp of employees){
    if(emp.id===rid)continue;
    const ea=getAssign(d,emp.id);
    if(ea.type&&ea.type!=='free')continue;
    // Free employee takes requester's old shift
    const alFree=validate(d,emp.id,reqShift);
    const blF=alFree.filter(a=>a.type==='block');
    const erF=alFree.filter(a=>a.type==='error');
    // Check requester can do desired shift
    const alReq=validate(d,rid,desiredShift);
    const blR=alReq.filter(a=>a.type==='block');
    freeCandidates.push({emp,blocksF:blF,blocksR:blR,errorsF:erF,valid:blF.length===0&&blR.length===0});
  }
  
  let h=`<div style="margin-top:12px;padding-top:8px;border-top:1px solid var(--border)">`;
  h+=`<div style="font-size:12px;padding:6px 8px;background:var(--bg3);border-radius:4px;margin-bottom:8px">${re.name}: <strong style="color:${SHIFTS[reqShift].color}">${SHIFTS[reqShift].name}</strong> → quiere <strong style="color:${SHIFTS[desiredShift].color}">${SHIFTS[desiredShift].name}</strong></div>`;
  
  // Show swap candidates (employees who work desired shift)
  const validSwaps=candidates.filter(c=>c.valid);
  const invalidSwaps=candidates.filter(c=>!c.valid);
  if(validSwaps.length){
    h+=`<div style="font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:6px">🔄 Pueden intercambiar turno:</div>`;
    for(const c of validSwaps){
      const warns=[...c.errorsC,...c.errorsR];
      const warnHtml=warns.length?`<div style="color:var(--warning);font-size:10px;margin-top:2px">${warns.map(w=>w.msg).join(' · ')}</div>`:'';
      h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:var(--bg);border-radius:4px;margin-bottom:3px">
        <div><strong>${c.emp.name}</strong> <span style="color:var(--text3);font-size:11px">(actual: ${SHIFTS[c.currentShift].name})</span>${warnHtml}</div>
        <button class="btn btn-sm" style="font-size:10px;background:var(--accent);color:#fff;border:none" onclick="executeShiftSwap('${ds}','${rid}','${c.emp.id}','${reqShift}','${c.currentShift}')">Intercambiar</button>
      </div>`;
    }
  }
  
  // Show free candidates
  const validFree=freeCandidates.filter(c=>c.valid);
  if(validFree.length){
    h+=`<div style="font-size:11px;font-weight:700;color:var(--success);margin:8px 0 6px">✅ Empleados libres (cubren ${SHIFTS[reqShift].name}, ${re.name} pasa a ${SHIFTS[desiredShift].name}):</div>`;
    for(const c of validFree.slice(0,5)){
      h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:var(--bg);border-radius:4px;margin-bottom:3px">
        <div><strong>${c.emp.name}</strong> <span style="color:var(--text3);font-size:11px">(libre → ${SHIFTS[reqShift].name})</span></div>
        <button class="btn btn-sm" style="font-size:10px;background:var(--success);color:#fff;border:none" onclick="executeShiftSwapFree('${ds}','${rid}','${c.emp.id}','${reqShift}','${desiredShift}')">Asignar</button>
      </div>`;
    }
  }
  
  if(!validSwaps.length&&!validFree.length){
    h+=`<div style="font-size:12px;color:var(--danger);font-style:italic;padding:8px">⚠ Sin candidatos válidos para este intercambio</div>`;
    if(invalidSwaps.length){
      h+=`<div style="font-size:10px;color:var(--text3);padding:4px 8px">Rechazados: ${invalidSwaps.map(c=>c.emp.name+' ('+c.blocksC.concat(c.blocksR).map(b=>b.msg).join(', ')+')').join('; ')}</div>`;
    }
  }
  h+=`</div>`;
  panel.innerHTML=h;
}

function validateSwapPrev(){const rid=document.getElementById('swReq').value,ds=document.getElementById('swDate').value,swType=document.getElementById('swType').value,p=document.getElementById('swVal');if(!rid||!ds){p.innerHTML='';return}
  const d=new Date(ds+'T12:00:00'),ra=getAssign(d,rid),re=employees.find(e=>e.id===rid);let h='';
  if(ra.type&&SHIFTS[ra.type])h+=`<div style="font-size:12px;padding:6px 8px;background:var(--bg3);border-radius:4px;margin-bottom:6px">${re.name}: <strong style="color:${SHIFTS[ra.type].color}">${SHIFTS[ra.type].name} (${SHIFTS[ra.type].time})</strong></div>`;
  else h+=`<div style="font-size:12px;color:var(--warning);padding:6px 8px;background:rgba(245,158,11,.1);border-radius:4px;margin-bottom:6px">⚠ ${re.name} no tiene turno ese día</div>`;
  
  if(swType==='day'){
    const cid=document.getElementById('swCov').value;
    if(cid&&cid!==rid&&ra.type&&SHIFTS[ra.type]){const ce=employees.find(e=>e.id===cid),ca=getAssign(d,cid),al=validate(d,cid,ra.type),bl=al.filter(a=>a.type==='block'),er=al.filter(a=>a.type==='error');
      if(ca.type==='free')h+=`<div style="font-size:12px;color:var(--success);padding:4px 8px">✅ ${ce.name} libre — puede cubrir</div>`;
      else if(SHIFTS[ca.type])h+=`<div style="font-size:12px;color:var(--warning);padding:4px 8px">⚠ ${ce.name} tiene ${SHIFTS[ca.type].name}</div>`;
      for(const b of bl)h+=`<div style="font-size:12px;color:var(--danger);padding:4px 8px">🚫 ${b.msg}</div>`;for(const e of er)h+=`<div style="font-size:12px;color:var(--warning);padding:4px 8px">⚠ ${e.msg}</div>`}
  } else {
    const ns=document.getElementById('swNewShift').value;
    if(ns&&SHIFTS[ns]){const al=validate(d,rid,ns),bl=al.filter(a=>a.type==='block'),er=al.filter(a=>a.type==='error');
      h+=`<div style="font-size:12px;padding:4px 8px;color:var(--accent2)">Cambio: ${SHIFTS[ra.type]?.name||'?'} → <strong>${SHIFTS[ns].name} (${SHIFTS[ns].time})</strong></div>`;
      for(const b of bl)h+=`<div style="font-size:12px;color:var(--danger);padding:4px 8px">🚫 ${b.msg}</div>`;for(const e of er)h+=`<div style="font-size:12px;color:var(--warning);padding:4px 8px">⚠ ${e.msg}</div>`}
  }
  p.innerHTML=h}

async function executeShiftSwap(ds,reqId,covId,reqShift,covShift){
  const re=employees.find(e=>e.id===reqId),ce=employees.find(e=>e.id===covId);
  if(!confirm(`¿Intercambiar turnos?\n\n${re.name}: ${SHIFTS[reqShift].name} → ${SHIFTS[covShift].name}\n${ce.name}: ${SHIFTS[covShift].name} → ${SHIFTS[reqShift].name}`))return;
  const d=new Date(ds+'T12:00:00');
  const reason=document.getElementById('swReason')?.value||'';
  state.assignments[aKey(d,reqId)]={type:covShift,modified:true,reason:`Intercambio con ${ce.name}`};
  state.assignments[aKey(d,covId)]={type:reqShift,modified:true,reason:`Intercambio con ${re.name}`};
  await dbSaveAssignment(d,reqId,covShift,`Intercambio turno con ${ce.name}`);
  await dbSaveAssignment(d,covId,reqShift,`Intercambio turno con ${re.name}`);
  await addLog(reqId,ds,reqShift,covShift,`Intercambio turno con ${ce.name}. ${reason}`);
  await addLog(covId,ds,covShift,reqShift,`Intercambio turno con ${re.name}. ${reason}`);
  const sw={id:crypto.randomUUID(),requester_id:reqId,cover_id:covId,date:ds,requester_shift:reqShift,swap_type:'shift',new_shift:covShift,status:'approved',reason,created_at:new Date().toISOString(),resolved_at:new Date().toISOString(),return_date:null,return_resolved:true};
  state.swapRequests.push(sw);await db.from('swap_requests').insert(sw);
  closeModal();renderAll();showToast(`✅ Intercambio: ${re.name}(${SHIFTS[covShift].name}) ↔ ${ce.name}(${SHIFTS[reqShift].name})`,'success');
}

async function executeShiftSwapFree(ds,reqId,freeId,reqOldShift,reqNewShift){
  const re=employees.find(e=>e.id===reqId),fe=employees.find(e=>e.id===freeId);
  if(!confirm(`¿Aplicar cambio?\n\n${re.name}: ${SHIFTS[reqOldShift].name} → ${SHIFTS[reqNewShift].name}\n${fe.name}: libre → ${SHIFTS[reqOldShift].name}`))return;
  const d=new Date(ds+'T12:00:00');

  state.assignments[aKey(d,reqId)]={type:reqNewShift,modified:true,reason:`Cambio turno, ${fe.name} cubre`};
  state.assignments[aKey(d,freeId)]={type:reqOldShift,modified:true,reason:`Cubre turno de ${re.name}`};
  await dbSaveAssignment(d,reqId,reqNewShift,`Cambio turno`);
  await dbSaveAssignment(d,freeId,reqOldShift,`Cubre ${re.name}`);

  state.swapRequests.push(sw);await db.from('swap_requests').insert(sw);
  closeModal();renderAll();showToast(`✅ ${re.name}→${SHIFTS[reqNewShift].name}, ${fe.name}→${SHIFTS[reqOldShift].name}`,'success');
}

async function saveSwapReq(status){
  const swType=document.getElementById('swType').value;
  const rid=document.getElementById('swReq').value,ds=document.getElementById('swDate').value,reason=document.getElementById('swReason').value;
  if(!rid||!ds){showToast('Rellene empleado y fecha','error');return}
  const d=new Date(ds+'T12:00:00'),ra=getAssign(d,rid),re=employees.find(e=>e.id===rid);
  
  if(swType==='shift'){
    // Shift change: employee changes their own shift type, no cover needed, no debt
    const ns=document.getElementById('swNewShift').value;
    if(!ns){showToast('Seleccione nuevo turno','error');return}
    const oldShift=ra.type;
    state.assignments[aKey(d,rid)]={type:ns,modified:true,reason:`Cambio turno: ${SHIFTS[oldShift]?.name||'?'}→${SHIFTS[ns].name}`};
    await dbSaveAssignment(d,rid,ns,`Cambio turno solicitado`);
    await addLog(rid,ds,oldShift,ns,`Cambio turno: ${reason||'Solicitud empleado'}`);
    const sw={id:crypto.randomUUID(),requester_id:rid,cover_id:rid,date:ds,requester_shift:oldShift,swap_type:'shift',new_shift:ns,status:'approved',reason,created_at:new Date().toISOString(),resolved_at:new Date().toISOString(),return_date:null,return_resolved:true};
    state.swapRequests.push(sw);await db.from('swap_requests').insert(sw);
    closeModal();renderAll();showToast(`✅ ${re.name}: ${SHIFTS[oldShift]?.name||'?'} → ${SHIFTS[ns].name}`,'success');
  } else {
    // Day swap: someone covers, debt generated
    const cid=document.getElementById('swCov').value;
    if(!cid){showToast('Seleccione quién cubre','error');return}if(rid===cid){showToast('Mismo empleado','error');return}
    const ce=employees.find(e=>e.id===cid);
    const returnDate=document.getElementById('swReturn').value||null;
    const sw={id:crypto.randomUUID(),requester_id:rid,cover_id:cid,date:ds,requester_shift:ra.type,swap_type:'day',status,reason,created_at:new Date().toISOString(),resolved_at:status==='approved'?new Date().toISOString():null,return_date:returnDate,return_resolved:!!returnDate};
    state.swapRequests.push(sw);await db.from('swap_requests').insert(sw);
    if(status==='approved'){
      state.assignments[aKey(d,rid)]={type:'swap',modified:true,reason:`Cambio con ${ce.name}`};await dbSaveAssignment(d,rid,'swap',`Cambio con ${ce.name}`);
      if(ra.type&&SHIFTS[ra.type]){state.assignments[aKey(d,cid)]={type:ra.type,modified:true,reason:`Cubre a ${re.name}`};await dbSaveAssignment(d,cid,ra.type,`Cubre a ${re.name}`);checkAndCreateDebt(d,cid)}
      if(returnDate){
        // Auto-mark the return day
        const rd=new Date(returnDate+'T12:00:00'),rca=getAssign(rd,cid);
        if(rca.type&&SHIFTS[rca.type]){
          state.assignments[aKey(rd,rid)]={type:rca.type,modified:true,reason:`Devuelve día a ${ce.name}`};
          await dbSaveAssignment(rd,rid,rca.type,`Devolución de cambio`);
          state.assignments[aKey(rd,cid)]={type:'free',modified:true,reason:`Libre por devolución de ${re.name}`};
          await dbSaveAssignment(rd,cid,'free',`Libre por devolución`);
        }
      }
    }
    await addLog(rid,ds,ra.type||'free','swap',`Cambio día: ${re.name}→${ce.name}. ${status==='approved'?'Aprobado':'Pendiente'}. ${reason}`);
    closeModal();renderAll();showToast(status==='approved'?`✅ Cambio aprobado: ${re.name} ↔ ${ce.name}`:'📋 Registrado como pendiente','success');
  }
}

async function approveSwap(id){const sw=state.swapRequests.find(s=>s.id===id);if(!sw)return;sw.status='approved';sw.resolved_at=new Date().toISOString();
  const d=new Date(sw.date+'T12:00:00'),re=employees.find(e=>e.id===sw.requester_id),ce=employees.find(e=>e.id===sw.cover_id),ra=getAssign(d,sw.requester_id);
  state.assignments[aKey(d,sw.requester_id)]={type:'swap',modified:true,reason:`Cambio con ${ce.name}`};await dbSaveAssignment(d,sw.requester_id,'swap',`Cambio con ${ce.name}`);
  if(sw.requester_shift&&SHIFTS[sw.requester_shift]){state.assignments[aKey(d,sw.cover_id)]={type:sw.requester_shift,modified:true,reason:`Cubre a ${re.name}`};await dbSaveAssignment(d,sw.cover_id,sw.requester_shift,`Cubre a ${re.name}`);checkAndCreateDebt(d,sw.cover_id)}
  await db.from('swap_requests').update({status:'approved',resolved_at:sw.resolved_at}).eq('id',id);
  await addLog(sw.requester_id,sw.date,'pending','approved',`Cambio aprobado: ${re.name}↔${ce.name}`);
  renderAll();showToast(`✅ Aprobado: ${re.name} ↔ ${ce.name}`,'success')}

async function rejectSwap(id){if(!confirm('¿Rechazar?'))return;const sw=state.swapRequests.find(s=>s.id===id);if(!sw)return;sw.status='rejected';sw.resolved_at=new Date().toISOString();await db.from('swap_requests').update({status:'rejected',resolved_at:sw.resolved_at}).eq('id',id);renderAll();showToast('Rechazado','success')}

async function markSwapReturned(id){const sw=state.swapRequests.find(s=>s.id===id);if(!sw)return;sw.return_resolved=true;sw.return_date=fmtDate(new Date());await db.from('swap_requests').update({return_resolved:true,return_date:sw.return_date}).eq('id',id);renderAll();showToast('Devolución registrada ✓','success')}

  sh+='</table></div>';document.getElementById('swapStats').innerHTML=sh;
  const pending=getPendingSwaps();let ph='';if(pending.length){ph=`<div style="margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;color:var(--warning);margin-bottom:10px">⏳ Pendientes (${pending.length})</h3>`;
    for(const s of pending){const re=employees.find(e=>e.id===s.requester_id),ce=employees.find(e=>e.id===s.cover_id),sh2=SHIFTS[s.requester_shift];

  document.getElementById('swapPending').innerHTML=ph;
  const badge=document.getElementById('swapBadge');if(pending.length){badge.textContent=pending.length;badge.style.display='inline-flex'}else badge.style.display='none';
  const resolved=state.swapRequests.filter(s=>s.status!=='pending').sort((a,b)=>(b.resolved_at||b.created_at).localeCompare(a.resolved_at||a.created_at));
  let rh=`<h3 style="font-size:14px;font-weight:700;margin-bottom:10px">Historial</h3>`;if(!resolved.length)rh+='<div style="color:var(--text3);font-size:12px">Sin cambios aún.</div>';
  else for(const s of resolved){const re=employees.find(e=>e.id===s.requester_id),ce=employees.find(e=>e.id===s.cover_id),ok=s.status==='approved',col=ok?'var(--success)':'var(--danger)';
    rh+=`<div style="background:var(--bg2);border-radius:6px;padding:10px;margin-bottom:6px;border-left:3px solid ${col};font-size:12px"><div style="display:flex;justify-content:space-between;align-items:center"><div><span style="font-weight:600">${re.name}</span> → <span style="font-weight:600">${ce.name}</span> · ${s.date} <span style="color:${col};font-weight:600;margin-left:8px">${ok?'Aprobado':'Rechazado'}</span>${s.reason?` · <span style="color:var(--text3);font-style:italic">${s.reason}</span>`:''}</div><div>${ok&&!s.return_resolved?`<button class="btn btn-sm" style="font-size:10px" onclick="markSwapReturned('${s.id}')">✓ Devuelto</button>`:''}${s.return_resolved?'<span style="color:var(--success);font-size:11px">✓ Devuelto</span>':''}</div></div></div>`}
  document.getElementById('swapHistory').innerHTML=rh}

function generateEndaliaExcel() {
  const startDate = document.getElementById('endStart').value;
  const endDate = document.getElementById('endEnd').value;
  if (!startDate || !endDate) { showToast('Selecciona rango de fechas','error'); return; }

  const inclSchedule = document.getElementById('endChkSchedule').checked;
  const inclVacation = document.getElementById('endChkVacation').checked;
  const inclSick = document.getElementById('endChkSick').checked;
  const inclPermission = document.getElementById('endChkPermission').checked;
  const inclPaternity = document.getElementById('endChkPaternity').checked;
  const inclSwaps = document.getElementById('endChkSwaps').checked;

  const wb = XLSX.utils.book_new();
  const start = new Date(startDate + 'T12:00:00');
  const end = new Date(endDate + 'T12:00:00');

  // ---- SHEET 1: HORARIOS / TURNOS ASIGNADOS ----
  if (inclSchedule) {
    const rows = [];
    let d = new Date(start);
    while (d <= end) {
      if (!isClosed(d)) {
        for (const emp of employees) {
          const a = getAssign(d, emp.id);
          if (a.type && SHIFTS[a.type]) {
            const sh = SHIFTS[a.type];
            const dow = (d.getDay()+6)%7;
            rows.push({
              'Empleado': emp.name,
              'ID Empleado': emp.id,
              'Fecha': fmtDate(d),
              'Día': DAYS[dow],
              'Turno': sh.name,
              'Hora Inicio': sh.time.split('-')[0],
              'Hora Fin': sh.time.split('-')[1],
              'Horas': 8,
              'Modificado': a.modified ? 'Sí' : 'No',
              'Motivo cambio': a.reason || ''
            });
          }
        }
      }
      d = addDays(d, 1);
    }
    if (rows.length) {
      const ws = XLSX.utils.json_to_sheet(rows);
      ws['!cols'] = [{wch:15},{wch:12},{wch:12},{wch:12},{wch:10},{wch:12},{wch:12},{wch:6},{wch:10},{wch:30}];
      XLSX.utils.book_append_sheet(wb, ws, 'Turnos Asignados');
    }
  }

  // ---- SHEET 2: VACACIONES ----
  if (inclVacation) {
    const rows = state.absences
      .filter(a => a.type === 'vacation' && a.status === 'approved' && a.start_date <= endDate && (!a.end_date || a.end_date >= startDate))
      .map(a => {
        const emp = employees.find(e => e.id === a.employee_id);
        const sd = new Date(a.start_date + 'T12:00:00');
        const ed = a.end_date ? new Date(a.end_date + 'T12:00:00') : null;
        const days = ed ? Math.round((ed - sd) / 864e5) + 1 : '?';
        return {
          'Empleado': emp?.name || a.employee_id,
          'ID Empleado': a.employee_id,
          'Tipo': 'Vacaciones',
          'Fecha Inicio': a.start_date,
          'Fecha Fin': a.end_date || 'Indeterminada',
          'Días': days,
          'Estado': 'Aprobada',
          'Notas': a.notes || ''
        };
      });
    const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{'Info':'Sin vacaciones en este período'}]);
    ws['!cols'] = [{wch:15},{wch:12},{wch:12},{wch:12},{wch:14},{wch:6},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws, 'Vacaciones');
  }

  // ---- SHEET 3: BAJAS MÉDICAS ----
  if (inclSick) {
    const rows = state.absences
      .filter(a => a.type === 'sick' && a.status === 'approved' && a.start_date <= endDate && (!a.end_date || a.end_date >= startDate))
      .map(a => {
        const emp = employees.find(e => e.id === a.employee_id);
        return {
          'Empleado': emp?.name || a.employee_id,
          'ID Empleado': a.employee_id,
          'Tipo': 'Baja médica',
          'Fecha Inicio': a.start_date,
          'Fecha Fin': a.end_date || 'Indeterminada',
          'Estado': 'Aprobada',
          'Notas': a.notes || ''
        };
      });
    const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{'Info':'Sin bajas médicas en este período'}]);
    ws['!cols'] = [{wch:15},{wch:12},{wch:14},{wch:12},{wch:14},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws, 'Bajas Médicas');
  }

  // ---- SHEET 4: PERMISOS ----
  if (inclPermission) {
    const rows = state.absences
      .filter(a => a.type === 'permission' && a.status === 'approved' && a.start_date <= endDate && (!a.end_date || a.end_date >= startDate))
      .map(a => {
        const emp = employees.find(e => e.id === a.employee_id);
        return {
          'Empleado': emp?.name || a.employee_id,
          'ID Empleado': a.employee_id,
          'Tipo': 'Permiso personal',
          'Fecha Inicio': a.start_date,
          'Fecha Fin': a.end_date || a.start_date,
          'Estado': 'Aprobada',
          'Notas': a.notes || ''
        };
      });
    const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{'Info':'Sin permisos en este período'}]);
    ws['!cols'] = [{wch:15},{wch:12},{wch:16},{wch:12},{wch:12},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws, 'Permisos');
  }

  // ---- SHEET 5: PATERNIDAD / MATERNIDAD ----
  if (inclPaternity) {
    const rows = state.absences
      .filter(a => a.type === 'paternity' && a.status === 'approved' && a.start_date <= endDate && (!a.end_date || a.end_date >= startDate))
      .map(a => {
        const emp = employees.find(e => e.id === a.employee_id);
        return {
          'Empleado': emp?.name || a.employee_id,
          'ID Empleado': a.employee_id,
          'Tipo': 'Paternidad/Maternidad',
          'Fecha Inicio': a.start_date,
          'Fecha Fin': a.end_date || 'Indeterminada',
          'Estado': 'Aprobada',
          'Notas': a.notes || ''
        };
      });
    const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{'Info':'Sin permisos de paternidad/maternidad en este período'}]);
    ws['!cols'] = [{wch:15},{wch:12},{wch:22},{wch:12},{wch:14},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws, 'Paternidad-Maternidad');
  }

  // ---- SHEET 6: CAMBIOS DE TURNO ENTRE EMPLEADOS ----
  if (inclSwaps) {
    const rows = state.swapRequests
      .filter(s => s.status === 'approved' && s.date >= startDate && s.date <= endDate)
      .map(s => {
        const req = employees.find(e => e.id === s.requester_id);
        const cov = employees.find(e => e.id === s.cover_id);
        const sh = SHIFTS[s.requester_shift];
        return {
          'Solicitante': req?.name || s.requester_id,
          'ID Solicitante': s.requester_id,
          'Quien cubre': cov?.name || s.cover_id,
          'ID Cobertura': s.cover_id,
          'Fecha': s.date,
          'Turno cubierto': sh ? sh.name + ' (' + sh.time + ')' : s.requester_shift,
          'Motivo': s.reason || '',
          'Día devuelto': s.return_resolved ? 'Sí (' + (s.return_date||'') + ')' : 'Pendiente'
        };
      });
    const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{'Info':'Sin cambios aprobados en este período'}]);
    ws['!cols'] = [{wch:15},{wch:14},{wch:15},{wch:14},{wch:12},{wch:22},{wch:25},{wch:18}];
    XLSX.utils.book_append_sheet(wb, ws, 'Cambios Turno');
  }

  // ---- SHEET 7: RESUMEN POR EMPLEADO (siempre incluido) ----
  const summaryRows = [];
  for (const emp of employees) {
    let totalHours = 0, workDays = 0, freeDays = 0;
    let mornings = 0, mids = 0, afternoons = 0, closings = 0;
    let d = new Date(start);
    while (d <= end) {
      if (!isClosed(d)) {
        const a = getAssign(d, emp.id);
        if (a.type && SHIFTS[a.type]) {
          totalHours += 8; workDays++;
          if (a.type === 'morning') mornings++;
          else if (a.type === 'mid') mids++;
          else if (a.type === 'afternoon') afternoons++;
          else if (a.type === 'closing') closings++;
        } else { freeDays++; }
      }
      d = addDays(d, 1);
    }
    const vacDays = state.absences.filter(a => a.employee_id === emp.id && a.type === 'vacation' && a.status === 'approved').length;
    const sickDays = state.absences.filter(a => a.employee_id === emp.id && a.type === 'sick' && a.status === 'approved').length;
    const swapsReq = state.swapRequests.filter(s => s.requester_id === emp.id && s.status === 'approved' && s.date >= startDate && s.date <= endDate).length;

    summaryRows.push({
      'Empleado': emp.name,
      'ID': emp.id,
      'Días trabajados': workDays,
      'Días libres': freeDays,
      'Total horas': totalHours,
      'T. Mañana': mornings,
      'T. Medio': mids,
      'T. Tarde': afternoons,
      'T. Cierre': closings,
      'Vacaciones': vacDays,
      'Bajas': sickDays,
      'Cambios solicitados': swapsReq,
      'Restricciones': emp.restrictions.map(r => SHIFTS[r]?.name || r).join(', ') || 'Ninguna',
      'Notas': emp.notes || ''
    });
  }
  const wsSummary = XLSX.utils.json_to_sheet(summaryRows);
  wsSummary['!cols'] = [{wch:15},{wch:10},{wch:14},{wch:12},{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12},{wch:8},{wch:18},{wch:18},{wch:25}];
  XLSX.utils.book_append_sheet(wb, wsSummary, 'Resumen Empleados');

  // Download
  XLSX.writeFile(wb, `Endalia_SAC_${startDate}_${endDate}.xlsx`);
  closeModal();
  showToast('📤 Excel para Endalia descargado', 'success');
}

function generateScheduleExcel(){
  const sd=document.getElementById('schExpStart').value,ed=document.getElementById('schExpEnd').value;
  if(!sd||!ed){showToast('Selecciona fechas','error');return}
  
  const start=new Date(sd+'T12:00:00'),end=new Date(ed+'T12:00:00');
  const wb=XLSX.utils.book_new();
  const monthNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  
  // Styles
  const hdrStyle={font:{bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'2D3748'}},alignment:{horizontal:'center',vertical:'center',wrapText:true}};
  const hdrHolidayStyle={font:{bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'C0392B'}},alignment:{horizontal:'center',vertical:'center',wrapText:true}};
  const weekHdrStyle={font:{bold:true,sz:12,color:{rgb:'6366F1'}}};
  const empStyle={font:{bold:true,sz:11}};
  const cellStyle={font:{sz:10},alignment:{horizontal:'center'}};
  const mediosStyle={font:{bold:true,sz:10,color:{rgb:'000000'}},fill:{fgColor:{rgb:'FFB74D'}},alignment:{horizontal:'center'}};
  const absStyle={font:{sz:10,italic:true,color:{rgb:'E57373'}},alignment:{horizontal:'center'}};
  const freeStyle={font:{sz:10,color:{rgb:'999999'}},alignment:{horizontal:'center'}};
  const closedStyle={font:{sz:10,color:{rgb:'666666'}},alignment:{horizontal:'center'}};
  
  // Group weeks by month
  let weekStart=getMonday(start);
  const monthSheets={};
  
  while(weekStart<=end){
    const wDates=weekDates(weekStart);
    if(wDates[0]>end)break;
    const refD=addDays(weekStart,3);
    const mKey=refD.getFullYear()+'-'+String(refD.getMonth()+1).padStart(2,'0');
    const mName=monthNames[refD.getMonth()]+' '+refD.getFullYear();
    if(!monthSheets[mKey])monthSheets[mKey]={name:mName,weeks:[]};
    monthSheets[mKey].weeks.push(wDates);
    weekStart=addDays(weekStart,7);
  }
  
  for(const[mKey,mData] of Object.entries(monthSheets)){
    const rows=[];
    
    for(const wDates of mData.weeks){
      const cw=cycleWeek(wDates[0]);
      
      // Header row: Semana + day names with dates
      const hdrRow=[null,{v:'Semana '+(cw+1),s:weekHdrStyle}];
      for(let i=0;i<7;i++){
        const d=wDates[i];
        const dd=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
        const hol=isHoliday(d);
        const label=hol?DAYS[i]+'\n'+dd+'\n🔴 '+hol:DAYS[i]+'\n'+dd;
        hdrRow.push({v:label,s:hol?hdrHolidayStyle:hdrStyle});
      }
      rows.push(hdrRow);
      
      // Employee rows
      let empIdx=0;
      for(const emp of employees){
        let hasShift=false;
        for(let i=0;i<7;i++){
          const a=getAssign(wDates[i],emp.id);
          if(a.type&&a.type!=='inactive'&&a.type!=='free')hasShift=true;
        }
        if(!hasShift)continue;
        
        empIdx++;
        const row=[{v:empIdx,s:{font:{sz:10,color:{rgb:'999999'}}}},{v:emp.name,s:empStyle}];
        
        for(let i=0;i<7;i++){
          const d=wDates[i],ds=fmtDate(d);
          const a=getAssign(d,emp.id);
          const t=a.type;
          
          if(t==='closed'){
            row.push({v:'cerrado',s:closedStyle});
          } else if(t==='inactive'||!t||t==='free'){
            row.push({v:'',s:freeStyle});
          } else if(ABSENCES[t]){
            row.push({v:ABSENCES[t].name,s:absStyle});
          } else if(SHIFTS[t]){
            const task=getTaskAssign(ds,emp.id);
            const isMedios=task==='medios';
            row.push({v:SHIFTS[t].time,s:isMedios?mediosStyle:cellStyle});
          } else {
            row.push({v:t,s:cellStyle});
          }
        }
        rows.push(row);
      }
      
      // Separator between weeks
      rows.push([]);
      rows.push([]);
    }
    
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:4},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14}];
    
    const sheetName=mData.name.substring(0,31);
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
  }
  
  XLSX.writeFile(wb,`Horario_SAC_${sd}_${ed}.xlsx`);
  closeModal();
  showToast('📅 Horario Excel descargado','success');
}

// ===================== NAVIGATION =====================
let currentView='week';
function navigateWeek(dir){
  if(currentView==='month'){
    // Navigate by month
    const cur=state.currentWeekStart;
    const m=cur.getMonth()+dir;
    const newDate=new Date(cur.getFullYear(),m,1,12);
    state.currentWeekStart=getMonday(newDate);
    renderAll();
  } else {
    state.currentWeekStart=addDays(state.currentWeekStart,dir*7);renderAll();
  }
}
function goToToday(){state.currentWeekStart=getMonday(new Date());renderAll()}

function setView(mode){
  currentView=mode;
  document.getElementById('viewWeek').style.background=mode==='week'?'var(--accent)':'transparent';
  document.getElementById('viewWeek').style.color=mode==='week'?'#fff':'var(--text2)';
  document.getElementById('viewMonth').style.background=mode==='month'?'var(--accent)':'transparent';
  document.getElementById('viewMonth').style.color=mode==='month'?'#fff':'var(--text2)';
  document.getElementById('scheduleTable').style.display=mode==='week'?'':'none';
  document.getElementById('monthlyView').style.display=mode==='month'?'':'none';
  renderAll();
}

function renderMonthly(){
  const container=document.getElementById('monthlyView');
  if(currentView!=='month'||!container)return;
  
  // Determine month from current week start
  const refDate=addDays(state.currentWeekStart,3); // mid-week to get correct month
  const year=refDate.getFullYear(),month=refDate.getMonth();
  const monthNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dayAbbr=['L','M','X','J','V','S','D'];
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayStr=fmtDate(new Date());
  const filterEmp=document.getElementById('filterEmployee')?.value;
  
  // Update week label to show month
  document.getElementById('weekLabel').innerHTML=`<strong>${monthNames[month]} ${year}</strong>`;
  
  // Build dates array
  const dates=[];
  for(let i=1;i<=daysInMonth;i++) dates.push(new Date(year,month,i,12));
  
  const tardeSh=['afternoon','closing','afternoon_14_22','jesus_fri','jesus_sun'];
  const midSh=['mid','jesus_sat'];
  const ABBR={morning:'M',mid:'Me',afternoon:'T',closing:'C',afternoon_14_22:'T*',jesus_fri:'V',jesus_sat:'S',jesus_sun:'D'};
  
  const filteredEmps=filterEmp?employees.filter(e=>e.id===filterEmp):employees;
  
  // Header row: day numbers + day letters
  let h='<table class="month-table"><thead><tr><th style="min-width:80px"></th>';
  for(const d of dates){
    const dow=d.getDay();
    const isWe=dow===0||dow===6;
    const isToday=fmtDate(d)===todayStr;
    const isHol=isHoliday(d);
    h+=`<th class="${isWe?'weekend':''} ${isToday?'today-col':''} ${isHol?'holiday-col':''}" title="${isHol||''}">${d.getDate()}<br>${dayAbbr[(d.getDay()+6)%7]}${isHol?'<br>🔴':''}</th>`;
  }
  h+='</tr></thead><tbody>';
  
  // Employee rows
  for(const emp of filteredEmps){
    h+=`<tr><td class="emp-name-month">${emp.name}</td>`;
    for(const d of dates){
      const a=getAssign(d,emp.id);
      const t=a.type;
      const ds=fmtDate(d);
      let cls='',txt='';
      
      if(t==='closed'){cls='m-inactive';txt='·';}
      else if(t==='inactive'){cls='m-inactive';txt='';}
      else if(t==='free'||!t){cls='m-free';txt='·';}
      else if(t==='vacation'){cls='m-absent';txt='V';}
      else if(t==='sick'){cls='m-sick';txt='B';}
      else if(t==='paternity'){cls='m-absent';txt='P';}
      else if(t==='permission'){cls='m-absent';txt='Pe';}
      else if(t==='swap'){cls='m-absent';txt='↔';}
      else if(SHIFTS[t]){
        if(t==='morning')cls='m-morning';
        else if(midSh.includes(t))cls='m-mid';
        else if(tardeSh.includes(t))cls='m-afternoon';
        txt=ABBR[t]||t[0].toUpperCase();
      }
      
      h+=`<td><div class="month-cell ${cls}" title="${emp.name} ${ds}: ${SHIFTS[t]?.name||ABSENCES[t]?.name||t||'Libre'}" onclick="onMonthCellClick('${ds}','${emp.id}')">${txt}</div></td>`;
    }
    h+='</tr>';
  }
  
  // Coverage row
  h+='<tr style="border-top:2px solid var(--border)"><td class="emp-name-month" style="color:var(--text2);font-size:10px">Cobertura</td>';
  for(const d of dates){
    if(isClosed(d)){h+='<td></td>';continue}
    let mc=0,tc=0;
    for(const emp of employees){
      const a=getAssign(d,emp.id);
      if(a.type&&SHIFTS[a.type]){
        if(a.type==='morning')mc++;
        else if(tardeSh.includes(a.type))tc++;
      }
    }
    const mOk=mc>=3,tOk=tc>=3;
    const col=mOk&&tOk?'var(--success)':(!mOk||!tOk?'var(--danger)':'var(--warning)');
    h+=`<td><div class="month-cov" style="color:${col}" title="M:${mc}/3 T:${tc}/3">${mc}/${tc}</div></td>`;
  }
  h+='</tr>';
  
  h+='</tbody></table>';
  
  // Legend
  h+=`<div style="display:flex;gap:10px;padding:8px 0;font-size:10px;color:var(--text3);flex-wrap:wrap">
    <span><span class="month-cell m-morning" style="display:inline-block;width:16px;height:16px;font-size:9px">M</span> Mañana</span>
    <span><span class="month-cell m-mid" style="display:inline-block;width:16px;height:16px;font-size:9px">Me</span> Medio</span>
    <span><span class="month-cell m-afternoon" style="display:inline-block;width:16px;height:16px;font-size:9px">T</span> Tarde/Cierre</span>
    <span><span class="month-cell m-absent" style="display:inline-block;width:16px;height:16px;font-size:9px">V</span> Vacaciones</span>
    <span><span class="month-cell m-sick" style="display:inline-block;width:16px;height:16px;font-size:9px">B</span> Baja</span>
    <span><span class="month-cell m-free" style="display:inline-block;width:16px;height:16px;font-size:9px">·</span> Libre</span>
    <span>Cobertura: <span class="month-cov" style="color:var(--success)">M/T</span> (mañana/tarde)</span>
  </div>`;
  
  container.innerHTML=h;
}

function previewReset(){
  const sd=document.getElementById('resetStart').value,ed=document.getElementById('resetEnd').value,empId=document.getElementById('resetEmp').value;
  if(!sd||!ed){showToast('Selecciona fechas','error');return}
  let d=new Date(sd+'T12:00:00'),end=new Date(ed+'T12:00:00'),count=0,days=0;
  const targetEmps=empId==='all'?employees:employees.filter(e=>e.id===empId);
  while(d<=end){days++;for(const e of targetEmps){const k=aKey(d,e.id);if(state.assignments[k]||PRE_ASSIGN[aKey(d,e.id)])count++}d=addDays(d,1)}
  document.getElementById('resetPreview').innerHTML=`<div style="padding:8px;background:var(--bg3);border-radius:6px">Se resetearán <strong style="color:var(--text)">${count} asignaciones</strong> en <strong style="color:var(--text)">${days} días</strong> para <strong style="color:var(--text)">${targetEmps.length} empleado${targetEmps.length>1?'s':''}</strong>.</div>`;
}
async function executeReset(){
  const sd=document.getElementById('resetStart').value,ed=document.getElementById('resetEnd').value,empId=document.getElementById('resetEmp').value;
  if(!sd||!ed){showToast('Selecciona fechas','error');return}
  if(!confirm(`¿Restaurar rotación base del ${sd} al ${ed}${empId!=='all'?' para '+employees.find(e=>e.id===empId)?.name:''}? Se perderán todos los cambios manuales.`))return;
  let d=new Date(sd+'T12:00:00'),end=new Date(ed+'T12:00:00'),count=0;
  const targetEmps=empId==='all'?employees:employees.filter(e=>e.id===empId);
  while(d<=end){
    for(const e of targetEmps){
      const k=aKey(d,e.id);
      if(state.assignments[k]){delete state.assignments[k];count++}
      await db.from('assignments').delete().eq('date',fmtDate(d)).eq('employee_id',e.id);
    }
    d=addDays(d,1);
  }
  // Clear related debts for the reset period
  const resetStart=new Date(sd+'T12:00:00'),resetEnd=new Date(ed+'T12:00:00');
  let w=getMonday(resetStart);
  while(w<=resetEnd){
    const ws=fmtDate(w);
    for(const e of targetEmps){
      const did='auto_'+ws+'_'+e.id;
      state.dismissedDebts.add(did);
      state.dayDebts=state.dayDebts.filter(x=>x.id!==did);
    }
    w=addDays(w,7);
  }
  closeModal();renderAll();showToast(`⟳ Rotación restaurada: ${count} cambios eliminados`,'success');
}

async function loadFromDB(){
  const defaults=[...employees];
  const{data:emps}=await db.from('employees').select('*').eq('active',true).order('sort_order');
  if(emps&&emps.length){
    const dbEmps=emps.map(e=>({id:e.id,name:e.name,restrictions:e.restrictions||[],preferences:e.preferences||[],notes:e.notes||''}));
    // Merge: DB wins for existing, defaults fill gaps
    for(const de of defaults){if(!dbEmps.find(e=>e.id===de.id))dbEmps.push(de)}
    employees=dbEmps;
  }
  const{data:assigns}=await db.from('assignments').select('*');
  state.assignments={};if(assigns)for(const a of assigns)state.assignments[a.date+'_'+a.employee_id]={type:a.type,modified:true,reason:a.reason||''};
  const{data:abs}=await db.from('absences').select('*').eq('status','approved');state.absences=abs||[];
  const{data:swaps}=await db.from('swap_requests').select('*').order('created_at',{ascending:false});state.swapRequests=swaps||[];
  try{const{data:tasks}=await db.from('task_assignments').select('*');if(tasks)for(const t of tasks)state.taskAssigns[t.date+'_'+t.employee_id]=t.task_type}catch(e){}
  try{const{data:nf}=await db.from('night_festive_entries').select('*');state.nominaEntries=nf||[]}catch(e){state.nominaEntries=[]}
  const{data:debts}=await db.from('day_debts').select('*');state.dayDebts=debts||[];
  const{data:logs}=await db.from('changelog').select('*').order('ts',{ascending:false}).limit(200);state.changelog=logs||[];
}

// ===================== NOTIFICATIONS =====================
function generateNotifications(){
  const notifs=[];
  const today=new Date();today.setHours(12,0,0,0);
  const todayStr=fmtDate(today);
  const tardeSh=['afternoon','closing','afternoon_14_22','jesus_fri','jesus_sun'];
  
  // 1. Coverage gaps next 14 days
  let gapCount=0;const gapDays=[];
  for(let i=0;i<14;i++){
    const d=addDays(today,i);if(isClosed(d))continue;
    let mc=0,tc=0;
    for(const emp of employees){const a=getAssign(d,emp.id);if(a.type==='morning')mc++;else if(a.type&&tardeSh.includes(a.type))tc++}
    if(mc<3||tc<3){gapCount++;gapDays.push({date:fmtDate(d),day:DAYS[(d.getDay()+6)%7],m:mc,t:tc})}
  }
  if(gapCount)notifs.push({type:'error',icon:'🔴',title:`${gapCount} gap${gapCount>1?'s':''} de cobertura`,detail:gapDays.slice(0,3).map(g=>`${g.day} ${g.date.slice(5)}: M${g.m}/3 T${g.t}/3`).join(' · ')+(gapDays.length>3?` +${gapDays.length-3} más`:''),action:'schedule',priority:1});
  
  // 2. Pending swap requests
  const pending=state.swapRequests.filter(s=>s.status==='pending');
  if(pending.length)notifs.push({type:'warning',icon:'🟡',title:`${pending.length} cambio${pending.length>1?'s':''} pendiente${pending.length>1?'s':''}`,detail:pending.slice(0,2).map(s=>{const r=employees.find(e=>e.id===s.requester_id);return r?r.name:'?'}).join(', '),action:'swaps',priority:2});
  
  // 3. Old debts (>7 days)
  const oldDebts=state.dayDebts.filter(d=>!d.resolved);
  if(oldDebts.length)notifs.push({type:'warning',icon:'🟡',title:`${oldDebts.length} deuda${oldDebts.length>1?'s':''} sin resolver`,detail:oldDebts.slice(0,3).map(d=>{const e=employees.find(x=>x.id===d.employee_id);return e?e.name:'?'}).join(', '),action:'employees',priority:3});
  
  // 4. Employees over proportional hours target
  const dayOfYear=Math.floor((today-new Date(today.getFullYear(),0,1))/(86400000));
  const propTarget=Math.round(ANNUAL_HOURS*dayOfYear/365);
  const overEmps=[];
  for(const emp of employees){
    if(['jesus','ainara','leire','inigo','rocio','alaba1','alaba2','alejandro','laura','angel','nathalia','patricia_g'].includes(emp.id))continue;
    const ann=getAnnualStats(emp.id);
    if(ann.totalHours>propTarget*1.05)overEmps.push({name:emp.name,hours:ann.totalHours,target:propTarget});
  }
  if(overEmps.length)notifs.push({type:'info',icon:'📊',title:`${overEmps.length} empleado${overEmps.length>1?'s':''} por encima del objetivo`,detail:overEmps.map(e=>`${e.name}: ${e.hours}h/${e.target}h`).join(' · '),action:'metrics',priority:5});
  
  // 5. Holidays in next 7 days
  const upcomingHols=[];
  for(let i=0;i<=7;i++){
    const d=addDays(today,i);const h=isHoliday(d);
    if(h)upcomingHols.push({name:h,date:fmtDate(d),day:DAYS[(d.getDay()+6)%7]});
  }
  if(upcomingHols.length)notifs.push({type:'info',icon:'🔵',title:`${upcomingHols.length} festivo${upcomingHols.length>1?'s':''} próximo${upcomingHols.length>1?'s':''}`,detail:upcomingHols.map(h=>`${h.day} ${h.date.slice(5)}: ${h.name}`).join(' · '),action:'schedule',priority:6});
  
  // 6. Missing medios this week
  const weekDts=weekDates(getMonday(today));
  let missingMedios=0;
  for(const d of weekDts){
    if(isClosed(d))continue;
    for(const band of TASK_BANDS){
      const workers=employees.filter(e=>getEmpBand(d,e.id)===band.id);
      if(!workers.length)continue;
      const hasMedios=workers.some(e=>getTaskAssign(fmtDate(d),e.id)==='medios');
      if(!hasMedios)missingMedios++;
    }
  }
  if(missingMedios)notifs.push({type:'warning',icon:'💬',title:`${missingMedios} franja${missingMedios>1?'s':''} sin Medios Escritos`,detail:'Esta semana. Usa ⚡ Auto-asignar en Distribución',action:'tasks',priority:4});
  
  // 7. Gerardo no vacations warning
  const gerAnn=getAnnualStats('gerardo');
  if(gerAnn.vacDays===0)notifs.push({type:'info',icon:'⚠️',title:'Gerardo sin vacaciones registradas',detail:`${gerAnn.totalHours}h trabajadas, 0 días de vacaciones`,action:'employees',priority:7});
  
  notifs.sort((a,b)=>a.priority-b.priority);
  return notifs;
}

        <div style="font-size:10px;color:var(--text3)">${isShift?'Cambio turno: '+sh+' → '+(s.new_shift||'?'):'Cubre: '+(ce?.name||'?')+' · Turno: '+sh}${s.reason?' · '+s.reason:''}</div>
        <div style="display:flex;gap:6px;margin-top:6px">
          <button style="flex:1;padding:4px;border:none;border-radius:4px;background:var(--success);color:#fff;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit" onclick="event.stopPropagation();approveSwapFromNotif('${s.id}')">✓ Aprobar</button>
          <button style="flex:1;padding:4px;border:none;border-radius:4px;background:var(--danger);color:#fff;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit" onclick="event.stopPropagation();rejectSwapFromNotif('${s.id}')">✗ Rechazar</button>
        </div>
      </div>`;
    }
    h+=`</div>`;
  }
  
  // Regular notifications
  const otherNotifs=notifs.filter(n=>n.priority!==2); // skip swap notif since we show them above
  if(!otherNotifs.length&&!pending.length){
    h+=`<div style="padding:20px;text-align:center;color:var(--success);font-size:13px">✅ Todo en orden</div>`;
  } else {
    for(const n of otherNotifs){
      h+=`<div style="padding:8px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s" onmouseenter="this.style.background='var(--bg3)'" onmouseleave="this.style.background=''" onclick="toggleNotifPanel();switchPanelByAction('${n.action}')">
        <div style="display:flex;align-items:start;gap:8px">
          <span style="font-size:14px;flex-shrink:0;margin-top:1px">${n.icon}</span>
          <div>
            <div style="font-size:12px;font-weight:600;color:var(--text)">${n.title}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:1px">${n.detail}</div>
          </div>
        </div>
      </div>`;
    }
  }
  panel.innerHTML=h;
}

async function approveSwapFromNotif(id){
  await approveSwap(id);
  renderNotifPanel();
  updateNotifBadge();
}

async function rejectSwapFromNotif(id){
  const sw=state.swapRequests.find(s=>s.id===id);if(!sw)return;
  sw.status='rejected';sw.resolved_at=new Date().toISOString();
  await db.from('swap_requests').update({status:'rejected',resolved_at:sw.resolved_at}).eq('id',id);
  renderNotifPanel();
  updateNotifBadge();
  renderAll();
  showToast('Rechazado','success');
}

function updateNotifBadge(){
  const notifs=generateNotifications();
  const badge=document.getElementById('notifBadge');
  const urgent=notifs.filter(n=>n.type==='error'||n.type==='warning').length;
  if(urgent>0){badge.textContent=urgent;badge.style.display='flex'}
  else badge.style.display='none';
}

function renderAll(){detectWeekDebts();renderSchedule();if(currentView==='month')renderMonthly();if(document.getElementById('panel-tasks')?.classList.contains('active'))renderTasks();renderAlerts();renderSidebarCoverage();updateNotifBadge();const p=getPendingSwaps(),b=document.getElementById('swapBadge');if(p.length){b.textContent=p.length;b.style.display='inline-flex'}else b.style.display='none'}
</script>
</body>
</html>
