<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silvia — Panel de Gestión SAC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#242836;--bg4:#2e3344;--text:#e8eaed;--text2:#9aa0b0;--text3:#6b7280;--accent:#6366f1;--accent2:#818cf8;--morning:#4FC3F7;--morning-bg:rgba(79,195,247,.15);--mid:#81C784;--mid-bg:rgba(129,199,132,.15);--afternoon:#FFB74D;--afternoon-bg:rgba(255,183,77,.15);--closing:#BA68C8;--closing-bg:rgba(186,104,200,.15);--sick:#E57373;--sick-bg:rgba(229,115,115,.15);--vacation:#FFF176;--vacation-bg:rgba(255,241,118,.15);--permission:#F48FB1;--permission-bg:rgba(244,143,177,.15);--paternity:#90CAF9;--paternity-bg:rgba(144,202,249,.15);--swap:#4DD0E1;--swap-bg:rgba(77,208,225,.15);--danger:#ef4444;--warning:#f59e0b;--success:#22c55e;--border:#2e3344;--shadow:0 4px 24px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}.header-left{display:flex;align-items:center;gap:16px}.logo{font-size:20px;font-weight:700;color:var(--accent2);letter-spacing:-.5px}.logo span{color:var(--text2);font-weight:400;font-size:14px;margin-left:8px}.header-right{display:flex;gap:8px;align-items:center}
.tabs{display:flex;gap:4px;background:var(--bg3);border-radius:8px;padding:3px}.tab{padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .2s;border:none;background:none}.tab:hover{color:var(--text);background:var(--bg4)}.tab.active{background:var(--accent);color:#fff}
.btn{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text);transition:all .15s;display:inline-flex;align-items:center;gap:6px}.btn:hover{background:var(--bg4);border-color:var(--accent)}.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-primary:hover{background:var(--accent2)}.btn-sm{padding:4px 10px;font-size:12px}.btn-icon{width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center}.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.toolbar{padding:12px 24px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}.nav-week{display:flex;align-items:center;gap:12px}.week-label{font-size:15px;font-weight:600;min-width:280px;text-align:center}.week-sublabel{font-size:12px;color:var(--text2);font-weight:400}.toolbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.main{display:flex;height:calc(100vh - 110px)}.content{flex:1;overflow:auto;padding:16px 24px}.sidebar{width:340px;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;padding:16px;flex-shrink:0}.sidebar.collapsed{width:0;padding:0;overflow:hidden}
.schedule{width:100%;border-collapse:separate;border-spacing:2px}.schedule th{padding:8px 4px;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;text-align:center}.schedule th.day-header{background:var(--bg3);border-radius:6px;min-width:120px}.schedule th.day-header.today{background:var(--accent);color:#fff}.schedule th.day-header.weekend{background:var(--bg4)}.schedule td.emp-name{padding:8px 12px;font-size:13px;font-weight:600;white-space:nowrap;background:var(--bg2);border-radius:6px;min-width:110px;position:sticky;left:0;z-index:2}
.shift-cell{padding:6px 4px;text-align:center;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;position:relative;min-height:36px;user-select:none}.shift-cell:hover{transform:scale(1.05);z-index:5;box-shadow:0 2px 12px rgba(0,0,0,.3)}.shift-cell.morning{background:var(--morning-bg);color:var(--morning);border:1px solid rgba(79,195,247,.3)}.shift-cell.mid{background:var(--mid-bg);color:var(--mid);border:1px solid rgba(129,199,132,.3)}.shift-cell.afternoon{background:var(--afternoon-bg);color:var(--afternoon);border:1px solid rgba(255,183,77,.3)}.shift-cell.closing{background:var(--closing-bg);color:var(--closing);border:1px solid rgba(186,104,200,.3)}
.shift-cell.afternoon_14_22{background:var(--afternoon-bg);color:var(--afternoon);border:1px solid rgba(255,183,77,.3)}
.shift-cell.jesus_fri,.shift-cell.jesus_sun{background:var(--closing-bg);color:var(--closing);border:1px solid rgba(186,104,200,.3)}
.shift-cell.jesus_sat{background:var(--mid-bg);color:var(--mid);border:1px solid rgba(129,199,132,.3)}.shift-cell.free{background:var(--bg3);color:var(--text3);border:1px solid transparent}
.shift-cell.inactive{background:var(--bg);color:var(--text3);border:1px solid transparent;opacity:.2;cursor:default;font-size:10px}.shift-cell.sick{background:var(--sick-bg);color:var(--sick);border:1px solid rgba(229,115,115,.3)}.shift-cell.vacation{background:var(--vacation-bg);color:var(--vacation);border:1px solid rgba(255,241,118,.3)}.shift-cell.permission{background:var(--permission-bg);color:var(--permission);border:1px solid rgba(244,143,177,.3)}.shift-cell.paternity{background:var(--paternity-bg);color:var(--paternity);border:1px solid rgba(144,202,249,.3)}.shift-cell.swap{background:var(--swap-bg);color:var(--swap);border:1px solid rgba(77,208,225,.3)}.shift-cell.conflict{box-shadow:0 0 0 2px var(--danger);animation:pulse-border 2s infinite}
.month-table{border-collapse:collapse;font-size:10px;width:100%}.month-table th{padding:2px 1px;text-align:center;font-weight:600;position:sticky;top:0;z-index:2;background:var(--bg2)}.month-table th.weekend{color:var(--warning)}.month-table th.today-col{color:var(--accent2)}.month-table th.holiday-col{color:var(--danger);background:rgba(239,68,68,.08)}.month-table td{padding:1px;text-align:center;min-width:28px}.month-table td.emp-name-month{text-align:left;padding:2px 6px;font-weight:600;font-size:11px;white-space:nowrap;position:sticky;left:0;background:var(--bg2);z-index:1}.month-cell{border-radius:3px;padding:2px 1px;font-size:9px;font-weight:600;cursor:pointer;line-height:1.2;min-height:20px;display:flex;align-items:center;justify-content:center}.month-cell:hover{filter:brightness(1.3)}.month-cell.m-morning{background:var(--morning-bg);color:var(--morning)}.month-cell.m-mid{background:var(--mid-bg);color:var(--mid)}.month-cell.m-afternoon{background:var(--afternoon-bg);color:var(--afternoon)}.month-cell.m-closing{background:var(--closing-bg);color:var(--closing)}.month-cell.m-free{color:var(--text3);font-size:8px}.month-cell.m-absent{background:var(--vacation-bg);color:var(--vacation);font-size:8px}.month-cell.m-sick{background:var(--sick-bg);color:var(--sick);font-size:8px}.month-cell.m-inactive{opacity:.15}.month-cov{font-size:9px;font-weight:700;padding:1px 2px;border-radius:2px}
.day-header.holiday{background:rgba(239,68,68,.12)!important;border-bottom:2px solid var(--danger)}.day-header.holiday .holiday-tag{display:block;font-size:8px;color:var(--danger);font-weight:600;margin-top:1px;letter-spacing:.3px}
@keyframes pulse-border{0%,100%{box-shadow:0 0 0 2px var(--danger)}50%{box-shadow:0 0 0 2px transparent}}
.cov-row td{padding:6px 4px;text-align:center;font-size:11px;font-weight:600;border-radius:4px}.cov-ok{background:rgba(34,197,94,.15);color:var(--success)}.cov-warn{background:rgba(245,158,11,.15);color:var(--warning)}.cov-bad{background:rgba(239,68,68,.15);color:var(--danger)}
.shift-dropdown{position:absolute;top:100%;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;z-index:50;box-shadow:var(--shadow);min-width:160px}.shift-dropdown .option{padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;transition:background .1s;white-space:nowrap}.shift-dropdown .option:hover{background:var(--bg4)}.shift-dropdown .option .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.shift-dropdown .separator{height:1px;background:var(--border);margin:4px 0}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:600px;width:95%;box-shadow:var(--shadow);max-height:90vh;overflow-y:auto}.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}.modal-field{margin-bottom:12px}.modal-field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}.modal-field select,.modal-field input,.modal-field textarea{width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:inherit}.modal-field textarea{resize:vertical;min-height:60px}.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.sub-panel{background:var(--bg3);border-radius:8px;padding:12px;margin-top:12px}.sub-panel h4{font-size:13px;font-weight:700;color:var(--warning);margin-bottom:10px;display:flex;align-items:center;gap:6px}.sub-day{margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}.sub-day:last-child{border:none;margin:0;padding:0}.sub-day-title{font-size:12px;font-weight:600;margin-bottom:6px}.sub-shift-needed{font-size:11px;color:var(--text2);margin-bottom:6px;padding:4px 8px;background:var(--bg);border-radius:4px;display:flex;align-items:center;gap:6px}.sub-candidate{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:var(--bg);border-radius:6px;margin-bottom:4px;font-size:12px}.sub-candidate .name{font-weight:600}.sub-candidate .assign-btn{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:#fff;transition:all .15s}.sub-candidate .assign-btn:hover{background:var(--accent2)}.sub-no-candidate{font-size:11px;color:var(--danger);padding:4px 8px;font-style:italic}
.sidebar-section{margin-bottom:20px}.sidebar-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:8px}.alert-item{padding:8px 10px;background:var(--bg3);border-radius:6px;margin-bottom:6px;font-size:12px;border-left:3px solid var(--danger);cursor:pointer;transition:background .15s}.alert-item:hover{background:var(--bg4)}.alert-item.warning{border-left-color:var(--warning)}.alert-item .alert-emp{font-weight:600}.alert-item .alert-desc{color:var(--text2);margin-top:2px}.badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;border-radius:10px;font-size:11px;font-weight:700}.badge-danger{background:var(--danger);color:#fff}.badge-warning{background:var(--warning);color:#000}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-size:13px;z-index:300;box-shadow:var(--shadow);transform:translateY(100px);opacity:0;transition:all .3s}.toast.show{transform:translateY(0);opacity:1}.toast.success{border-left:3px solid var(--success)}.toast.error{border-left:3px solid var(--danger)}
.log-item{padding:8px;font-size:12px;border-bottom:1px solid var(--border)}.log-item:last-child{border:none}.log-time{color:var(--text3);font-size:11px}.log-detail{color:var(--text2)}
.emp-card{background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:8px}.emp-card h4{font-size:14px;font-weight:600;margin-bottom:4px}.emp-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-right:4px}
.panel{display:none}.panel.active{display:block}
@media(max-width:1200px){.sidebar{width:280px}}@media(max-width:900px){.sidebar{display:none}}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}.login-card{width:380px;text-align:center}.login-brand{margin-bottom:40px}.login-brand h1{font-size:32px;font-weight:700;color:var(--text);letter-spacing:-1px}.login-brand h1 em{font-style:normal;color:var(--accent2)}.login-brand p{font-size:13px;color:var(--text3);margin-top:6px}.login-form{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px}.login-form .field{margin-bottom:16px;text-align:left}.login-form .field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.login-form .field input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;transition:border-color .2s;outline:none}.login-form .field input:focus{border-color:var(--accent)}.login-form .login-btn{width:100%;padding:11px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .2s;margin-top:8px}.login-form .login-btn:hover{background:var(--accent2)}.login-error{color:var(--danger);font-size:12px;margin-top:10px;min-height:18px}.login-footer{font-size:11px;color:var(--text3);margin-top:24px}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
#app{display:none}#app.visible{display:contents}
.saving-indicator{position:fixed;top:12px;right:50%;transform:translateX(50%);padding:4px 12px;background:var(--accent);color:#fff;border-radius:12px;font-size:11px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s}.saving-indicator.show{opacity:1}
</style>
</head>
<body>
<div class="saving-indicator" id="savingIndicator">💾 Guardando...</div>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <h1><em>Silvia</em></h1>
      <p>Panel de Gestión — Atención al Cliente</p>
    </div>
    <div class="login-form">
      <div class="field"><label>Usuario</label><input type="text" id="loginUser" placeholder="Introduce tu usuario" autocomplete="off" autofocus></div>
      <div class="field"><label>Contraseña</label><input type="password" id="loginPass" placeholder="Introduce tu contraseña"></div>
      <button class="login-btn" onclick="doLogin()">Acceder</button>
      <div class="login-error" id="loginError"></div>
    </div>
    <div class="login-footer">SAC · Servicio de Atención al Cliente</div>
  </div>
</div>

<div id="app">
<div id="dashboardOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center" onclick="closeDashboard()">
  <div id="dashboardCard" onclick="event.stopPropagation()" style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px 28px;max-width:560px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)">
  </div>
</div>
<div class="header">
  <div class="header-left">
    <div class="logo"><em style="font-style:normal;color:var(--accent2)">Silvia</em> <span>Panel de Gestión SAC</span></div>
    <div class="tabs">
      <button class="tab active" onclick="switchPanel('schedule',this)">Cuadrante</button>
      <button class="tab" onclick="switchPanel('employees',this)">Empleados</button>
      <button class="tab" onclick="switchPanel('swaps',this)">Cambios <span id="swapBadge" class="badge badge-warning" style="display:none">0</span></button>
      <button class="tab" onclick="switchPanel('coverage',this)">Cobertura</button>
      <button class="tab" onclick="switchPanel('tasks',this)">📋 Distribución</button>
      <button class="tab" onclick="switchPanel('nomina',this)">💰 Nómina</button>
      <button class="tab" onclick="switchPanel('history',this)">Historial</button>
      <button class="tab" onclick="switchPanel('metrics',this)">📈 Métricas</button>
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-primary" onclick="openAbsenceModal()">+ Ausencia</button>
    <button class="btn" style="background:#4DD0E1;color:#000;border-color:#4DD0E1;font-weight:600" onclick="openSwapModal()">🔄 Cambio</button>
    <button class="btn" style="background:#FF8A65;color:#000;border-color:#FF8A65;font-weight:600" onclick="openEndaliaExport()">📤 Endalia</button>
    <button class="btn" style="background:#81C784;color:#000;border-color:#81C784;font-weight:600" onclick="openScheduleExport()">📅 Horario Excel</button>
    <div style="position:relative;margin-left:4px">
      <button class="btn btn-sm" onclick="toggleNotifPanel()" id="bellBtn" style="font-size:16px;padding:4px 8px;position:relative">🔔<span id="notifBadge" style="display:none;position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;padding:0 4px;font-size:9px;background:var(--danger);color:#fff;border-radius:8px;align-items:center;justify-content:center">0</span></button>
      <div id="notifPanel" style="display:none;position:absolute;right:0;top:38px;width:380px;max-height:480px;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);z-index:100;padding:0"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:8px;padding-left:12px;border-left:1px solid var(--border)">
      <span style="font-size:12px;color:var(--text2)">Hola, <strong id="userGreeting" style="color:var(--accent2)"></strong></span>
      <span id="userRole" style="font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg3);color:var(--text3)"></span>
      <button class="btn btn-sm" onclick="doLogout()" style="font-size:11px">Salir</button>
    </div>
  </div>
</div>
<div class="toolbar">
  <div class="nav-week">
    <button class="btn btn-icon" onclick="navigateWeek(-1)">◀</button>
    <div class="week-label" id="weekLabel">Semana</div>
    <button class="btn btn-icon" onclick="navigateWeek(1)">▶</button>
    <button class="btn btn-sm" onclick="goToToday()">Hoy</button>
    <div style="display:inline-flex;background:var(--bg3);border-radius:6px;margin-left:12px;overflow:hidden;border:1px solid var(--border)">
      <button class="btn btn-sm" id="viewWeek" onclick="setView('week')" style="border-radius:5px 0 0 5px;border:none;background:var(--accent);color:#fff;font-size:11px;padding:4px 10px">Semanal</button>
      <button class="btn btn-sm" id="viewMonth" onclick="setView('month')" style="border-radius:0 5px 5px 0;border:none;background:transparent;color:var(--text2);font-size:11px;padding:4px 10px">Mensual</button>
    </div>
  </div>
  <div class="toolbar-actions">
    <select id="filterEmployee" onchange="renderSchedule()" style="padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"><option value="">Todos los empleados</option></select>
    <button class="btn btn-sm" onclick="openResetModal()">⟳ Rotación Base</button>
    <button class="btn btn-sm" onclick="toggleSidebar()">☰ Alertas</button>
  </div>
</div>
<div class="main">
  <div class="content">
    <div class="panel active" id="panel-schedule"><table class="schedule" id="scheduleTable"></table><div id="monthlyView" style="display:none;overflow-x:auto"></div></div>
    <div class="panel" id="panel-employees"><h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Equipo</h2><div id="empSummary" style="margin-bottom:16px"></div><div id="employeeList"></div></div>
    <div class="panel" id="panel-swaps"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="font-size:18px;font-weight:700">🔄 Cambios Solicitados</h2><button class="btn" style="background:#4DD0E1;color:#000;border-color:#4DD0E1;font-weight:600" onclick="openSwapModal()">+ Nuevo Cambio</button></div><div id="swapStats"></div><div id="swapPending"></div><div id="swapHistory"></div></div>
    <div class="panel" id="panel-coverage"><h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Cobertura por Turno</h2><div id="coverageDetail"></div></div>
    <div class="panel" id="panel-tasks"><div id="tasksContent"></div></div>
    <div class="panel" id="panel-nomina"><div id="nominaContent"></div></div>
    <div class="panel" id="panel-history"><h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Historial de Cambios</h2>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
        <select id="histEmp" onchange="renderHistory()" style="padding:5px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:inherit"><option value="all">Todos</option></select>
        <input type="date" id="histStart" onchange="renderHistory()" style="padding:5px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:inherit">

function getAssign(d,eid){
  const k=aKey(d,eid);if(state.assignments[k])return state.assignments[k];
  const abs=getAbsence(d,eid);if(abs)return{type:abs.type,isAbsence:true};
  const ds=fmtDate(d);
  const ha=HARD_ABS.find(a=>a.employee_id===eid&&a.start_date<=ds&&a.end_date>=ds);
  if(ha)return{type:ha.type,isAbsence:true};
  if(AVAIL[eid]){const[s,e]=AVAIL[eid];if(s&&ds<s)return{type:'inactive'};if(e&&ds>e)return{type:'inactive'}}
  if(isClosed(d))return{type:'closed'};
  if(PRE_ASSIGN[k])return PRE_ASSIGN[k];
  // Fixed schedules (non-rotating employees)
  if(FIXED_SCHEDULES[eid]){const fs=FIXED_SCHEDULES[eid][ds];return{type:fs||'free',fromRotation:true}}
  const cw=cycleWeek(d),dow=(d.getDay()+6)%7;
  if(ROTATION[eid]){const s=ROTATION[eid][cw][dow];return{type:s||'free',fromRotation:true}}
  return{type:'free'}
}
function getAbsence(d,eid){const ds=fmtDate(d);return state.absences.find(a=>a.employee_id===eid&&a.start_date<=ds&&(!a.end_date||a.end_date>=ds)&&a.status==='approved')}

async function setAssign(d,eid,shiftType,reason=''){

}

// ===================== DEBT MANAGEMENT =====================
async function checkAndCreateDebt(d,eid){
  const m=getMonday(d),ws=fmtDate(m);let wd=0;
  for(let i=0;i<7;i++)if(isWorkDay(addDays(m,i),eid))wd++;
  if(wd>=6){
    const existing=state.dayDebts.find(db=>db.employee_id===eid&&db.week_str===ws&&!db.resolved);
    if(!existing){
      const debt={id:crypto.randomUUID(),employee_id:eid,owed_since:fmtDate(d),week_str:ws,reason:`${employees.find(e=>e.id===eid).name} trabajó ${wd} días (sem ${fmtShort(m)})`,resolved:false,resolved_date:null};
      state.dayDebts.push(debt);
      await dbSaveDebt(debt);
    }
  }
}
// Auto-detect debts from current week's rotation (runs on render)
function detectWeekDebts(){
  const dates=weekDates(state.currentWeekStart),ws=fmtDate(dates[0]);
  for(const emp of employees){
    let wd=0;for(let i=0;i<7;i++)if(isWorkDay(dates[i],emp.id))wd++;
    if(wd>=6){
      const debtId='auto_'+ws+'_'+emp.id;
      // Skip if dismissed or already exists
      if(state.dismissedDebts.has(debtId))continue;
      const anyExisting=state.dayDebts.find(db=>db.employee_id===emp.id&&db.week_str===ws);
      if(!anyExisting){
        const debt={id:debtId,employee_id:emp.id,owed_since:ws,week_str:ws,reason:`${emp.name} trabaja ${wd} días (sem ${fmtShort(dates[0])})`,resolved:false,resolved_date:null,auto:true};
        state.dayDebts.push(debt);
      }
    }
  }
}
async function resolveDebt(id){
  const d=state.dayDebts.find(x=>x.id===id);if(!d)return;
  d.resolved=true;d.resolved_date=fmtDate(new Date());
  state.dismissedDebts.add(id);
  // Remove from array entirely so it doesn't show up
  state.dayDebts=state.dayDebts.filter(x=>x.id!==id);
  if(!d.auto)await db.from('day_debts').update({resolved:true,resolved_date:d.resolved_date}).eq('id',id);
  renderAll();showToast('Deuda compensada ✓','success');
}
function findBestDayToReturn(eid){
  const results=[];const t=new Date();const tardeSh=['afternoon','closing','afternoon_14_22','jesus_fri','jesus_sun'];const midSh=['mid','jesus_sat'];
  for(let i=1;i<=42;i++){
    const d=addDays(t,i);if(isClosed(d))continue;
    const a=getAssign(d,eid);if(!a.type||!SHIFTS[a.type])continue;
    const{counts}=getDayCoverage(d);
    const sg=tardeSh.includes(a.type)?'tarde':midSh.includes(a.type)?'mid':'morning';
    const mn=COVERAGE_MIN[sg]||0;
    const excess=counts[sg]-mn;
    if(excess>0){
      // Verify freeing this day doesn't violate anything for this employee
      // Just needs excess coverage > 0
      results.push({date:d,shift:a.type,shiftName:SHIFTS[a.type].name,dayIdx:(d.getDay()+6)%7,excess,group:sg});
    }
    if(results.length>=5)break;
  }
  return results;
}

// ===================== COVERAGE =====================
function getDayCoverage(d){const c={morning:0,mid:0,afternoon:0},n={morning:[],mid:[],afternoon:[]};const tardeSh=['afternoon','closing','afternoon_14_22','jesus_fri','jesus_sun'];const midSh=['mid','jesus_sat'];for(const e of employees){const a=getAssign(d,e.id);if(a.type&&SHIFTS[a.type]){const t=a.type;if(t==='morning'){c.morning++;n.morning.push(e.name)}else if(midSh.includes(t)){c.mid++;n.mid.push(e.name)}else if(tardeSh.includes(t)){c.afternoon++;n.afternoon.push(e.name)}}}c.tarde=c.afternoon;n.tarde=n.afternoon;return{counts:c,names:n}}
function getCoverageStatus(d){const{counts}=getDayCoverage(d);const issues=[];if(counts.morning<COVERAGE_MIN.morning)issues.push({shift:'morning',have:counts.morning,need:COVERAGE_MIN.morning});if(counts.tarde<COVERAGE_MIN.tarde)issues.push({shift:'tarde',have:counts.tarde,need:COVERAGE_MIN.tarde});return{counts,issues,ok:issues.length===0}}

// ===================== VALIDATION =====================
function validate(d,eid,ns){
  const al=[],emp=employees.find(e=>e.id===eid);if(!emp||!ns||ns==='free'||!SHIFTS[ns])return al;
  if(emp.restrictions.includes(ns))al.push({type:'block',msg:`${emp.name} tiene restricción de ${SHIFTS[ns].name}`});
  if(getAbsence(d,eid))al.push({type:'block',msg:`${emp.name} tiene ausencia activa`});
  if(isClosed(d))al.push({type:'block',msg:'Día cerrado'});
  const prev=getAssign(addDays(d,-1),eid);if(prev.type&&SHIFTS[prev.type]){const r=(24-SHIFTS[prev.type].end)+SHIFTS[ns].start;if(r<12)al.push({type:'error',msg:`Descanso insuficiente: ${r}h entre ${SHIFTS[prev.type].name} y ${SHIFTS[ns].name} (mín 12h)`})}
  const next=getAssign(addDays(d,1),eid);if(next.type&&SHIFTS[next.type]){const r=(24-SHIFTS[ns].end)+SHIFTS[next.type].start;if(r<12)al.push({type:'error',msg:`Descanso insuficiente con día siguiente: ${r}h hasta ${SHIFTS[next.type].name} (mín 12h)`})}
  const con=getConsecutiveIfAssigned(d,eid);if(con>6)al.push({type:'block',msg:`${emp.name} llevaría ${con} días consecutivos (máx 6)`});else if(con===6)al.push({type:'error',msg:`⚠ ${emp.name} llevaría 6 días consecutivos`});
  const m=getMonday(d);let wwd=0;for(let i=0;i<7;i++){const wd=addDays(m,i);if(fmtDate(wd)===fmtDate(d)){wwd++;continue}if(isWorkDay(wd,eid))wwd++}const wf=7-wwd;
  if(wf<2)al.push({type:'error',msg:`${emp.name} solo tendría ${wf} día${wf!==1?'s':''} libre${wf!==1?'s':''} esta semana. Se generará deuda.`});
  return al
}

// ===================== SUBSTITUTION ENGINE =====================
function findCandidates(d,sn){
  const c=[];for(const emp of employees){
    const a=getAssign(d,emp.id);if(a.type!=='free')continue;if(emp.restrictions.includes(sn))continue;
    const v=validate(d,emp.id,sn);if(v.some(x=>x.type==='block'))continue;const he=v.some(x=>x.type==='error');
    const m=getMonday(d);let wh=0,wwd=0;for(let i=0;i<7;i++){const wa=getAssign(addDays(m,i),emp.id);if(wa.type&&SHIFTS[wa.type]){wh+=8;wwd++}}
    const con=getConsecutiveIfAssigned(d,emp.id),ex5=(wwd+1)>5,hd=getActiveDebts(emp.id).length>0;
    let sc=wh;if(ex5)sc+=200;if(hd)sc+=150;if(he)sc+=100;if(con>=5)sc+=80;
    c.push({employee:emp,weekHours:wh,weekWorkDays:wwd,consecutive:con,wouldExceed5days:ex5,hasDebt:hd,hasRestWarning:he,score:sc})
  }c.sort((a,b)=>a.score-b.score);return c
}
function findSwapCandidates(d,sn){
  const c=[],cov=getDayCoverage(d);for(const emp of employees){
    const a=getAssign(d,emp.id);if(!a.type||!SHIFTS[a.type]||a.type===sn||a.isAbsence)continue;if(emp.restrictions.includes(sn))continue;
    const cs=a.type;const tardeSh=['afternoon','closing','afternoon_14_22','jesus_fri','jesus_sun'];const midSh=['mid','jesus_sat'];const cg=tardeSh.includes(cs)?'tarde':midSh.includes(cs)?'mid':'morning';const cm=COVERAGE_MIN[cg]||0;if(cov.counts[cg]<=cm)continue;
    const v=validate(d,emp.id,sn);if(v.some(x=>x.type==='block'))continue;
    c.push({employee:emp,currentShift:cs,hasRestWarning:v.some(x=>x.type==='error')})
  }return c
}

      h+=`<td class="${cls}" ${onclick} title="${a.modified?'Modificado'+(a.reason?': '+a.reason:''):'Rotación base'}" style="${canEdit?'':'cursor:default'}">${txt}</td>`
    }h+='</tr>'
  }
  h+='<tr class="cov-row"><td class="emp-name" style="font-size:11px;color:var(--text2)">Cobertura</td>';
  for(let i=0;i<7;i++){const d=dates[i];if(isClosed(d)){h+='<td style="color:var(--text3);font-size:11px">Cerrado</td>';continue}
    const{counts,issues}=getCoverageStatus(d),cls=issues.length===0?'cov-ok':(issues.some(x=>x.have===0)?'cov-bad':'cov-warn');
    let det='<div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap">';
    const covG=[{ab:'M',c:counts.morning,mn:COVERAGE_MIN.morning},{ab:'Me',c:counts.mid,mn:COVERAGE_MIN.mid},{ab:'T',c:counts.tarde,mn:COVERAGE_MIN.tarde}];

}

async function onCellClick(e,ds,eid){

  // Also check if current assignment IS an absence type (sick stored as assignment)
  const curAssign=state.assignments[aKey(d,eid)];
  const isAbsAssign=curAssign&&ABSENCES[curAssign.type]&&!curAssign.fromRotation;
  
  if(absActive||hardAbs||isAbsAssign){
    if(hardAbs&&!absActive&&!isAbsAssign){showToast(`${ABSENCES[hardAbs.type]?.name||hardAbs.type} (hardcoded) — no editable`,'error');return}
    if(isAbsAssign){
      const absName=ABSENCES[curAssign.type]?.name||curAssign.type;
      if(confirm(`${employees.find(x=>x.id===eid).name} tiene "${absName}" el ${fmtDate(d)}.\n\n¿Revocar y restaurar turno de rotación?`)){
        delete state.assignments[aKey(d,eid)];
        await db.from('assignments').delete().eq('date',fmtDate(d)).eq('employee_id',eid);
        await addLog(eid,fmtDate(d),curAssign.type,'rotation','Ausencia revocada desde cuadrante');
        renderAll();showToast('Ausencia revocada ✓','success');
      }
      return;
    }
    if(absActive){
      const absName=ABSENCES[absActive.type]?.name||absActive.type;
      if(confirm(`${employees.find(x=>x.id===eid).name} tiene "${absName}" del ${absActive.start_date} al ${absActive.end_date||'?'}.\n\n¿Eliminar esta ausencia?`)){
        removeAbsence(absActive.id);
      }
      return;
    }
    return;
  }
  const cell=e.target.closest('.shift-cell');if(!cell)return;const emp=employees.find(x=>x.id===eid);
  let dd=document.createElement('div');dd.className='shift-dropdown';dd.onclick=ev=>ev.stopPropagation();let opts='';
  for(const[k,s]of Object.entries(SHIFTS)){if(k.startsWith('jesus_'))continue;const bl=emp.restrictions.includes(k);opts+=`<div class="option${bl?' style="opacity:.3;cursor:not-allowed"':''}" onclick="${bl?'':(`doSelect('${ds}','${eid}','${k}')`)}"><span class="dot" style="background:${s.color}"></span>${s.name} (${s.time})${bl?' 🚫':''}</div>`}
  opts+='<div class="separator"></div>';opts+=`<div class="option" onclick="doSelect('${ds}','${eid}','free')"><span class="dot" style="background:var(--text3)"></span>Día libre</div>`;
  opts+='<div class="separator"></div>';for(const[k,a]of Object.entries(ABSENCES)){if(k==='swap')continue;opts+=`<div class="option" onclick="closeDropdown();openAbsenceModal('${eid}','${ds}','${k}')"><span class="dot" style="background:${a.color}"></span>${a.name}</div>`}
  dd.innerHTML=opts;cell.style.position='relative';cell.appendChild(dd);activeDropdown=dd
}
function doSelect(ds,eid,st){const d=new Date(ds+'T12:00:00'),al=validate(d,eid,st),bl=al.filter(a=>a.type==='block'),er=al.filter(a=>a.type==='error');if(bl.length){showToast('⛔ '+bl[0].msg,'error');closeDropdown();return}if(er.length&&!confirm('⚠ ADVERTENCIA:\n\n'+er.map(e=>e.msg).join('\n')+'\n\n¿Continuar?')){closeDropdown();return}setAssign(d,eid,st);closeDropdown()}
function closeDropdown(){if(activeDropdown){activeDropdown.remove();activeDropdown=null}}
document.addEventListener('click',closeDropdown);

function renderAlerts(){
  const dates=weekDates(state.currentWeekStart),alerts=[];
  for(const d of dates){if(isClosed(d))continue;const di=(d.getDay()+6)%7;
    const{issues}=getCoverageStatus(d);for(const iss of issues){const nm=iss.shift==='tarde'?'Tarde+Cierre':(SHIFTS[iss.shift]?.name||iss.shift);
      // Store date and shift type for clickable coverage alerts
      const shifts=iss.shift==='tarde'?['afternoon','closing']:iss.shift==='morning'?['morning']:['mid'];
      alerts.push({type:'warning',msg:`${DAYS[di]} ${fmtShort(d)}: ${nm} solo ${iss.have}/${iss.need}`,coverage:true,date:fmtDate(d),shifts,need:iss.need-iss.have})};
    for(const emp of employees){const a=getAssign(d,emp.id);if(!a.type||!SHIFTS[a.type])continue;const nd=addDays(d,1),na=getAssign(nd,emp.id);if(na.type&&SHIFTS[na.type]){const r=(24-SHIFTS[a.type].end)+SHIFTS[na.type].start;if(r<12)alerts.push({type:'error',msg:`${emp.name}: solo ${r}h descanso ${DAYS[di]}→${DAYS[(di+1)%7]}`})}
    if(di===6||!isWorkDay(addDays(d,1),emp.id)){const con=getConsecutiveWorkDays(d,emp.id);if(con>6)alerts.push({type:'error',msg:`🚫 ${emp.name}: ${con} días consecutivos`});else if(con===6)alerts.push({type:'warning',msg:`⚠ ${emp.name}: 6 días consecutivos`})}}}
  for(const emp of employees){const fd=getWeekFreeDays(dates[0],emp.id);if(fd<2)alerts.push({type:fd===0?'error':'warning',msg:`${emp.name}: solo ${fd} día${fd!==1?'s':''} libre${fd!==1?'s':''} esta semana`})}
  const debts=state.dayDebts.filter(d=>!d.resolved);
  let visibleAlerts=0;
  let html='';
  if(debts.length>0){html+=`<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--warning);margin-bottom:6px">📋 DEUDAS PENDIENTES (${debts.length})</div>`;
    for(const debt of debts){const emp=employees.find(e=>e.id===debt.employee_id);
      html+=`<div class="alert-item warning" style="border-left-color:var(--accent);cursor:pointer" onclick="toggleDebtSuggestions('${debt.id}','${debt.employee_id}',this)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div class="alert-emp">${emp?.name}: día pendiente</div><div class="alert-desc">${debt.reason}</div></div>
          <span style="font-size:10px;color:var(--accent2)" class="debt-expand-icon">▶ Opciones</span>
        </div>
        <div class="debt-suggestions" style="display:none"></div>
        <div style="margin-top:6px" onclick="event.stopPropagation()"><button class="btn btn-sm" style="font-size:10px" onclick="resolveDebt('${debt.id}')">✓ Ya compensado</button></div>
      </div>`}html+='</div>'}
  if(!alerts.length&&!debts.length)html='<div style="color:var(--text3);font-size:12px;padding:8px">✅ Sin alertas</div>';
  else for(let ai=0;ai<alerts.length;ai++){
    const a=alerts[ai];
    if(a.coverage){
      visibleAlerts++;
      // Clickable coverage alert with expandable suggestions
      html+=`<div class="alert-item warning" style="cursor:pointer" onclick="toggleAlertSuggestions('${a.date}','${a.shifts.join(',')}',${a.need},this)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span>${a.msg}</span>
          <span style="font-size:10px;color:var(--accent2);margin-left:8px" class="alert-expand-icon">▶ Ver opciones</span>
        </div>
        <div class="alert-suggestions" id="alertSug_${a.date}_${a.shifts[0]}" style="display:none"></div>
      </div>`;
    } else {
      const alertKey=fmtDate(state.currentWeekStart)+'_'+a.msg.replace(/[^a-zA-Z0-9]/g,'');
      if(state.dismissedAlerts&&state.dismissedAlerts.has(alertKey))continue;
      visibleAlerts++;
      html+=`<div class="alert-item${a.type==='warning'?' warning':''}" style="display:flex;justify-content:space-between;align-items:center">
        <span>${a.msg}</span>
        <button class="btn btn-sm" style="font-size:9px;padding:2px 6px;background:var(--success);color:#fff;border:none;flex-shrink:0;margin-left:8px" onclick="event.stopPropagation();dismissAlert('${alertKey}',this.parentElement)">✓ OK</button>

    }
  }
  document.getElementById('alertCount').textContent=visibleAlerts+debts.length;

}

function dismissAlert(key,el){
  state.dismissedAlerts.add(key);

  setTimeout(()=>{
    el.remove();
    // Update alert count
    const cnt=document.getElementById('alertList').querySelectorAll('.alert-item').length;

function toggleAlertSuggestions(dateStr,shiftsStr,need,el){
  const shifts=shiftsStr.split(',');
  const sugDiv=el.querySelector('.alert-suggestions');
  const icon=el.querySelector('.alert-expand-icon');
  if(sugDiv.style.display!=='none'){sugDiv.style.display='none';icon.textContent='▶ Ver opciones';return}
  
  icon.textContent='▼ Ocultar';
  const d=new Date(dateStr+'T12:00:00');
  const di=(d.getDay()+6)%7;
  const canEdit=currentUser&&(currentUser.role==='admin'||currentUser.role==='supervisor');
  
  let h=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">`;
  h+=`<div style="font-size:11px;font-weight:700;color:var(--success);margin-bottom:6px">Necesita +${need} persona${need>1?'s':''} en ${shifts.map(s=>SHIFTS[s]?.name||s).join('/')}</div>`;
  
  // Find free candidates for each shift type
  let hasCandidates=false;
  for(const sn of shifts){
    if(!SHIFTS[sn])continue;
    const candidates=findCandidates(d,sn);
    if(candidates.length){
      hasCandidates=true;
      h+=`<div style="font-size:10px;color:var(--text2);margin:6px 0 4px;font-weight:600">${SHIFTS[sn].name} (${SHIFTS[sn].time}):</div>`;
      for(const c of candidates.slice(0,4)){
        let warns=[];
        if(c.wouldExceed5days)warns.push('pierde 2º libre');
        if(c.hasDebt)warns.push('deuda');
        if(c.hasRestWarning)warns.push('descanso');
        if(c.consecutive>=5)warns.push(`${c.consecutive+1}d seguidos`);
        const warnHtml=warns.length?`<div style="color:var(--warning);font-size:9px">⚠ ${warns.join(' · ')}</div>`:'';
        const assignBtn=canEdit?`<button class="btn btn-sm" style="font-size:9px;padding:2px 8px;background:var(--accent);color:#fff;border:none" onclick="event.stopPropagation();assignFromAlert('${dateStr}','${c.employee.id}','${sn}')">Asignar</button>`:'';
        h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 6px;background:var(--bg);border-radius:4px;margin-bottom:3px;font-size:11px">
          <div><strong>${c.employee.name}</strong> <span style="color:var(--text3);font-size:10px">${c.weekWorkDays}d · ${c.weekHours}h</span>${warnHtml}</div>
          ${assignBtn}
        </div>`;
      }
    }
  }
  
  // Also check swap candidates (people working another shift with excess coverage)
  for(const sn of shifts){
    if(!SHIFTS[sn])continue;
    const swapCands=findSwapCandidates(d,sn);
    if(swapCands.length){
      hasCandidates=true;
      h+=`<div style="font-size:10px;color:var(--accent2);margin:6px 0 4px;font-weight:600">Cambio de turno posible:</div>`;
      for(const c of swapCands.slice(0,3)){
        const assignBtn=canEdit?`<button class="btn btn-sm" style="font-size:9px;padding:2px 8px;background:var(--accent2);color:#fff;border:none" onclick="event.stopPropagation();swapFromAlert('${dateStr}','${c.employee.id}','${sn}','${c.currentShift}')">Cambiar</button>`:'';
        h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 6px;background:var(--bg);border-radius:4px;margin-bottom:3px;font-size:11px">
          <div><strong>${c.employee.name}</strong> <span style="color:var(--text3);font-size:10px">actual: ${SHIFTS[c.currentShift]?.name}</span></div>
          ${assignBtn}
        </div>`;
      }
    }
  }
  
  if(!hasCandidates)h+=`<div style="font-size:11px;color:var(--danger);font-style:italic;padding:4px">Sin candidatos disponibles</div>`;
  h+='</div>';
  sugDiv.innerHTML=h;
  sugDiv.style.display='block';
}

async function freeFromDebt(dateStr,eid,debtId){
  if(!confirm(`¿Librar a ${employees.find(e=>e.id===eid).name} el ${dateStr} para compensar deuda?`))return;
  const d=new Date(dateStr+'T12:00:00');
  const prev=getAssign(d,eid);
  state.assignments[aKey(d,eid)]={type:'free',modified:true,reason:'Compensación deuda'};
  await dbSaveAssignment(d,eid,'free','Compensación deuda de día');
  await addLog(eid,dateStr,prev.type,'free','Día libre por compensación de deuda');
  // Mark debt as resolved and dismissed
  state.dismissedDebts.add(debtId);
  state.dayDebts=state.dayDebts.filter(x=>x.id!==debtId);
  const debt=state.dayDebts.find(x=>x.id===debtId);
  if(debt&&!debt.auto)await db.from('day_debts').update({resolved:true,resolved_date:dateStr}).eq('id',debtId);
  renderAll();showToast(`✅ ${employees.find(e=>e.id===eid).name} libre el ${dateStr} — deuda compensada`,'success');
}

const TASK_BANDS=[
  {id:'morning',label:'Mañana (08-16)',color:'var(--morning)',shifts:['morning']},
  {id:'mid',label:'Medio (12-20)',color:'var(--mid)',shifts:['mid','jesus_sat']},
  {id:'tarde',label:'Tarde+Cierre (15-00)',color:'var(--afternoon)',shifts:['afternoon','closing','afternoon_14_22','jesus_fri','jesus_sun']}
];

function getTaskAssign(ds,eid){return state.taskAssigns[ds+'_'+eid]||'telefono'}
function setTaskAssign(ds,eid,task){
  state.taskAssigns[ds+'_'+eid]=task;
  _taskStatsCache=null; // invalidate cache
  dbSaveTaskAssign(ds,eid,task);
}
async function dbSaveTaskAssign(ds,eid,task){
  try{await db.from('task_assignments').upsert({date:ds,employee_id:eid,task_type:task},{onConflict:'date,employee_id'})}catch(e){}
}

function getEmpBand(d,eid){
  const a=getAssign(d,eid);
  if(!a.type||!SHIFTS[a.type])return null;
  for(const b of TASK_BANDS)if(b.shifts.includes(a.type))return b.id;
  return null;
}

let _taskStatsCache=null;let _taskStatsCacheKey='';
function getTaskStats(){
  const ck=JSON.stringify(Object.keys(state.taskAssigns).length)+'_'+fmtDate(state.currentWeekStart);
  if(_taskStatsCacheKey===ck&&_taskStatsCache)return _taskStatsCache;
  
  const stats={};
  for(const emp of employees)stats[emp.id]={medios:0,worked:0,name:emp.name};
  
  const y=2026;
  let d=new Date(y+'-01-01T12:00:00');
  const end=new Date(y+'-12-31T12:00:00');
  while(d<=end){
    if(!isClosed(d)){
      const ds=fmtDate(d);
      for(const emp of employees){
        const band=getEmpBand(d,emp.id);
        if(band){
          stats[emp.id].worked++;
          if(state.taskAssigns[ds+'_'+emp.id]==='medios')stats[emp.id].medios++;
        }
      }
    }
    d=addDays(d,1);
  }
  
  for(const eid in stats){
    const s=stats[eid];
    s.ratio=s.worked>0?s.medios/s.worked:0;
    s.pct=Math.round(s.ratio*100);
  }
  _taskStatsCache=stats;_taskStatsCacheKey=ck;
  return stats;
}

function suggestMedios(dates){
  const stats=getTaskStats();
  const suggestions={};
  // Temporary counters to account for within-week assignments
  const tempMedios={};
  for(const eid in stats)tempMedios[eid]=stats[eid].medios;
  const tempWorked={};
  for(const eid in stats)tempWorked[eid]=stats[eid].worked;
  
  for(const d of dates){
    const ds=fmtDate(d);
    if(isClosed(d))continue;
    for(const band of TASK_BANDS){
      const workers=[];
      for(const emp of employees){
        if(getEmpBand(d,emp.id)===band.id)workers.push(emp.id);
      }
      if(!workers.length)continue;
      
      // Skip if someone already manually assigned as medios in this band
      const hasManual=workers.some(eid=>state.taskAssigns[ds+'_'+eid]==='medios');
      if(hasManual)continue;
      
      // Pick worker with lowest medios ratio (most underserved)
      let best=null,bestRatio=Infinity;
      for(const eid of workers){
        const r=tempWorked[eid]>0?tempMedios[eid]/tempWorked[eid]:0;
        if(r<bestRatio){bestRatio=r;best=eid}
      }
      if(best){
        suggestions[ds+'_'+band.id]=best;
        // Update temp counters so next days in week account for this
        tempMedios[best]++;
      }
    }
  }
  return suggestions;
}

      let hasMedios=false;

          workers.push({emp,task,suggested,pct:empStats.pct,mediosDays:empStats.medios});

function toggleTask(ds,eid){
  const cur=getTaskAssign(ds,eid);
  const next=cur==='medios'?'telefono':'medios';
  setTaskAssign(ds,eid,next);
  renderTasks();
}

function autoAssignMedios(mode){
  let dates;
  if(mode==='month'){
    // Get all days in the current month
    const ref=addDays(state.currentWeekStart,3);
    const year=ref.getFullYear(),month=ref.getMonth();
    const daysInMonth=new Date(year,month+1,0).getDate();
    dates=[];
    for(let i=1;i<=daysInMonth;i++)dates.push(new Date(year,month,i,12));
  } else {
    dates=weekDates(state.currentWeekStart);
  }
  
  const stats=getTaskStats();
  const tempMedios={};
  for(const eid in stats)tempMedios[eid]=stats[eid].medios;
  
  let count=0;
  for(const d of dates){
    const ds=fmtDate(d);
    if(isClosed(d))continue;
    for(const band of TASK_BANDS){
      let hasMedios=false;
      const workers=[];
      for(const emp of employees){
        if(getEmpBand(d,emp.id)===band.id){
          workers.push(emp.id);
          if(getTaskAssign(ds,emp.id)==='medios')hasMedios=true;
        }
      }
      if(hasMedios||!workers.length)continue;
      
      let best=null,bestRatio=Infinity;
      for(const eid of workers){
        const worked=stats[eid]?.worked||1;
        const r=tempMedios[eid]/worked;
        if(r<bestRatio){bestRatio=r;best=eid}
      }
      if(best){
        setTaskAssign(ds,best,'medios');
        tempMedios[best]++;
        count++;
      }
    }
  }
  _taskStatsCache=null;
  renderTasks();
  const label=mode==='month'?'mes':'semana';
  showToast(`⚡ ${count} asignaciones de Medios (${label}) — reparto equitativo`,'success');
}

      for(let i=0;i<7;i++){

          row.push({v:'',s:freeStyle});

          row.push({v:'',s:freeStyle});

          row.push({v:ABSENCES[t].name,s:{font:{sz:10,italic:true,color:{rgb:'E57373'}},alignment:{horizontal:'center'}}});

          if(isMedios){

      rows.push(row);
    }

    rows.push([]);

  }

  // Legend sheet
  const legendWs=XLSX.utils.aoa_to_sheet([

}

function clearWeekTasks(){
  if(!confirm('¿Limpiar todas las asignaciones de función de esta semana?'))return;
  const dates=weekDates(state.currentWeekStart);
  for(const d of dates){
    const ds=fmtDate(d);
    for(const emp of employees)delete state.taskAssigns[ds+'_'+emp.id];
  }
  _taskStatsCache=null;
  renderTasks();
  showToast('Distribución limpiada','success');
}

const NIGHT_HOURS={morning:0,mid:0,afternoon:1,closing:2,afternoon_14_22:0,jesus_fri:2,jesus_sat:0,jesus_sun:2};

function getMonthNightFestive(empId,year,month){
  const daysInMonth=new Date(year,month+1,0).getDate();
  const nights=[],festives=[];
  for(let day=1;day<=daysInMonth;day++){
    const d=new Date(year,month,day,12);
    const ds=fmtDate(d);
    const a=getAssign(d,empId);
    const t=a.type;
    if(!t||!SHIFTS[t])continue;
    const nh=NIGHT_HOURS[t]||0;
    if(nh>0)nights.push({date:ds,shift:SHIFTS[t].time,hours:nh});
    const hol=isHoliday(d);
    if(hol)festives.push({date:ds,shift:SHIFTS[t].time,hours:getShiftHours(t),holiday:hol});
  }
  return{nights,festives};
}

  let totalNightH=0,totalFestH=0;
  const empData=[];
  
  for(const emp of employees){
    const data=getMonthNightFestive(emp.id,adminNominaYear,adminNominaMonth);
    
    // Check manual entries
    const manualNights=state.nominaEntries.filter(e=>e.employee_id===emp.id&&e.type==='night'&&e.month===monthKey);
    const manualFest=state.nominaEntries.filter(e=>e.employee_id===emp.id&&e.type==='festive'&&e.month===monthKey);
    const validated=state.nominaEntries.some(e=>e.employee_id===emp.id&&e.type==='validation'&&e.month===monthKey&&e.validated);
    const approved=state.nominaEntries.some(e=>e.employee_id===emp.id&&e.type==='approval'&&e.month===monthKey&&e.validated);
    const hasManual=manualNights.length>0||manualFest.length>0;
    
    // Merge manual entries
    const nightTotal=data.nights.reduce((s,e)=>s+e.hours,0)+manualNights.reduce((s,e)=>s+(e.hours||0),0);
    const festTotal=data.festives.reduce((s,e)=>s+e.hours,0)+manualFest.reduce((s,e)=>s+(e.hours||0),0);
    const nightDays=data.nights.length+manualNights.length;
    const festDays=data.festives.length+manualFest.length;
    
    if(nightDays===0&&festDays===0)continue;
    
    totalNightH+=nightTotal;totalFestH+=festTotal;
    
    // 3 states: approved > validated > pending
    let statusIcon,statusCol,statusAction='';
    if(approved){
      statusIcon='✅ Aprobado';statusCol='var(--success)';
    } else if(validated){
      statusIcon=hasManual?'⚠️ Validado (ediciones)':'📩 Validado';
      statusCol='var(--accent2)';
      statusAction=`<button class="btn btn-sm" style="font-size:10px;padding:2px 8px;background:var(--success);color:#fff;border:none;margin-left:4px" onclick="event.stopPropagation();approveNomina('${emp.id}','${monthKey}')">Aprobar</button>`;
    } else {
      statusIcon='⏳ Pendiente';statusCol='var(--warning)';
    }
    
    empData.push({emp,data,nightTotal,festTotal,nightDays,festDays,validated,approved,hasManual});
    
    h+=`<tr style="border-bottom:1px solid var(--border);cursor:pointer" onclick="toggleNominaDetail('${emp.id}')" title="Clic para ver detalle">
      <td style="padding:8px 10px;font-weight:600">${emp.name}</td>
      <td style="text-align:center;padding:8px">${nightDays}</td>
      <td style="text-align:center;padding:8px;font-weight:700;color:var(--closing)">${nightTotal}h</td>
      <td style="text-align:center;padding:8px">${festDays}</td>
      <td style="text-align:center;padding:8px;font-weight:700;color:var(--danger)">${festTotal}h</td>
      <td style="text-align:center;padding:8px;font-size:11px;color:${statusCol}">${statusIcon}${statusAction}</td>
    </tr>
    <tr id="nomDetail_${emp.id}" style="display:none"><td colspan="6" style="padding:0"></td></tr>`;
  }
  
  const approvedCount=empData.filter(e=>e.approved).length;
  const validatedCount=empData.filter(e=>e.validated&&!e.approved).length;
  const pendingApproval=empData.filter(e=>e.validated&&!e.approved);
  
  h+=`<tr style="font-weight:700;background:var(--bg3)">
    <td style="padding:8px 10px">TOTAL EQUIPO</td>
    <td style="text-align:center;padding:8px">${empData.reduce((s,e)=>s+e.nightDays,0)}</td>
    <td style="text-align:center;padding:8px;color:var(--closing)">${totalNightH}h</td>
    <td style="text-align:center;padding:8px">${empData.reduce((s,e)=>s+e.festDays,0)}</td>
    <td style="text-align:center;padding:8px;color:var(--danger)">${totalFestH}h</td>
    <td style="text-align:center;padding:8px;font-size:11px;color:var(--text3)">${approvedCount}✅ ${validatedCount}📩 / ${empData.length}</td>
  </tr></tbody></table></div>`;
  
  // Bulk approve button
  if(pendingApproval.length){
    h+=`<div style="text-align:center;margin-top:12px">
      <button class="btn" style="background:var(--success);color:#fff;border-color:var(--success);font-weight:600;padding:8px 24px" onclick="bulkApproveNomina('${monthKey}')">✅ Aprobar todos los validados (${pendingApproval.length})</button>
    </div>`;
  }
  
  document.getElementById('nominaContent').innerHTML=h;
  
  // Store empData for detail toggle
  window._nominaEmpData=empData;
}

function toggleNominaDetail(empId){
  const row=document.getElementById('nomDetail_'+empId);
  if(!row)return;
  if(row.style.display==='none'){
    const ed=window._nominaEmpData?.find(e=>e.emp.id===empId);
    if(!ed){row.style.display='';return}
    
    let d=`<div style="padding:10px 16px;background:var(--bg);display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
    
    // Night details
    d+=`<div><div style="font-size:11px;font-weight:700;color:var(--closing);margin-bottom:6px">🌙 Nocturnas</div>`;
    if(ed.data.nights.length){
      for(const n of ed.data.nights){
        const dd=n.date.slice(8)+'/'+n.date.slice(5,7);
        d+=`<div style="font-size:11px;padding:2px 0;display:flex;justify-content:space-between"><span>${dd} — ${n.shift}</span><span style="font-weight:600">${n.hours}h</span></div>`;
      }
    } else d+=`<div style="font-size:11px;color:var(--text3)">—</div>`;
    d+=`</div>`;
    
    // Festive details
    d+=`<div><div style="font-size:11px;font-weight:700;color:var(--danger);margin-bottom:6px">🔴 Festivas</div>`;
    if(ed.data.festives.length){
      for(const f of ed.data.festives){
        const dd=f.date.slice(8)+'/'+f.date.slice(5,7);
        d+=`<div style="font-size:11px;padding:2px 0;display:flex;justify-content:space-between"><span>${dd} ${f.holiday} — ${f.shift}</span><span style="font-weight:600">${f.hours}h</span></div>`;
      }
    } else d+=`<div style="font-size:11px;color:var(--text3)">—</div>`;
    d+=`</div></div>`;
    
    row.querySelector('td').innerHTML=d;
    row.style.display='';
  } else {
    row.style.display='none';
  }
}

async function approveNomina(empId,monthKey){
  const emp=employees.find(e=>e.id===empId);
  if(!confirm(`¿Aprobar las horas nocturnas y festivas de ${emp.name} para ${monthKey}?`))return;
  const entry={id:crypto.randomUUID(),employee_id:empId,date:monthKey+'-01',type:'approval',shift_time:'',hours:0,auto_calculated:false,validated:true,validated_at:new Date().toISOString(),month:monthKey,holiday:''};
  state.nominaEntries.push(entry);
  try{await db.from('night_festive_entries').insert(entry)}catch(e){}
  renderAdminNomina();
  showToast(`✅ ${emp.name} aprobado para ${monthKey}`,'success');
}

async function bulkApproveNomina(monthKey){
  const pending=window._nominaEmpData?.filter(e=>e.validated&&!e.approved)||[];
  if(!pending.length){showToast('Nada que aprobar','error');return}
  if(!confirm(`¿Aprobar ${pending.length} empleados de una vez?`))return;
  
  for(const ed of pending){
    const entry={id:crypto.randomUUID(),employee_id:ed.emp.id,date:monthKey+'-01',type:'approval',shift_time:'',hours:0,auto_calculated:false,validated:true,validated_at:new Date().toISOString(),month:monthKey,holiday:''};
    state.nominaEntries.push(entry);
    try{await db.from('night_festive_entries').insert(entry)}catch(e){}
  }
  renderAdminNomina();
  showToast(`✅ ${pending.length} empleados aprobados`,'success');
}

function exportAdminNomina(monthKey){
  const monthNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const mo=parseInt(monthKey.split('-')[1])-1;
  const yr=parseInt(monthKey.split('-')[0]);
  const wb=XLSX.utils.book_new();
  
  const hdrStyle={font:{bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'2D3748'}},alignment:{horizontal:'center'}};
  const empStyle={font:{bold:true,sz:11}};
  const nightStyle={font:{sz:10},fill:{fgColor:{rgb:'E8D5F5'}},alignment:{horizontal:'center'}};
  const festStyle={font:{sz:10},fill:{fgColor:{rgb:'FED7D7'}},alignment:{horizontal:'center'}};
  const totalStyle={font:{bold:true,sz:11},alignment:{horizontal:'center'}};
  
  const rows=[];
  rows.push([{v:monthNames[mo].toUpperCase(),s:{font:{bold:true,sz:14}}}]);
  rows.push([{v:'HORAS NOCTURNAS SAC',s:{font:{bold:true,sz:12,color:{rgb:'7B1FA2'}}}},null,null,null,null,null,{v:'HORAS FESTIVAS SAC',s:{font:{bold:true,sz:12,color:{rgb:'C62828'}}}}]);
  rows.push([{v:'TRABAJADOR/A',s:hdrStyle},null,null,null,null,null,{v:'TRABAJADOR/A',s:hdrStyle}]);
  rows.push([]);
  
  for(const emp of employees){
    const data=getMonthNightFestive(emp.id,yr,mo);
    if(data.nights.length===0&&data.festives.length===0)continue;
    
    // Employee header
    rows.push([
      {v:emp.name,s:empStyle},{v:'FECHA',s:hdrStyle},{v:'HORARIO',s:hdrStyle},{v:'TOTAL HORAS DÍA',s:hdrStyle},{v:'TOTAL MES',s:hdrStyle},
      null,
      {v:emp.name,s:empStyle},{v:'FECHA',s:hdrStyle},{v:'HORARIO',s:hdrStyle},{v:'TOTAL HORAS DÍA',s:hdrStyle},{v:'TOTAL MES',s:hdrStyle}
    ]);
    
    const maxRows=Math.max(data.nights.length,data.festives.length,1);
    let nTotal=0,fTotal=0;
    for(let i=0;i<maxRows;i++){
      const row=[];
      if(data.nights[i]){
        const dd=data.nights[i].date.slice(8)+'/'+data.nights[i].date.slice(5,7)+'/'+yr;
        row.push(null,{v:dd,s:nightStyle},{v:data.nights[i].shift,s:nightStyle},{v:data.nights[i].hours,s:nightStyle},null);
        nTotal+=data.nights[i].hours;
      } else row.push(null,null,null,null,null);
      row.push(null);
      if(data.festives[i]){
        const dd=data.festives[i].date.slice(8)+'/'+data.festives[i].date.slice(5,7)+'/'+yr;
        row.push(null,{v:dd,s:festStyle},{v:data.festives[i].shift,s:festStyle},{v:data.festives[i].hours,s:festStyle},null);
        fTotal+=data.festives[i].hours;
      } else row.push(null,null,null,null,null);
      rows.push(row);
    }
    // Totals
    const tRow=[null,null,null,null,{v:nTotal,s:totalStyle},null,null,null,null,null,{v:fTotal,s:totalStyle}];
    rows.push(tRow);
    rows.push([]);
  }
  
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:18},{wch:12},{wch:14},{wch:16},{wch:12},{wch:3},{wch:18},{wch:12},{wch:14},{wch:16},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,monthNames[mo]);
  XLSX.writeFile(wb,`Nocturnas_Festivas_SAC_${monthKey}.xlsx`);
  showToast('📥 Excel nómina exportado','success');
}

function renderMetrics(){
  const container=document.getElementById('metricsContent');
  // Capture current filter values BEFORE replacing DOM
  const sEl=document.getElementById('metricStart'),eEl=document.getElementById('metricEnd'),empEl=document.getElementById('metricEmp');

function _doRenderMetrics(container,sd,ed,empFilter){
  const d0=new Date(sd+'T12:00:00'),dEnd=new Date(ed+'T12:00:00');
  if(isNaN(d0.getTime())||isNaN(dEnd.getTime())){container.innerHTML='<p style="color:var(--danger)">Fechas no válidas</p>';return}
  
  const filteredEmps=empFilter==='all'?employees:employees.filter(e=>e.id===empFilter);
  
  const tardeSh=['afternoon','closing','afternoon_14_22','jesus_fri','jesus_sun'];
  const midSh=['mid','jesus_sat'];
  const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  
  // Gather per-employee stats for selected range
  const empStats=[];
  for(const emp of filteredEmps){
    let totalHours=0,workDays=0,vacDays=0,sickDays=0,patDays=0,permDays=0;
    let mornings=0,tardes=0,mids=0,frees=0;
    let monthlyH=Array(12).fill(0);
    let d=new Date(d0);
    while(d<=dEnd){
      if(!isClosed(d)){
        const a=getAssign(d,emp.id);
        if(a.type&&SHIFTS[a.type]){
          const h=getShiftHours(a.type);
          totalHours+=h;workDays++;monthlyH[d.getMonth()]+=h;
          if(a.type==='morning')mornings++;
          else if(tardeSh.includes(a.type))tardes++;
          else if(midSh.includes(a.type))mids++;
        } else if(a.type==='vacation')vacDays++;
        else if(a.type==='sick')sickDays++;
        else if(a.type==='paternity')patDays++;
        else if(a.type==='permission')permDays++;
        else frees++;
      }
      d=addDays(d,1);
    }
    empStats.push({emp,totalHours,workDays,vacDays,sickDays,patDays,permDays,mornings,tardes,mids,frees,monthlyH});
  }
  
  // Monthly coverage gaps for range
  const monthGaps=Array(12).fill(0);
  let dc=new Date(d0);
  while(dc<=dEnd){
    if(!isClosed(dc)){
      let mc=0,tc=0;
      for(const emp of employees){const a=getAssign(dc,emp.id);if(a.type&&SHIFTS[a.type]){if(a.type==='morning')mc++;else if(tardeSh.includes(a.type))tc++}}
      if(mc<3)monthGaps[dc.getMonth()]++;
      if(tc<3)monthGaps[dc.getMonth()]++;
    }
    dc=addDays(dc,1);
  }
  
  // Store for export (set after all vars computed below)
  
  // === TOOLBAR ===
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px">
    <h2 style="font-size:18px;font-weight:700">📈 Métricas</h2>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select id="metricEmp" onchange="renderMetrics()" style="padding:5px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:inherit;max-width:130px">
        <option value="all"${empFilter==='all'?' selected':''}>Todos</option>
        ${employees.map(e=>`<option value="${e.id}"${empFilter===e.id?' selected':''}>${e.name}</option>`).join('')}
      </select>
      <input type="date" id="metricStart" value="${sd}" onchange="renderMetrics()" style="padding:5px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:inherit">
      <span style="color:var(--text3);font-size:12px">→</span>
      <input type="date" id="metricEnd" value="${ed}" onchange="renderMetrics()" style="padding:5px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:inherit">
      <button class="btn btn-sm" onclick="document.getElementById('metricStart').value='2026-01-01';document.getElementById('metricEnd').value='2026-12-31';renderMetrics()" style="font-size:10px">Año</button>
      <button class="btn btn-sm" style="background:var(--success);color:#fff;border-color:var(--success)" onclick="exportMetrics()">📥 Excel</button>
    </div>
  </div>`;
  
  const totalDays=Math.round((dEnd-d0)/864e5)+1;
  const isSingle=filteredEmps.length===1;
  const empLabel=isSingle?filteredEmps[0].name:'equipo';
  window._metricsData={empStats,monthGaps,months,sd,ed,d0,dEnd,empLabel,isSingle};
  
  // === KPI CARDS ===
  const totalH=empStats.reduce((s,e)=>s+e.totalHours,0);
  const totalVac=empStats.reduce((s,e)=>s+e.vacDays,0);
  const totalGaps=monthGaps.reduce((s,v)=>s+v,0);
  const avgH=filteredEmps.length?Math.round(totalH/filteredEmps.length):0;
  const propTarget=Math.round(ANNUAL_HOURS*totalDays/365);
  html+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
    <div style="background:var(--bg2);border-radius:8px;padding:14px;border:1px solid var(--border)"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Horas ${empLabel}</div><div style="font-size:24px;font-weight:700;color:var(--accent);margin-top:4px">${totalH.toLocaleString()}</div><div style="font-size:11px;color:var(--text3)">${isSingle?totalDays+'d período':'Media '+avgH+'h/pers · '+totalDays+'d'}</div></div>
    <div style="background:var(--bg2);border-radius:8px;padding:14px;border:1px solid var(--border)"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Vacaciones</div><div style="font-size:24px;font-weight:700;color:var(--vacation);margin-top:4px">${totalVac}</div><div style="font-size:11px;color:var(--text3)">${isSingle?'de '+ANNUAL_VACATION+' días':'de '+filteredEmps.length*ANNUAL_VACATION+' totales'}</div></div>
    <div style="background:var(--bg2);border-radius:8px;padding:14px;border:1px solid var(--border)"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Gaps cobertura</div><div style="font-size:24px;font-weight:700;color:${totalGaps>20?'var(--danger)':'var(--success)'};margin-top:4px">${totalGaps}</div><div style="font-size:11px;color:var(--text3)">turnos bajo mínimo</div></div>
    <div style="background:var(--bg2);border-radius:8px;padding:14px;border:1px solid var(--border)"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Obj. proporcional</div><div style="font-size:24px;font-weight:700;color:${isSingle&&totalH>propTarget*1.05?'var(--danger)':'var(--text)'};margin-top:4px">${propTarget}h</div><div style="font-size:11px;color:var(--text3)">${ANNUAL_HOURS}h × ${totalDays}/365d</div></div>
  </div>`;
  
  // === HORAS POR EMPLEADO ===
  const maxH=Math.max(...empStats.map(e=>e.totalHours),propTarget);
  html+=`<div style="background:var(--bg2);border-radius:8px;padding:16px;border:1px solid var(--border);margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;margin-bottom:12px">Horas por empleado <span style="color:var(--text3);font-weight:400;font-size:12px">(objetivo proporcional: ${propTarget}h)</span></h3>`;
  for(const es of empStats){
    const pct=maxH?Math.round(es.totalHours/maxH*100):0;
    const tPct=maxH?Math.round(propTarget/maxH*100):0;
    const col=es.totalHours>propTarget*1.05?'var(--danger)':es.totalHours>propTarget*0.8?'var(--warning)':'var(--accent)';
    html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:70px;font-size:11px;font-weight:600;text-align:right;flex-shrink:0">${es.emp.name}</div><div style="flex:1;position:relative;height:16px;background:var(--bg);border-radius:3px;overflow:hidden"><div style="position:absolute;left:${tPct}%;top:0;bottom:0;width:1px;background:var(--text3);z-index:2"></div><div style="width:${pct}%;height:100%;background:${col};border-radius:3px"></div></div><div style="width:55px;font-size:10px;color:${col};font-weight:600;text-align:right">${es.totalHours}h</div></div>`;
  }
  html+=`</div>`;
  
  // === VACACIONES ===
  html+=`<div style="background:var(--bg2);border-radius:8px;padding:16px;border:1px solid var(--border);margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;margin-bottom:12px">Vacaciones <span style="color:var(--text3);font-weight:400;font-size:12px">(${ANNUAL_VACATION}d/empleado)</span></h3>`;
  for(const es of empStats){
    const pct=Math.min(Math.round(es.vacDays/ANNUAL_VACATION*100),100);
    const col=es.vacDays>ANNUAL_VACATION?'var(--danger)':pct>80?'var(--warning)':'var(--vacation)';
    const rest=ANNUAL_VACATION-es.vacDays;
    html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:70px;font-size:11px;font-weight:600;text-align:right;flex-shrink:0">${es.emp.name}</div><div style="flex:1;height:16px;background:var(--bg);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${col};border-radius:3px"></div></div><div style="width:70px;font-size:10px;color:var(--text2);text-align:right">${es.vacDays}d <span style="color:${rest<0?'var(--danger)':'var(--text3)'}">(${rest>=0?rest+'rest.':'!'+Math.abs(rest)})</span></div></div>`;
  }
  html+=`</div>`;
  
  // === DISTRIBUCIÓN TURNOS ===
  html+=`<div style="background:var(--bg2);border-radius:8px;padding:16px;border:1px solid var(--border);margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;margin-bottom:12px">Distribución de turnos</h3><div style="display:flex;gap:12px;font-size:10px;color:var(--text3);margin-bottom:10px"><span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--morning);vertical-align:middle;margin-right:3px"></span>Mañana</span><span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--mid);vertical-align:middle;margin-right:3px"></span>Medio</span><span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--afternoon);vertical-align:middle;margin-right:3px"></span>Tarde+Cierre</span></div>`;
  for(const es of empStats){
    const total=es.mornings+es.tardes+es.mids;if(total===0)continue;
    const mPct=Math.round(es.mornings/total*100),miPct=Math.round(es.mids/total*100),tPct=100-mPct-miPct;
    html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:70px;font-size:11px;font-weight:600;text-align:right;flex-shrink:0">${es.emp.name}</div><div style="flex:1;height:16px;background:var(--bg);border-radius:3px;overflow:hidden;display:flex"><div style="width:${mPct}%;background:var(--morning)"></div><div style="width:${miPct}%;background:var(--mid)"></div><div style="width:${tPct}%;background:var(--afternoon)"></div></div><div style="width:80px;font-size:9px;color:var(--text3);text-align:right">${es.mornings}M ${es.mids}Me ${es.tardes}T</div></div>`;
  }
  html+=`</div>`;
  
  // === GAPS POR MES ===
  const activeMonths=[];for(let i=0;i<12;i++)if(i>=d0.getMonth()&&i<=dEnd.getMonth())activeMonths.push(i);
  const maxGap=Math.max(...activeMonths.map(i=>monthGaps[i]),1);
  html+=`<div style="background:var(--bg2);border-radius:8px;padding:16px;border:1px solid var(--border);margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;margin-bottom:12px">Gaps cobertura por mes</h3><div style="display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:8px">`;
  for(const i of activeMonths){
    const h=Math.round(monthGaps[i]/maxGap*100);
    const col=monthGaps[i]===0?'var(--success)':monthGaps[i]>5?'var(--danger)':'var(--warning)';
    html+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:10px;font-weight:600;color:${col}">${monthGaps[i]||''}</div><div style="width:100%;height:${h}%;min-height:${monthGaps[i]?4:0}px;background:${col};border-radius:3px 3px 0 0"></div><div style="font-size:9px;color:var(--text3)">${months[i]}</div></div>`;
  }
  html+=`</div></div>`;
  
  // === HEATMAP MENSUAL ===
  html+=`<div style="background:var(--bg2);border-radius:8px;padding:16px;border:1px solid var(--border);margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;margin-bottom:12px">Horas mensuales</h3><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:10px"><tr><th style="text-align:left;padding:3px 6px;color:var(--text3)"></th>`;
  for(const i of activeMonths)html+=`<th style="padding:3px 4px;color:var(--text3);text-align:center;min-width:38px">${months[i]}</th>`;
  html+=`<th style="padding:3px 6px;color:var(--accent);text-align:right;font-weight:700">Total</th></tr>`;
  for(const es of empStats){
    html+=`<tr><td style="padding:2px 6px;font-weight:600;white-space:nowrap">${es.emp.name}</td>`;
    for(const i of activeMonths){
      const h=es.monthlyH[i];
      const intensity=h===0?0:Math.min(Math.round(h/180*100),100);
      const bg=h===0?'transparent':`rgba(99,102,241,${intensity/100*0.5+0.05})`;
      html+=`<td style="padding:2px 4px;text-align:center;background:${bg};color:${h?'var(--text)':'var(--text3)'}">${h||'-'}</td>`;
    }
    html+=`<td style="padding:2px 6px;text-align:right;font-weight:700;color:var(--text)">${es.totalHours}</td></tr>`;
  }
  html+=`</table></div></div>`;
  
  container.innerHTML=html;
}

function exportMetrics(){
  const md=window._metricsData;if(!md){showToast('Carga las métricas primero','error');return}
  const{empStats,monthGaps,months,sd,ed}=md;
  const wb=XLSX.utils.book_new();
  
  // Sheet 1: Resumen por empleado
  const rows1=empStats.map(es=>({
    'Empleado':es.emp.name,
    'Horas período':es.totalHours,
    'Objetivo anual':ANNUAL_HOURS,
    'Horas restantes':ANNUAL_HOURS-es.totalHours,
    'Días trabajados':es.workDays,
    'Vacaciones usadas':es.vacDays,
    'Vacaciones totales':ANNUAL_VACATION,
    'Vacaciones restantes':ANNUAL_VACATION-es.vacDays,
    'Paternidad':es.patDays,
    'Baja':es.sickDays,
    'Permisos':es.permDays,
    'Turnos mañana':es.mornings,
    'Turnos medio':es.mids,
    'Turnos tarde+cierre':es.tardes,
    'Días libres':es.frees
  }));
  const ws1=XLSX.utils.json_to_sheet(rows1);
  ws1['!cols']=[{wch:14},{wch:12},{wch:12},{wch:14},{wch:14},{wch:16},{wch:16},{wch:18},{wch:10},{wch:8},{wch:10},{wch:14},{wch:12},{wch:16},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws1,'Resumen');
  
  // Sheet 2: Horas mensuales
  const rows2=empStats.map(es=>{
    const r={'Empleado':es.emp.name};
    for(let i=0;i<12;i++)r[months[i]]=es.monthlyH[i]||0;
    r['Total']=es.totalHours;
    return r;
  });
  const ws2=XLSX.utils.json_to_sheet(rows2);
  XLSX.utils.book_append_sheet(wb,ws2,'Horas mensuales');
  
  // Sheet 3: Distribución turnos
  const rows3=empStats.map(es=>{
    const total=es.mornings+es.tardes+es.mids;
    return{
      'Empleado':es.emp.name,
      'Mañanas':es.mornings,
      'Medios':es.mids,
      'Tardes+Cierre':es.tardes,
      'Total turnos':total,
      '% Mañana':total?Math.round(es.mornings/total*100)+'%':'0%',
      '% Medio':total?Math.round(es.mids/total*100)+'%':'0%',
      '% Tarde':total?Math.round(es.tardes/total*100)+'%':'0%'
    };
  });
  const ws3=XLSX.utils.json_to_sheet(rows3);
  XLSX.utils.book_append_sheet(wb,ws3,'Distribución turnos');
  
  // Sheet 4: Gaps cobertura
  const rows4=months.map((m,i)=>({'Mes':m,'Gaps cobertura':monthGaps[i]}));
  const ws4=XLSX.utils.json_to_sheet(rows4);
  XLSX.utils.book_append_sheet(wb,ws4,'Gaps cobertura');
  
  // Sheet 5: Vacaciones detalle
  const rows5=empStats.map(es=>({
    'Empleado':es.emp.name,
    'Días usados':es.vacDays,
    'Días totales':ANNUAL_VACATION,
    'Restantes':ANNUAL_VACATION-es.vacDays,
    '% Consumido':Math.round(es.vacDays/ANNUAL_VACATION*100)+'%'
  }));
  const ws5=XLSX.utils.json_to_sheet(rows5);
  XLSX.utils.book_append_sheet(wb,ws5,'Vacaciones');
  
  const fname=md.isSingle?`Metricas_${md.empLabel}_${sd}_${ed}.xlsx`:`Metricas_SAC_${sd}_${ed}.xlsx`;
  XLSX.writeFile(wb,fname);
  showToast('📥 Métricas exportadas','success');
}
