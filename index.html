function isWorkDay(d,eid){const a=getAssign(d,eid);return a.type&&SHIFTS[a.type]}
function getWeekFreeDays(d,eid){const m=getMonday(d);let f=0;for(let i=0;i<7;i++)if(!isWorkDay(addDays(m,i),eid))f++;return f}
function getConsecutiveIfAssigned(d,eid){let c=1,b=1;while(b<14){if(isWorkDay(addDays(d,-b),eid)){c++;b++}else break}let f=1;while(f<14){if(isWorkDay(addDays(d,f),eid)){c++;f++}else break}return c}
function getConsecutiveWorkDays(d,eid){if(!isWorkDay(d,eid))return 0;let c=1,b=1;while(b<14){if(isWorkDay(addDays(d,-b),eid)){c++;b++}else break}let f=1;while(f<14){if(isWorkDay(addDays(d,f),eid)){c++;f++}else break}return c}
function getActiveDebts(eid){return state.dayDebts.filter(d=>d.employee_id===eid&&!d.resolved)}
function getSwapCountThisYear(eid){const y=String(new Date().getFullYear());return state.swapRequests.filter(s=>s.requester_id===eid&&s.created_at&&s.created_at.startsWith(y)).length}
function getPendingSwaps(){return state.swapRequests.filter(s=>s.status==='pending')}

// ===================== ASSIGNMENTS =====================
function aKey(d,eid){return fmtDate(d)+'_'+eid}
function getAssign(d,eid){
  const k=aKey(d,eid);if(state.assignments[k])return state.assignments[k];
  const abs=getAbsence(d,eid);if(abs)return{type:abs.type,isAbsence:true};
  if(isClosed(d))return{type:'closed'};
  const cw=cycleWeek(d),dow=(d.getDay()+6)%7;
  if(ROTATION[eid]){const s=ROTATION[eid][cw][dow];return{type:s||'free',fromRotation:true}}
  return{type:'free'}
}
function getAbsence(d,eid){const ds=fmtDate(d);return state.absences.find(a=>a.employee_id===eid&&a.start_date<=ds&&(!a.end_date||a.end_date>=ds)&&a.status==='approved')}

async function setAssign(d,eid,shiftType,reason=''){
  const prev=getAssign(d,eid);
  state.assignments[aKey(d,eid)]={type:shiftType,modified:true,reason};
  checkAndCreateDebt(d,eid);
  addLog(eid,fmtDate(d),prev.type,shiftType,reason||'Cambio manual');
  renderAll();showToast('Turno actualizado: '+employees.find(e=>e.id===eid).name,'success');
  await dbSaveAssignment(d,eid,shiftType,reason);
}

// ===================== DEBT MANAGEMENT =====================
async function checkAndCreateDebt(d,eid){
  const m=getMonday(d),ws=fmtDate(m);let wd=0;
  for(let i=0;i<7;i++)if(isWorkDay(addDays(m,i),eid))wd++;
  if(wd>=6){
    const existing=state.dayDebts.find(db=>db.employee_id===eid&&db.week_str===ws&&!db.resolved);
    if(!existing){
      const debt={id:crypto.randomUUID(),employee_id:eid,owed_since:fmtDate(d),week_str:ws,reason:`${employees.find(e=>e.id===eid).name} trabajó ${wd} días (sem ${fmtShort(m)})`,resolved:false,resolved_date:null};
      state.dayDebts.push(debt);
      await dbSaveDebt(debt);
    }
  }
}
async function resolveDebt(id){
  const d=state.dayDebts.find(x=>x.id===id);if(!d)return;
  d.resolved=true;d.resolved_date=fmtDate(new Date());
  await db.from('day_debts').update({resolved:true,resolved_date:d.resolved_date}).eq('id',id);
  renderAll();showToast('Deuda compensada ✓','success');
}
function findBestDayToReturn(eid){
  const s=[];const t=new Date();
  for(let i=1;i<=21;i++){const d=addDays(t,i);if(isClosed(d))continue;const a=getAssign(d,eid);if(!a.type||!SHIFTS[a.type])continue;
  const{counts}=getDayCoverage(d);const sg=(a.type==='afternoon'||a.type==='closing')?'tarde':a.type;const mn=COVERAGE_MIN[sg]||0;if(counts[sg]>mn)s.push({date:d,shift:a.type,dayIdx:(d.getDay()+6)%7});if(s.length>=3)break}return s
}

// ===================== COVERAGE =====================
function getDayCoverage(d){const c={morning:0,mid:0,afternoon:0,closing:0},n={morning:[],mid:[],afternoon:[],closing:[]};for(const e of employees){const a=getAssign(d,e.id);if(a.type&&SHIFTS[a.type]){c[a.type]++;n[a.type].push(e.name)}}c.tarde=c.afternoon+c.closing;n.tarde=[...n.afternoon,...n.closing];return{counts:c,names:n}}
function getCoverageStatus(d){const{counts}=getDayCoverage(d);const issues=[];if(counts.morning<COVERAGE_MIN.morning)issues.push({shift:'morning',have:counts.morning,need:COVERAGE_MIN.morning});if(counts.tarde<COVERAGE_MIN.tarde)issues.push({shift:'tarde',have:counts.tarde,need:COVERAGE_MIN.tarde});return{counts,issues,ok:issues.length===0}}

// ===================== VALIDATION =====================
function validate(d,eid,ns){
  const al=[],emp=employees.find(e=>e.id===eid);if(!emp||!ns||ns==='free'||!SHIFTS[ns])return al;
  if(emp.restrictions.includes(ns))al.push({type:'block',msg:`${emp.name} tiene restricción de ${SHIFTS[ns].name}`});
  if(getAbsence(d,eid))al.push({type:'block',msg:`${emp.name} tiene ausencia activa`});
  if(isClosed(d))al.push({type:'block',msg:'Día cerrado'});
  const prev=getAssign(addDays(d,-1),eid);if(prev.type&&SHIFTS[prev.type]){const r=(24-SHIFTS[prev.type].end)+SHIFTS[ns].start;if(r<12)al.push({type:'error',msg:`Descanso insuficiente: ${r}h entre ${SHIFTS[prev.type].name} y ${SHIFTS[ns].name} (mín 12h)`})}
  const next=getAssign(addDays(d,1),eid);if(next.type&&SHIFTS[next.type]){const r=(24-SHIFTS[ns].end)+SHIFTS[next.type].start;if(r<12)al.push({type:'error',msg:`Descanso insuficiente con día siguiente: ${r}h hasta ${SHIFTS[next.type].name} (mín 12h)`})}
  const con=getConsecutiveIfAssigned(d,eid);if(con>6)al.push({type:'block',msg:`${emp.name} llevaría ${con} días consecutivos (máx 6)`});else if(con===6)al.push({type:'error',msg:`⚠ ${emp.name} llevaría 6 días consecutivos`});
  const m=getMonday(d);let wwd=0;for(let i=0;i<7;i++){const wd=addDays(m,i);if(fmtDate(wd)===fmtDate(d)){wwd++;continue}if(isWorkDay(wd,eid))wwd++}const wf=7-wwd;
  if(wf<2)al.push({type:'error',msg:`${emp.name} solo tendría ${wf} día${wf!==1?'s':''} libre${wf!==1?'s':''} esta semana. Se generará deuda.`});
  return al
}

// ===================== SUBSTITUTION ENGINE =====================
function findCandidates(d,sn){
  const c=[];for(const emp of employees){
    const a=getAssign(d,emp.id);if(a.type!=='free')continue;if(emp.restrictions.includes(sn))continue;
    const v=validate(d,emp.id,sn);if(v.some(x=>x.type==='block'))continue;const he=v.some(x=>x.type==='error');
    const m=getMonday(d);let wh=0,wwd=0;for(let i=0;i<7;i++){const wa=getAssign(addDays(m,i),emp.id);if(wa.type&&SHIFTS[wa.type]){wh+=8;wwd++}}
    const con=getConsecutiveIfAssigned(d,emp.id),ex5=(wwd+1)>5,hd=getActiveDebts(emp.id).length>0;
    let sc=wh;if(ex5)sc+=200;if(hd)sc+=150;if(he)sc+=100;if(con>=5)sc+=80;
    c.push({employee:emp,weekHours:wh,weekWorkDays:wwd,consecutive:con,wouldExceed5days:ex5,hasDebt:hd,hasRestWarning:he,score:sc})
  }c.sort((a,b)=>a.score-b.score);return c
}
function findSwapCandidates(d,sn){
  const c=[],cov=getDayCoverage(d);for(const emp of employees){
    const a=getAssign(d,emp.id);if(!a.type||!SHIFTS[a.type]||a.type===sn||a.isAbsence)continue;if(emp.restrictions.includes(sn))continue;
    const cs=a.type,cg=(cs==='afternoon'||cs==='closing')?'tarde':cs,cm=COVERAGE_MIN[cg]||0;if(cov.counts[cg]<=cm)continue;
    const v=validate(d,emp.id,sn);if(v.some(x=>x.type==='block'))continue;
    c.push({employee:emp,currentShift:cs,hasRestWarning:v.some(x=>x.type==='error')})
  }return c
}

// ===================== CHANGELOG =====================
async function addLog(eid,date,from,to,reason){
  const entry={ts:new Date().toISOString(),employee_id:eid,date,from_val:from,to_val:to,reason,user_name:currentUser?.display_name||''};
  state.changelog.unshift(entry);
  await db.from('changelog').insert(entry);
}

      const d=dates[i],a=getAssign(d,emp.id),t=a.type;let cls='shift-cell ',txt='';

      const vals=validate(d,emp.id,t);if(vals.some(v=>v.type==='error'))cls+=' conflict';

    }h+='</tr>'
  }
  h+='<tr class="cov-row"><td class="emp-name" style="font-size:11px;color:var(--text2)">Cobertura</td>';
  for(let i=0;i<7;i++){const d=dates[i];if(isClosed(d)){h+='<td style="color:var(--text3);font-size:11px">Cerrado</td>';continue}
    const{counts,issues}=getCoverageStatus(d),cls=issues.length===0?'cov-ok':(issues.some(x=>x.have===0)?'cov-bad':'cov-warn');
    let det='<div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap">';
    const covG=[{ab:'M',c:counts.morning,mn:COVERAGE_MIN.morning},{ab:'Me',c:counts.mid,mn:COVERAGE_MIN.mid},{ab:'T',c:counts.tarde,mn:COVERAGE_MIN.tarde}];
    for(const g of covG){const col=g.mn===0?'var(--text3)':(g.c>g.mn?'var(--success)':(g.c===g.mn?'var(--warning)':'var(--danger)'));det+=`<span style="color:${col};font-size:10px;font-weight:700" title="${g.ab}: ${g.c}/${g.mn}">${g.ab}:${g.c}</span>`}det+='</div>';
    h+=`<td class="${cls}">${det}</td>`}
  h+='</tr></tbody>';table.innerHTML=h;closeDropdown()
}

function onCellClick(e,ds,eid){
  e.stopPropagation();closeDropdown();const d=new Date(ds+'T12:00:00');
  if(isClosed(d)){showToast('Día cerrado','error');return}if(getAbsence(d,eid)){showToast('Ausencia activa — elimine primero','error');return}
  const cell=e.target.closest('.shift-cell');if(!cell)return;const emp=employees.find(x=>x.id===eid);
  let dd=document.createElement('div');dd.className='shift-dropdown';dd.onclick=ev=>ev.stopPropagation();let opts='';
  for(const[k,s]of Object.entries(SHIFTS)){const bl=emp.restrictions.includes(k);opts+=`<div class="option${bl?' style="opacity:.3;cursor:not-allowed"':''}" onclick="${bl?'':(`doSelect('${ds}','${eid}','${k}')`)}"><span class="dot" style="background:${s.color}"></span>${s.name} (${s.time})${bl?' 🚫':''}</div>`}
  opts+='<div class="separator"></div>';opts+=`<div class="option" onclick="doSelect('${ds}','${eid}','free')"><span class="dot" style="background:var(--text3)"></span>Día libre</div>`;
  opts+='<div class="separator"></div>';for(const[k,a]of Object.entries(ABSENCES)){if(k==='swap')continue;opts+=`<div class="option" onclick="closeDropdown();openAbsenceModal('${eid}','${ds}','${k}')"><span class="dot" style="background:${a.color}"></span>${a.name}</div>`}
  dd.innerHTML=opts;cell.style.position='relative';cell.appendChild(dd);activeDropdown=dd
}
function doSelect(ds,eid,st){const d=new Date(ds+'T12:00:00'),al=validate(d,eid,st),bl=al.filter(a=>a.type==='block'),er=al.filter(a=>a.type==='error');if(bl.length){showToast('⛔ '+bl[0].msg,'error');closeDropdown();return}if(er.length&&!confirm('⚠ ADVERTENCIA:\n\n'+er.map(e=>e.msg).join('\n')+'\n\n¿Continuar?')){closeDropdown();return}setAssign(d,eid,st);closeDropdown()}

function renderAlerts(){
  const dates=weekDates(state.currentWeekStart),alerts=[];
  for(const d of dates){if(isClosed(d))continue;const di=(d.getDay()+6)%7;
    const{issues}=getCoverageStatus(d);for(const iss of issues){const nm=iss.shift==='tarde'?'Tarde+Cierre':(SHIFTS[iss.shift]?.name||iss.shift);alerts.push({type:'warning',msg:`${DAYS[di]} ${fmtShort(d)}: ${nm} solo ${iss.have}/${iss.need}`})};
    for(const emp of employees){const a=getAssign(d,emp.id);if(!a.type||!SHIFTS[a.type])continue;const nd=addDays(d,1),na=getAssign(nd,emp.id);if(na.type&&SHIFTS[na.type]){const r=(24-SHIFTS[a.type].end)+SHIFTS[na.type].start;if(r<12)alerts.push({type:'error',msg:`${emp.name}: solo ${r}h descanso ${DAYS[di]}→${DAYS[(di+1)%7]}`})}
    if(di===6||!isWorkDay(addDays(d,1),emp.id)){const con=getConsecutiveWorkDays(d,emp.id);if(con>6)alerts.push({type:'error',msg:`🚫 ${emp.name}: ${con} días consecutivos`});else if(con===6)alerts.push({type:'warning',msg:`⚠ ${emp.name}: 6 días consecutivos`})}}}
  for(const emp of employees){const fd=getWeekFreeDays(dates[0],emp.id);if(fd<2)alerts.push({type:fd===0?'error':'warning',msg:`${emp.name}: solo ${fd} día${fd!==1?'s':''} libre${fd!==1?'s':''} esta semana`})}

  const abs=state.absences.filter(a=>a.employee_id===emp.id&&a.status==='approved');if(abs.length){html+='<div style="margin-top:6px">';for(const a of abs)html+=`<div style="font-size:11px;padding:3px 6px;background:var(--bg);border-radius:4px;margin-bottom:2px">${ABSENCES[a.type]?.name||a.type}: ${a.start_date} → ${a.end_date||'?'} <span style="cursor:pointer;color:var(--danger);margin-left:4px" onclick="removeAbsence('${a.id}')">✕</span></div>`;html+='</div>'}
  html+='</div>'}document.getElementById('employeeList').innerHTML=html}

function renderHistory(){let html='';if(!state.changelog.length)html='<div style="padding:16px;color:var(--text3)">Sin cambios registrados</div>';else for(const l of state.changelog.slice(0,100)){const emp=employees.find(e=>e.id===l.employee_id);const fn=SHIFTS[l.from_val]?.name||ABSENCES[l.from_val]?.name||l.from_val||'Libre';const tn=SHIFTS[l.to_val]?.name||ABSENCES[l.to_val]?.name||l.to_val||'Libre';html+=`<div class="log-item"><div class="log-time">${l.ts?new Date(l.ts).toLocaleString('es-ES'):''} ${l.user_name?'· '+l.user_name:''}</div><div><strong>${emp?.name||l.employee_id}</strong> — ${l.date}</div><div class="log-detail">${fn} → ${tn}${l.reason?' · '+l.reason:''}</div></div>`}document.getElementById('historyList').innerHTML=html}

// ===================== ABSENCE MODAL =====================
function openAbsenceModal(eid='',ds='',at=''){if(currentUser?.role==='viewer'){showToast('Sin permisos de edición','error');return}
  const today=fmtDate(new Date()),eo=employees.map(e=>`<option value="${e.id}"${e.id===eid?' selected':''}>${e.name}</option>`).join(''),to=Object.entries(ABSENCES).filter(([k])=>k!=='swap').map(([k,v])=>`<option value="${k}"${k===at?' selected':''}>${v.name}</option>`).join('');
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><h3>📋 Registrar Ausencia</h3><div class="modal-field"><label>Empleado</label><select id="absEmp">${eo}</select></div><div class="modal-field"><label>Tipo</label><select id="absType">${to}</select></div><div class="modal-field"><label>Fecha inicio</label><input type="date" id="absStart" value="${ds||today}"></div><div class="modal-field"><label>Fecha fin (vacío = indeterminada)</label><input type="date" id="absEnd" value="${ds||''}"></div><div class="modal-field"><label>Notas</label><textarea id="absNotes" placeholder="Observaciones..."></textarea></div><div id="substitutionPanel"></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="previewSubstitutions()">Ver turnos a cubrir</button><button class="btn btn-success" onclick="saveAbsence()">Guardar ausencia</button></div></div></div>`}

function previewSubstitutions(){const eid=document.getElementById('absEmp').value,sd=document.getElementById('absStart').value,ed=document.getElementById('absEnd').value;if(!eid||!sd){showToast('Seleccione empleado y fecha','error');return}
  const emp=employees.find(e=>e.id===eid),end=ed?new Date(ed+'T12:00:00'):addDays(new Date(sd+'T12:00:00'),13);let d=new Date(sd+'T12:00:00'),html=`<div class="sub-panel"><h4>🔄 Turnos a cubrir para ${emp.name}</h4>`,has=false;
  while(d<=end){if(!isClosed(d)){const a=getAssign(d,eid);if(a.type&&SHIFTS[a.type]){has=true;const di=(d.getDay()+6)%7,sh=SHIFTS[a.type],ds2=fmtDate(d);
    html+=`<div class="sub-day"><div class="sub-day-title">${DAYS[di]} ${fmtShort(d)}</div><div class="sub-shift-needed"><span class="dot" style="background:${sh.color};width:8px;height:8px;border-radius:50%;display:inline-block"></span>${sh.name} (${sh.time})</div>`;
    const fc=findCandidates(d,a.type),sc=findSwapCandidates(d,a.type);
    if(fc.length){html+=`<div style="font-size:11px;color:var(--success);font-weight:600;margin:4px 0">Empleados libres:</div>`;for(const c of fc.slice(0,5)){let w=[];if(c.wouldExceed5days)w.push('⚠ perdería 2º libre');if(c.hasDebt)w.push('⚠ deuda');if(c.hasRestWarning)w.push('⚠ descanso');if(c.consecutive>=5)w.push(`⚠ ${c.consecutive+1}d seguidos`);const ws=w.length?`<div style="color:var(--warning);font-size:10px;margin-top:2px">${w.join(' · ')}</div>`:'';
      html+=`<div class="sub-candidate" style="${c.wouldExceed5days?'border-left:2px solid var(--warning)':''}"><div><span class="name">${c.employee.name}</span><span style="color:var(--text2);font-size:11px;margin-left:4px">(${c.weekWorkDays}d/sem · ${c.weekHours}h)</span>${ws}</div><button class="assign-btn" onclick="assignSub('${ds2}','${c.employee.id}','${a.type}')">Asignar</button></div>`}}
    if(sc.length){html+=`<div style="font-size:11px;color:var(--accent2);font-weight:600;margin:6px 0 4px">Cambio de turno posible:</div>`;for(const c of sc.slice(0,3))html+=`<div class="sub-candidate"><div><span class="name">${c.employee.name}</span><span style="color:var(--text2);font-size:11px;margin-left:4px">(actual: ${SHIFTS[c.currentShift].name})</span></div><button class="assign-btn" style="background:var(--accent2)" onclick="assignSwapSub('${ds2}','${c.employee.id}','${a.type}','${c.currentShift}')">Cambiar</button></div>`}
    if(!fc.length&&!sc.length)html+=`<div class="sub-no-candidate">⚠ Sin candidatos</div>`;html+='</div>'}}d=addDays(d,1)}
  if(!has)html+='<div style="color:var(--text3);font-size:12px;padding:8px">Sin turnos en este período.</div>';html+='</div>';document.getElementById('substitutionPanel').innerHTML=html}

async function assignSub(ds,eid,st){const d=new Date(ds+'T12:00:00'),al=validate(d,eid,st).filter(a=>a.type==='error');if(al.length&&!confirm('⚠\n\n'+al.map(e=>e.msg).join('\n')+'\n\n¿Asignar?'))return;
  state.assignments[aKey(d,eid)]={type:st,modified:true,reason:'Sustitución'};checkAndCreateDebt(d,eid);await dbSaveAssignment(d,eid,st,'Sustitución');
  await addLog(eid,fmtDate(d),'free',st,'Sustitución por ausencia');showToast(`✅ ${employees.find(e=>e.id===eid).name} asignado`,'success');previewSubstitutions();renderSchedule();renderAlerts();renderSidebarCoverage()}

async function assignSwapSub(ds,eid,ns,os){const d=new Date(ds+'T12:00:00'),al=validate(d,eid,ns).filter(a=>a.type==='error');if(al.length&&!confirm('⚠\n\n'+al.map(e=>e.msg).join('\n')+'\n\n¿Cambiar?'))return;
  state.assignments[aKey(d,eid)]={type:ns,modified:true,reason:`Cambio ${SHIFTS[os].name}→${SHIFTS[ns].name}`};await dbSaveAssignment(d,eid,ns,`Cambio turno cobertura`);
  await addLog(eid,fmtDate(d),os,ns,'Cambio turno por cobertura');showToast(`✅ ${employees.find(e=>e.id===eid).name}: ${SHIFTS[os].name}→${SHIFTS[ns].name}`,'success');previewSubstitutions();renderSchedule();renderAlerts();renderSidebarCoverage()}

async function saveAbsence(){const eid=document.getElementById('absEmp').value,type=document.getElementById('absType').value,sd=document.getElementById('absStart').value,ed=document.getElementById('absEnd').value,notes=document.getElementById('absNotes').value;
  if(!eid||!type||!sd){showToast('Complete campos','error');return}
  const absence={id:crypto.randomUUID(),employee_id:eid,type,start_date:sd,end_date:ed||null,status:'approved',notes,created_by:currentUser?.display_name||'',created_at:new Date().toISOString()};
  state.absences.push(absence);
  const end=ed?new Date(ed+'T12:00:00'):addDays(new Date(sd+'T12:00:00'),30);let d=new Date(sd+'T12:00:00');
  while(d<=end){delete state.assignments[aKey(d,eid)];await db.from('assignments').delete().eq('date',fmtDate(d)).eq('employee_id',eid);d=addDays(d,1)}
  await db.from('absences').insert(absence);
  await addLog(eid,sd+(ed?' → '+ed:' → ?'),'-',type,'Ausencia: '+(ABSENCES[type]?.name||type));
  closeModal();renderAll();showToast(`Ausencia registrada: ${employees.find(e=>e.id===eid).name}`,'success')}

async function removeAbsence(id){if(!confirm('¿Eliminar ausencia?'))return;state.absences=state.absences.filter(a=>a.id!==id);await db.from('absences').delete().eq('id',id);renderAll();showToast('Ausencia eliminada','success')}
function closeModal(){document.getElementById('modalContainer').innerHTML=''}

// ===================== SWAP REQUESTS =====================
function openSwapModal(){if(currentUser?.role==='viewer'){showToast('Sin permisos','error');return}
  const eo=employees.map(e=>`<option value="${e.id}">${e.name} (${getSwapCountThisYear(e.id)} cambios)</option>`).join('');
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><h3>🔄 Solicitud de Cambio</h3><div style="background:var(--swap-bg);border:1px solid rgba(77,208,225,.3);border-radius:8px;padding:10px;margin-bottom:16px;font-size:12px;color:var(--swap)">Un empleado solicita librarse. Otro le cubre y deberá devolver el día.</div><div class="modal-field"><label>Quién solicita</label><select id="swReq">${eo}</select></div><div class="modal-field"><label>Fecha</label><input type="date" id="swDate" value="${fmtDate(new Date())}"></div><div class="modal-field"><label>Quién cubre</label><select id="swCov"><option value="">— Seleccionar —</option>${eo}</select></div><div class="modal-field"><label>Motivo</label><textarea id="swReason" placeholder="Ej: alargar fin de semana..."></textarea></div><div id="swVal"></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button>${currentUser?.role==='admin'?'<button class="btn" style="background:var(--warning);color:#000;border-color:var(--warning)" onclick="saveSwapReq(\'pending\')">Pendiente</button><button class="btn btn-success" onclick="saveSwapReq(\'approved\')">Aprobar</button>':'<button class="btn btn-primary" onclick="saveSwapReq(\'pending\')">Enviar solicitud</button>'}</div></div></div>`;
  ['swReq','swDate','swCov'].forEach(id=>document.getElementById(id).addEventListener('change',validateSwapPrev))}

function validateSwapPrev(){const rid=document.getElementById('swReq').value,ds=document.getElementById('swDate').value,cid=document.getElementById('swCov').value,p=document.getElementById('swVal');if(!rid||!ds){p.innerHTML='';return}
  const d=new Date(ds+'T12:00:00'),ra=getAssign(d,rid),re=employees.find(e=>e.id===rid);let h='';
  if(ra.type&&SHIFTS[ra.type])h+=`<div style="font-size:12px;padding:6px 8px;background:var(--bg3);border-radius:4px;margin-bottom:6px">${re.name}: <strong style="color:${SHIFTS[ra.type].color}">${SHIFTS[ra.type].name} (${SHIFTS[ra.type].time})</strong></div>`;
  else h+=`<div style="font-size:12px;color:var(--warning);padding:6px 8px;background:rgba(245,158,11,.1);border-radius:4px;margin-bottom:6px">⚠ ${re.name} no tiene turno ese día</div>`;
  if(cid&&cid!==rid&&ra.type&&SHIFTS[ra.type]){const ce=employees.find(e=>e.id===cid),ca=getAssign(d,cid),al=validate(d,cid,ra.type),bl=al.filter(a=>a.type==='block'),er=al.filter(a=>a.type==='error');
    if(ca.type==='free')h+=`<div style="font-size:12px;color:var(--success);padding:4px 8px">✅ ${ce.name} libre — puede cubrir</div>`;
    else if(SHIFTS[ca.type])h+=`<div style="font-size:12px;color:var(--warning);padding:4px 8px">⚠ ${ce.name} tiene ${SHIFTS[ca.type].name}</div>`;
    for(const b of bl)h+=`<div style="font-size:12px;color:var(--danger);padding:4px 8px">🚫 ${b.msg}</div>`;for(const e of er)h+=`<div style="font-size:12px;color:var(--warning);padding:4px 8px">⚠ ${e.msg}</div>`;
    h+=`<div style="font-size:11px;color:var(--text2);padding:4px 8px;margin-top:4px">Cambios este año: <strong>${re.name}: ${getSwapCountThisYear(rid)}</strong> · ${ce.name}: ${getSwapCountThisYear(cid)}</div>`}
  p.innerHTML=h}

async function saveSwapReq(status){const rid=document.getElementById('swReq').value,ds=document.getElementById('swDate').value,cid=document.getElementById('swCov').value,reason=document.getElementById('swReason').value;
  if(!rid||!ds||!cid){showToast('Rellene todos los campos','error');return}if(rid===cid){showToast('Mismo empleado','error');return}
  const d=new Date(ds+'T12:00:00'),ra=getAssign(d,rid),re=employees.find(e=>e.id===rid),ce=employees.find(e=>e.id===cid);
  const sw={id:crypto.randomUUID(),requester_id:rid,cover_id:cid,date:ds,requester_shift:ra.type,status,reason,created_at:new Date().toISOString(),resolved_at:status==='approved'?new Date().toISOString():null,return_date:null,return_resolved:false};
  state.swapRequests.push(sw);await db.from('swap_requests').insert(sw);
  if(status==='approved'){state.assignments[aKey(d,rid)]={type:'swap',modified:true,reason:`Cambio con ${ce.name}`};await dbSaveAssignment(d,rid,'swap',`Cambio con ${ce.name}`);
    if(ra.type&&SHIFTS[ra.type]){state.assignments[aKey(d,cid)]={type:ra.type,modified:true,reason:`Cubre a ${re.name}`};await dbSaveAssignment(d,cid,ra.type,`Cubre a ${re.name}`);checkAndCreateDebt(d,cid)}}
  await addLog(rid,ds,ra.type||'free','swap',`Cambio: ${re.name}→${ce.name}. ${status==='approved'?'Aprobado':'Pendiente'}. ${reason}`);
  closeModal();renderAll();showToast(status==='approved'?`✅ Cambio aprobado: ${re.name} ↔ ${ce.name}`:'📋 Registrado como pendiente','success')}

async function approveSwap(id){const sw=state.swapRequests.find(s=>s.id===id);if(!sw)return;sw.status='approved';sw.resolved_at=new Date().toISOString();
  const d=new Date(sw.date+'T12:00:00'),re=employees.find(e=>e.id===sw.requester_id),ce=employees.find(e=>e.id===sw.cover_id),ra=getAssign(d,sw.requester_id);
  state.assignments[aKey(d,sw.requester_id)]={type:'swap',modified:true,reason:`Cambio con ${ce.name}`};await dbSaveAssignment(d,sw.requester_id,'swap',`Cambio con ${ce.name}`);
  if(sw.requester_shift&&SHIFTS[sw.requester_shift]){state.assignments[aKey(d,sw.cover_id)]={type:sw.requester_shift,modified:true,reason:`Cubre a ${re.name}`};await dbSaveAssignment(d,sw.cover_id,sw.requester_shift,`Cubre a ${re.name}`);checkAndCreateDebt(d,sw.cover_id)}
  await db.from('swap_requests').update({status:'approved',resolved_at:sw.resolved_at}).eq('id',id);
  await addLog(sw.requester_id,sw.date,'pending','approved',`Cambio aprobado: ${re.name}↔${ce.name}`);
  renderAll();showToast(`✅ Aprobado: ${re.name} ↔ ${ce.name}`,'success')}

async function rejectSwap(id){if(!confirm('¿Rechazar?'))return;const sw=state.swapRequests.find(s=>s.id===id);if(!sw)return;sw.status='rejected';sw.resolved_at=new Date().toISOString();await db.from('swap_requests').update({status:'rejected',resolved_at:sw.resolved_at}).eq('id',id);renderAll();showToast('Rechazado','success')}

async function markSwapReturned(id){const sw=state.swapRequests.find(s=>s.id===id);if(!sw)return;sw.return_resolved=true;sw.return_date=fmtDate(new Date());await db.from('swap_requests').update({return_resolved:true,return_date:sw.return_date}).eq('id',id);renderAll();showToast('Devolución registrada ✓','success')}

function renderSwaps(){
  const stats={};for(const e of employees)stats[e.id]={req:state.swapRequests.filter(s=>s.requester_id===e.id).length,reqY:getSwapCountThisYear(e.id),cov:state.swapRequests.filter(s=>s.cover_id===e.id&&s.status==='approved').length,pend:state.swapRequests.filter(s=>s.requester_id===e.id&&s.status==='approved'&&!s.return_resolved).length};
  let sh=`<div style="background:var(--bg2);border-radius:8px;padding:16px;margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;margin-bottom:10px">📊 Contador por Empleado</h3><table style="width:100%;border-collapse:collapse;font-size:12px"><tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:6px 8px;color:var(--text2)">Empleado</th><th style="text-align:center;padding:6px;color:var(--swap)">Año</th><th style="text-align:center;padding:6px;color:var(--text2)">Total</th><th style="text-align:center;padding:6px;color:var(--success)">Cubiertos</th><th style="text-align:center;padding:6px;color:var(--warning)">Devolver</th></tr>`;
  for(const e of employees){const s=stats[e.id];sh+=`<tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 8px;font-weight:600">${e.name}</td><td style="text-align:center;padding:6px;font-weight:700;color:var(--swap)">${s.reqY}</td><td style="text-align:center;padding:6px;color:var(--text2)">${s.req}</td><td style="text-align:center;padding:6px;color:var(--success)">${s.cov}</td><td style="text-align:center;padding:6px;color:${s.pend>0?'var(--warning)':'var(--text3)'}">${s.pend>0?s.pend+' ⏳':'0'}</td></tr>`}
  sh+='</table></div>';document.getElementById('swapStats').innerHTML=sh;
  const pending=getPendingSwaps();let ph='';if(pending.length){ph=`<div style="margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;color:var(--warning);margin-bottom:10px">⏳ Pendientes (${pending.length})</h3>`;
    for(const s of pending){const re=employees.find(e=>e.id===s.requester_id),ce=employees.find(e=>e.id===s.cover_id),sh2=SHIFTS[s.requester_shift];
      ph+=`<div style="background:var(--bg2);border-radius:8px;padding:12px;margin-bottom:8px;border-left:3px solid var(--warning)"><div style="display:flex;justify-content:space-between;align-items:start"><div><div style="font-size:13px;font-weight:600">${re.name} solicita librarse el ${s.date}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">Turno: ${sh2?sh2.name:'?'} · Cubre: <strong>${ce.name}</strong></div>${s.reason?`<div style="font-size:11px;color:var(--text3);margin-top:4px;font-style:italic">"${s.reason}"</div>`:''}</div>${currentUser?.role==='admin'?`<div style="display:flex;gap:6px;flex-shrink:0"><button class="btn btn-success btn-sm" onclick="approveSwap('${s.id}')">✓ Aprobar</button><button class="btn btn-sm" style="color:var(--danger);border-color:var(--danger)" onclick="rejectSwap('${s.id}')">✗</button></div>`:''}</div></div>`}ph+='</div>'}
  document.getElementById('swapPending').innerHTML=ph;
  const badge=document.getElementById('swapBadge');if(pending.length){badge.textContent=pending.length;badge.style.display='inline-flex'}else badge.style.display='none';
  const resolved=state.swapRequests.filter(s=>s.status!=='pending').sort((a,b)=>(b.resolved_at||b.created_at).localeCompare(a.resolved_at||a.created_at));
  let rh=`<h3 style="font-size:14px;font-weight:700;margin-bottom:10px">Historial</h3>`;if(!resolved.length)rh+='<div style="color:var(--text3);font-size:12px">Sin cambios aún.</div>';
  else for(const s of resolved){const re=employees.find(e=>e.id===s.requester_id),ce=employees.find(e=>e.id===s.cover_id),ok=s.status==='approved',col=ok?'var(--success)':'var(--danger)';
    rh+=`<div style="background:var(--bg2);border-radius:6px;padding:10px;margin-bottom:6px;border-left:3px solid ${col};font-size:12px"><div style="display:flex;justify-content:space-between;align-items:center"><div><span style="font-weight:600">${re.name}</span> → <span style="font-weight:600">${ce.name}</span> · ${s.date} <span style="color:${col};font-weight:600;margin-left:8px">${ok?'Aprobado':'Rechazado'}</span>${s.reason?` · <span style="color:var(--text3);font-style:italic">${s.reason}</span>`:''}</div><div>${ok&&!s.return_resolved?`<button class="btn btn-sm" style="font-size:10px" onclick="markSwapReturned('${s.id}')">✓ Devuelto</button>`:''}${s.return_resolved?'<span style="color:var(--success);font-size:11px">✓ Devuelto</span>':''}</div></div></div>`}
  document.getElementById('swapHistory').innerHTML=rh}

          <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:12px">
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="endChkSchedule" checked> Horarios/turnos asignados</label>
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="endChkVacation" checked> Vacaciones</label>
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="endChkSick" checked> Bajas médicas</label>
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="endChkPermission" checked> Permisos personales</label>
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="endChkPaternity" checked> Paternidad/Maternidad</label>
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="endChkSwaps" checked> Cambios de turno</label>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">Cancelar</button>
          <button class="btn" style="background:#FF8A65;color:#000;border-color:#FF8A65;font-weight:600" onclick="generateEndaliaExcel()">📥 Descargar Excel</button>
        </div>
      </div>
    </div>`;
}

function generateEndaliaExcel() {
  const startDate = document.getElementById('endStart').value;
  const endDate = document.getElementById('endEnd').value;
  if (!startDate || !endDate) { showToast('Selecciona rango de fechas','error'); return; }

  const inclSchedule = document.getElementById('endChkSchedule').checked;
  const inclVacation = document.getElementById('endChkVacation').checked;
  const inclSick = document.getElementById('endChkSick').checked;
  const inclPermission = document.getElementById('endChkPermission').checked;
  const inclPaternity = document.getElementById('endChkPaternity').checked;
  const inclSwaps = document.getElementById('endChkSwaps').checked;

  const wb = XLSX.utils.book_new();
  const start = new Date(startDate + 'T12:00:00');
  const end = new Date(endDate + 'T12:00:00');

  // ---- SHEET 1: HORARIOS / TURNOS ASIGNADOS ----
  if (inclSchedule) {
    const rows = [];
    let d = new Date(start);
    while (d <= end) {
      if (!isClosed(d)) {
        for (const emp of employees) {
          const a = getAssign(d, emp.id);
          if (a.type && SHIFTS[a.type]) {
            const sh = SHIFTS[a.type];
            const dow = (d.getDay()+6)%7;
            rows.push({
              'Empleado': emp.name,
              'ID Empleado': emp.id,
              'Fecha': fmtDate(d),
              'Día': DAYS[dow],
              'Turno': sh.name,
              'Hora Inicio': sh.time.split('-')[0],
              'Hora Fin': sh.time.split('-')[1],
              'Horas': 8,
              'Modificado': a.modified ? 'Sí' : 'No',
              'Motivo cambio': a.reason || ''
            });
          }
        }
      }
      d = addDays(d, 1);
    }
    if (rows.length) {
      const ws = XLSX.utils.json_to_sheet(rows);
      ws['!cols'] = [{wch:15},{wch:12},{wch:12},{wch:12},{wch:10},{wch:12},{wch:12},{wch:6},{wch:10},{wch:30}];
      XLSX.utils.book_append_sheet(wb, ws, 'Turnos Asignados');
    }
  }

  // ---- SHEET 2: VACACIONES ----
  if (inclVacation) {
    const rows = state.absences
      .filter(a => a.type === 'vacation' && a.status === 'approved' && a.start_date <= endDate && (!a.end_date || a.end_date >= startDate))
      .map(a => {
        const emp = employees.find(e => e.id === a.employee_id);
        const sd = new Date(a.start_date + 'T12:00:00');
        const ed = a.end_date ? new Date(a.end_date + 'T12:00:00') : null;
        const days = ed ? Math.round((ed - sd) / 864e5) + 1 : '?';
        return {
          'Empleado': emp?.name || a.employee_id,
          'ID Empleado': a.employee_id,
          'Tipo': 'Vacaciones',
          'Fecha Inicio': a.start_date,
          'Fecha Fin': a.end_date || 'Indeterminada',
          'Días': days,
          'Estado': 'Aprobada',
          'Notas': a.notes || ''
        };
      });
    const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{'Info':'Sin vacaciones en este período'}]);
    ws['!cols'] = [{wch:15},{wch:12},{wch:12},{wch:12},{wch:14},{wch:6},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws, 'Vacaciones');
  }

  // ---- SHEET 3: BAJAS MÉDICAS ----
  if (inclSick) {
    const rows = state.absences
      .filter(a => a.type === 'sick' && a.status === 'approved' && a.start_date <= endDate && (!a.end_date || a.end_date >= startDate))
      .map(a => {
        const emp = employees.find(e => e.id === a.employee_id);
        return {
          'Empleado': emp?.name || a.employee_id,
          'ID Empleado': a.employee_id,
          'Tipo': 'Baja médica',
          'Fecha Inicio': a.start_date,
          'Fecha Fin': a.end_date || 'Indeterminada',
          'Estado': 'Aprobada',
          'Notas': a.notes || ''
        };
      });
    const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{'Info':'Sin bajas médicas en este período'}]);
    ws['!cols'] = [{wch:15},{wch:12},{wch:14},{wch:12},{wch:14},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws, 'Bajas Médicas');
  }

  // ---- SHEET 4: PERMISOS ----
  if (inclPermission) {
    const rows = state.absences
      .filter(a => a.type === 'permission' && a.status === 'approved' && a.start_date <= endDate && (!a.end_date || a.end_date >= startDate))
      .map(a => {
        const emp = employees.find(e => e.id === a.employee_id);
        return {
          'Empleado': emp?.name || a.employee_id,
          'ID Empleado': a.employee_id,
          'Tipo': 'Permiso personal',
          'Fecha Inicio': a.start_date,
          'Fecha Fin': a.end_date || a.start_date,
          'Estado': 'Aprobada',
          'Notas': a.notes || ''
        };
      });
    const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{'Info':'Sin permisos en este período'}]);
    ws['!cols'] = [{wch:15},{wch:12},{wch:16},{wch:12},{wch:12},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws, 'Permisos');
  }

  // ---- SHEET 5: PATERNIDAD / MATERNIDAD ----
  if (inclPaternity) {
    const rows = state.absences
      .filter(a => a.type === 'paternity' && a.status === 'approved' && a.start_date <= endDate && (!a.end_date || a.end_date >= startDate))
      .map(a => {
        const emp = employees.find(e => e.id === a.employee_id);
        return {
          'Empleado': emp?.name || a.employee_id,
          'ID Empleado': a.employee_id,
          'Tipo': 'Paternidad/Maternidad',
          'Fecha Inicio': a.start_date,
          'Fecha Fin': a.end_date || 'Indeterminada',
          'Estado': 'Aprobada',
          'Notas': a.notes || ''
        };
      });
    const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{'Info':'Sin permisos de paternidad/maternidad en este período'}]);
    ws['!cols'] = [{wch:15},{wch:12},{wch:22},{wch:12},{wch:14},{wch:10},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws, 'Paternidad-Maternidad');
  }

  // ---- SHEET 6: CAMBIOS DE TURNO ENTRE EMPLEADOS ----
  if (inclSwaps) {
    const rows = state.swapRequests
      .filter(s => s.status === 'approved' && s.date >= startDate && s.date <= endDate)
      .map(s => {
        const req = employees.find(e => e.id === s.requester_id);
        const cov = employees.find(e => e.id === s.cover_id);
        const sh = SHIFTS[s.requester_shift];
        return {
          'Solicitante': req?.name || s.requester_id,
          'ID Solicitante': s.requester_id,
          'Quien cubre': cov?.name || s.cover_id,
          'ID Cobertura': s.cover_id,
          'Fecha': s.date,
          'Turno cubierto': sh ? sh.name + ' (' + sh.time + ')' : s.requester_shift,
          'Motivo': s.reason || '',
          'Día devuelto': s.return_resolved ? 'Sí (' + (s.return_date||'') + ')' : 'Pendiente'
        };
      });
    const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{'Info':'Sin cambios aprobados en este período'}]);
    ws['!cols'] = [{wch:15},{wch:14},{wch:15},{wch:14},{wch:12},{wch:22},{wch:25},{wch:18}];
    XLSX.utils.book_append_sheet(wb, ws, 'Cambios Turno');
  }

  // ---- SHEET 7: RESUMEN POR EMPLEADO (siempre incluido) ----
  const summaryRows = [];
  for (const emp of employees) {
    let totalHours = 0, workDays = 0, freeDays = 0;
    let mornings = 0, mids = 0, afternoons = 0, closings = 0;
    let d = new Date(start);
    while (d <= end) {
      if (!isClosed(d)) {
        const a = getAssign(d, emp.id);
        if (a.type && SHIFTS[a.type]) {
          totalHours += 8; workDays++;
          if (a.type === 'morning') mornings++;
          else if (a.type === 'mid') mids++;
          else if (a.type === 'afternoon') afternoons++;
          else if (a.type === 'closing') closings++;
        } else { freeDays++; }
      }
      d = addDays(d, 1);
    }
    const vacDays = state.absences.filter(a => a.employee_id === emp.id && a.type === 'vacation' && a.status === 'approved').length;
    const sickDays = state.absences.filter(a => a.employee_id === emp.id && a.type === 'sick' && a.status === 'approved').length;
    const swapsReq = state.swapRequests.filter(s => s.requester_id === emp.id && s.status === 'approved' && s.date >= startDate && s.date <= endDate).length;

    summaryRows.push({
      'Empleado': emp.name,
      'ID': emp.id,
      'Días trabajados': workDays,
      'Días libres': freeDays,
      'Total horas': totalHours,
      'T. Mañana': mornings,
      'T. Medio': mids,
      'T. Tarde': afternoons,
      'T. Cierre': closings,
      'Vacaciones': vacDays,
      'Bajas': sickDays,
      'Cambios solicitados': swapsReq,
      'Restricciones': emp.restrictions.map(r => SHIFTS[r]?.name || r).join(', ') || 'Ninguna',
      'Notas': emp.notes || ''
    });
  }
  const wsSummary = XLSX.utils.json_to_sheet(summaryRows);
  wsSummary['!cols'] = [{wch:15},{wch:10},{wch:14},{wch:12},{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12},{wch:8},{wch:18},{wch:18},{wch:25}];
  XLSX.utils.book_append_sheet(wb, wsSummary, 'Resumen Empleados');

  // Download
  XLSX.writeFile(wb, `Endalia_SAC_${startDate}_${endDate}.xlsx`);
  closeModal();
  showToast('📤 Excel para Endalia descargado', 'success');
}

// ===================== NAVIGATION =====================
function navigateWeek(dir){state.currentWeekStart=addDays(state.currentWeekStart,dir*7);renderAll()}
function goToToday(){state.currentWeekStart=getMonday(new Date());renderAll()}
function switchPanel(id,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('panel-'+id).classList.add('active');btn.classList.add('active');if(id==='employees')renderEmployees();if(id==='swaps')renderSwaps();if(id==='coverage')renderCoveragePanel();if(id==='history')renderHistory()}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed')}

async function generateFromRotation(){if(!confirm('Restaurar rotación base de esta semana?'))return;const dates=weekDates(state.currentWeekStart);for(const d of dates)for(const e of employees){delete state.assignments[aKey(d,e.id)];await db.from('assignments').delete().eq('date',fmtDate(d)).eq('employee_id',e.id)}renderAll();showToast('Rotación base restaurada','success')}

// ===================== SUPABASE DB FUNCTIONS =====================
function showSaving(){document.getElementById('savingIndicator').classList.add('show');setTimeout(()=>document.getElementById('savingIndicator').classList.remove('show'),1500)}
async function dbSaveAssignment(d,eid,type,reason){showSaving();await db.from('assignments').upsert({date:fmtDate(d),employee_id:eid,type,reason,modified_by:currentUser?.display_name||''})}
async function dbSaveDebt(debt){showSaving();await db.from('day_debts').insert(debt)}

async function loadFromDB(){
  const{data:emps}=await db.from('employees').select('*').eq('active',true).order('sort_order');
  if(emps&&emps.length)employees=emps.map(e=>({id:e.id,name:e.name,restrictions:e.restrictions||[],preferences:e.preferences||[],notes:e.notes||''}));
  const{data:assigns}=await db.from('assignments').select('*');
  state.assignments={};if(assigns)for(const a of assigns)state.assignments[a.date+'_'+a.employee_id]={type:a.type,modified:true,reason:a.reason||''};
  const{data:abs}=await db.from('absences').select('*').eq('status','approved');state.absences=abs||[];
  const{data:swaps}=await db.from('swap_requests').select('*').order('created_at',{ascending:false});state.swapRequests=swaps||[];
  const{data:debts}=await db.from('day_debts').select('*');state.dayDebts=debts||[];
  const{data:logs}=await db.from('changelog').select('*').order('ts',{ascending:false}).limit(200);state.changelog=logs||[];
}

// ===================== AUTH =====================
async function doLogin(){
  const user=document.getElementById('loginUser').value.trim(),pass=document.getElementById('loginPass').value;
  const{data,error}=await db.rpc('do_login',{p_username:user,p_password:pass});
  if(error||!data||!data.length){document.getElementById('loginError').textContent='Usuario o contraseña incorrectos';document.getElementById('loginPass').value='';document.querySelector('.login-form').style.animation='shake .4s ease';setTimeout(()=>document.querySelector('.login-form').style.animation='',400);return}
  currentUser=data[0];document.getElementById('loginScreen').style.display='none';document.getElementById('app').classList.add('visible');
  document.getElementById('userGreeting').textContent=currentUser.display_name;document.getElementById('userRole').textContent=currentUser.role==='admin'?'Administradora':currentUser.role==='supervisor'?'Supervisor':'Consulta';
  await loadFromDB();
  const sel=document.getElementById('filterEmployee');sel.innerHTML='<option value="">Todos los empleados</option>';for(const e of employees){const o=document.createElement('option');o.value=e.id;o.textContent=e.name;sel.appendChild(o)}
  renderAll()
}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('loginUser').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPass').focus()});

function doLogout(){currentUser=null;document.getElementById('app').classList.remove('visible');document.getElementById('loginScreen').style.display='flex';document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';document.getElementById('loginError').textContent=''}

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3500)}
function renderAll(){renderSchedule();renderAlerts();renderSidebarCoverage();const p=getPendingSwaps(),b=document.getElementById('swapBadge');if(p.length){b.textContent=p.length;b.style.display='inline-flex'}else b.style.display='none'}
</script>
